<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1117'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='%2322c55e' stroke-width='2.5'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial Black' font-size='22' fill='%2322c55e'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── [CSS 스타일: 원본 100% 복구] ── */
:root{--f:'Noto Sans KR',-apple-system,sans-serif;--r:14px;--nh:60px;--hh:56px;}
[data-theme=dark]{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--cd:#1c2128;--cd2:#21262d;--p:#22c55e;--ps:rgba(34,197,94,.1);--pb:rgba(34,197,94,.25);--t:#e6edf3;--t2:#8b949e;--t3:#484f58;--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.18);--red:#f85149;--am:#d29922;--sh:0 8px 24px rgba(0,0,0,.5);}
[data-theme=light]{--bg:#f6f8fa;--bg2:#fff;--bg3:#f0f2f5;--cd:#fff;--cd2:#f6f8fa;--p:#1a7f37;--ps:rgba(26,127,55,.08);--pb:rgba(26,127,55,.2);--t:#1f2328;--t2:#636c76;--t3:#9198a1;--b:rgba(0,0,0,.08);--b2:rgba(0,0,0,.18);--red:#d1242f;--am:#9a6700;--sh:0 4px 16px rgba(0,0,0,.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--f);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* ONBOARDING */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9000;overflow-y:auto;}
.ob-inner{max-width:900px;margin:0 auto;padding-bottom:48px;}
.ob-hero{text-align:center;padding:44px 20px 24px;}
.ob-logo{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--p);margin-bottom:6px;}
.ob-sub{font-size:12px;color:var(--t3);letter-spacing:2px;margin-bottom:16px;}
.ob-theme-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;}
.ob-th-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:22px;border:2px solid var(--b);background:var(--cd);color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;}
.ob-th-btn.sel{border-color:var(--p);color:var(--p);background:var(--ps);}
.ob-body{padding:0 16px;}
.ob-lg-hdr{display:flex;align-items:center;gap:11px;padding:11px 15px;border-radius:11px;margin:18px 0 9px;}
.ob-lg-hdr img{width:26px;height:26px;object-fit:contain;}
.ob-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:6px;}
@media(max-width:580px){.ob-grid{grid-template-columns:repeat(3,1fr);}}
.ob-team{background:var(--cd);border:2px solid var(--b);border-radius:11px;padding:11px 5px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ob-team.sel{border-color:var(--p);background:var(--ps);}
.ob-team img{width:32px;height:32px;object-fit:contain;}
.ob-nm{font-size:11px;color:var(--t2);font-weight:500;line-height:1.3;}
.ob-start{display:block;margin:22px 16px 0;padding:15px;border-radius:12px;border:none;background:var(--bg3);color:var(--t3);font-size:15px;font-weight:700;cursor:not-allowed;width:calc(100% - 32px);transition:all .2s;}
.ob-start.ready{background:var(--p);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(34,197,94,.3);}

/* APP */
#app{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);}
#app.show{display:flex;}
.hdr{height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.hdr-logo{font-size:16px;font-weight:800;letter-spacing:2px;color:var(--p);cursor:pointer;}
.hdr-r{display:flex;align-items:center;gap:9px;}
.hdr-cr{width:26px;height:26px;object-fit:contain;border-radius:5px;}
.hdr-lv{font-size:12px;font-weight:700;color:var(--p);background:var(--ps);border:1px solid var(--pb);padding:3px 10px;border-radius:20px;}
.lpill{display:none;align-items:center;gap:5px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:20px;padding:3px 9px;}
.lpill.show{display:flex;}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

.main-body{flex:1;display:flex;overflow:hidden;min-height:0;}
.sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--b);padding:10px 8px;display:none;background:var(--bg2);}
@media(min-width:768px){.sidebar{display:flex;flex-direction:column;gap:2px;}}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;}
.si:hover{background:var(--bg3);}
.si.on{background:var(--ps);}
.si.on .si-lb{color:var(--p);font-weight:700;}
.si-ic{font-size:17px;width:22px;text-align:center;}
.si-lb{font-size:14px;color:var(--t2);font-weight:500;}

.pages{flex:1;position:relative;overflow:hidden;min-height:0;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px;display:none;}
.page.on{display:block;animation:fu .18s ease;}
@media(max-width:767px){.page{padding:12px 12px 76px;}}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.bnav{display:flex;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b);height:var(--nh);}
@media(min-width:768px){.bnav{display:none;}}
.nbi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;}
.ni-ic{font-size:21px;}
.ni-lb{font-size:10px;font-weight:600;color:var(--t3);}
.nbi.on .ni-lb{color:var(--p);}

/* MATCH CARD */
.mc{background:var(--cd);border:1px solid var(--b);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.mc:hover{border-color:var(--b2);}
.mc-top{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b);background:var(--bg3);}
.mc-lg{font-size:12px;color:var(--t3);font-weight:500;}
.mc-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.mc-badge.live{background:rgba(239,68,68,.12);color:var(--red);}
.mc-badge.sch{background:var(--ps);color:var(--p);}
.mc-body{padding:14px;}
.mc-row{display:flex;align-items:center;gap:10px;}
.mc-tm{flex:1;display:flex;align-items:center;gap:8px;}
.mc-cr{width:30px;height:30px;object-fit:contain;flex-shrink:0;}
.mc-nm{font-size:14px;font-weight:600;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-sc{font-size:26px;font-weight:800;color:var(--t);display:flex;align-items:center;gap:4px;}

/* PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:14px;}
.pill{font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--t3);cursor:pointer;white-space:nowrap;transition:all .15s;}
.pill.on{background:var(--ps);color:var(--p);border-color:var(--pb);}

/* STANDINGS */
.std-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b);}
.stt{width:100%;border-collapse:collapse;font-size:13px;}
.stt th{font-size:11px;font-weight:600;color:var(--t3);padding:11px 8px;text-align:center;background:var(--bg3);border-bottom:1px solid var(--b);}
.stt td{padding:11px 8px;border-bottom:1px solid var(--b);text-align:center;color:var(--t2);}
.stt tr.my{background:var(--ps);}
.pts{font-weight:700!important;color:var(--t)!important;}
.nm-cell{display:flex;align-items:center;gap:7px;text-align:left;}
.nm-cell img{width:18px;height:18px;object-fit:contain;}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;overflow-y:auto;padding:16px;display:none;}
.modal.show{display:block;}
.modal-in{background:var(--cd);border-radius:18px;max-width:480px;margin:0 auto;border:1px solid var(--b);overflow:hidden;}
.modal-hd{padding:15px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b);}
.modal-ttl{font-size:15px;font-weight:700;color:var(--t);}
.modal-x{background:none;border:none;color:var(--t3);font-size:24px;cursor:pointer;}
.modal-body{padding:17px;}

/* LOADER */
.ldr{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 20px;gap:12px;}
.spin{width:28px;height:28px;border:2.5px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-t{font-size:13px;color:var(--t3);}
.empty{text-align:center;padding:44px 20px;font-size:14px;color:var(--t3);}
.retry-btn{margin-top:12px;padding:8px 18px;border-radius:8px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-size:13px;font-weight:600;cursor:pointer;}
</style>
</head>
<body data-theme="dark">

<div id="ob">
<div class="ob-inner">
  <div class="ob-hero">
    <div class="ob-logo">PITCH PRO</div>
    <div class="ob-sub">FOOTBALL TACTICAL HUB</div>
    <div class="ob-hint">응원하는 팀을 선택해주세요</div>
    <div class="ob-theme-row">
      <button class="ob-th-btn sel" id="th-dark" onclick="setTh('dark')">🌙 다크</button>
      <button class="ob-th-btn" id="th-light" onclick="setTh('light')">☀️ 라이트</button>
    </div>
  </div>
  <div class="ob-body" id="ob-list">
    </div>
  <button class="ob-start" id="ob-btn" onclick="startApp()" disabled>팀을 선택해주세요</button>
</div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-logo" onclick="showSettings()">PITCH PRO</div>
    <div class="hdr-r">
      <div class="lpill" id="lpill"><div class="ldot"></div><span>LIVE</span></div>
      <div class="hdr-lv" id="hdr-lv">Lv.1</div>
      <img class="hdr-cr" id="hdr-cr" src="" alt="" onerror="this.style.display='none'">
    </div>
  </div>
  <div class="main-body">
    <div class="sidebar">
      <div class="si on" onclick="swP('home',this)"><span class="si-ic">⚡</span><span class="si-lb">라이브</span></div>
      <div class="si" onclick="swP('sched',this)"><span class="si-ic">📅</span><span class="si-lb">일정</span></div>
      <div class="si" onclick="swP('std',this)"><span class="si-ic">📊</span><span class="si-lb">순위</span></div>
      <div class="si" onclick="swP('player',this)"><span class="si-ic">👟</span><span class="si-lb">선수</span></div>
      <div class="si" onclick="swP('fan',this)"><span class="si-ic">⭐</span><span class="si-lb">팬존</span></div>
    </div>
    <div class="pages">
      <div class="page on" id="pg-home"><div id="home-bd"></div></div>
      <div class="page" id="pg-sched"><div id="sched-nav"></div><div id="sched-bd"></div></div>
      <div class="page" id="pg-std">
        <div class="pills" id="std-pills"></div>
        <div id="std-bd"></div>
      </div>
      <div class="page" id="pg-player">
        <div class="pills" id="pl-pills"></div>
        <div id="pl-bd"></div>
      </div>
      <div class="page" id="pg-fan"><div id="fan-bd"></div></div>
    </div>
  </div>
  <div class="bnav">
    <button class="nbi on" onclick="swP('home',this)"><div class="ni-ic">⚡</div><span class="ni-lb">홈</span></button>
    <button class="nbi" onclick="swP('sched',this)"><div class="ni-ic">📅</div><span class="ni-lb">일정</span></button>
    <button class="nbi" onclick="swP('std',this)"><div class="ni-ic">📊</div><span class="ni-lb">순위</span></button>
    <button class="nbi" onclick="swP('fan',this)"><div class="ni-ic">⭐</div><span class="ni-lb">팬존</span></button>
  </div>
</div>

<div class="modal" id="dtl-modal">
  <div class="modal-in">
    <div class="modal-hd"><span class="modal-ttl" id="dtl-ttl">경기 상세</span><button class="modal-x" onclick="cm('dtl-modal')">×</button></div>
    <div class="modal-body" id="dtl-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// [JS 엔진: 원본 기능 복구 + API 최적화]
// ═══════════════════════════════════════

const API = '/api/football';
const LGS = [
  {code:'PL', name:'프리미어리그', emblem:'https://crests.football-data.org/PL.png'},
  {code:'PD', name:'라리가', emblem:'https://crests.football-data.org/PD.png'},
  {code:'BL1',name:'분데스리가', emblem:'https://crests.football-data.org/BL1.png'},
  {code:'SA', name:'세리에A', emblem:'https://crests.football-data.org/SA.png'},
  {code:'FL1',name:'리그앙', emblem:'https://crests.football-data.org/FL1.png'},
  {code:'KL1',name:'K리그 1', emblem:'https://media.api-sports.io/football/leagues/292.png'},
];

let MT = null;
let curStd = 'PL', curPLg = 'PL', curSchedDate = null;
const cache = {};

// ── [수정] 데이터 타입별 캐시 시간 차등 적용 (429 에러 방지 핵심) ──
function getCached(key) {
  const c = cache[key];
  if (!c) return null;
  // 순위(standings), 선수(scorers)는 30분(1800000ms), 경기(matches)는 1.5분(90000ms) 유지
  const ttl = (key.includes('standings') || key.includes('scorers')) ? 1800000 : 90000;
  return (Date.now() - c.ts < ttl) ? c.data : null;
}

function setCached(key, data) {
  cache[key] = { data, ts: Date.now() };
}

// ── [복구] API 요청 함수 (JSON 변환 로직 포함) ──
async function fd(path) {
  const cached = getCached(path);
  if (cached) return cached;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (d.errorCode === 429 || d.message?.toLowerCase().includes('limit')) return d;
    setCached(path, d);
    return d;
  } catch (e) { return null; }
}

async function kl(path, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const key = path + '?' + qs;
  const cached = getCached(key);
  if (cached) return cached;
  try {
    const r = await fetch(`${API}?type=kl&path=${encodeURIComponent(path)}&${qs}`);
    const d = await r.json();
    setCached(key, d);
    return d;
  } catch (e) { return null; }
}

// ── [복구] 홈 화면 로드 (오늘의 경기 및 라이브) ──
async function loadHome() {
  const c = document.getElementById('home-bd');
  c.innerHTML = `<div class="ldr"><div class="spin"></div><div class="spin-t">라이브 데이터를 불러오는 중...</div></div>`;
  
  const today = new Date().toISOString().split('T')[0];
  // 주요 3개 리그 오늘 경기 병렬 요청
  const results = await Promise.all([
    fd(`/competitions/PL/matches?dateFrom=${today}&dateTo=${today}`),
    fd(`/competitions/PD/matches?dateFrom=${today}&dateTo=${today}`),
    fd(`/competitions/BL1/matches?dateFrom=${today}&dateTo=${today}`)
  ]);

  let allMatches = [];
  results.forEach(r => { if (r?.matches) allMatches.push(...r.matches); });

  const live = allMatches.filter(m => ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status));
  const sched = allMatches.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED');

  document.getElementById('lpill').classList.toggle('show', live.length > 0);

  let html = '';
  if (live.length) {
    html += `<div class="sec"><span class="stl" style="color:var(--red)">🔴 LIVE</span></div>`;
    live.forEach(m => html += mkMC(m, 'live'));
  }
  if (sched.length) {
    html += `<div class="sec" style="margin-top:12px"><span class="stl">오늘의 경기</span></div>`;
    sched.forEach(m => html += mkMC(m, 'sch'));
  }
  
  c.innerHTML = html || `<div class="empty">오늘 예정된 빅리그 경기가 없습니다.</div>`;
}

// ── [복구] 매치 카드 템플릿 ──
function mkMC(m, type) {
  const h = m.homeTeam, a = m.awayTeam;
  const isL = type === 'live';
  const score = m.score.fullTime;
  return `
    <div class="mc" onclick="opnDtl(${m.id})">
      <div class="mc-top">
        <span class="mc-lg">${m.competition.name}</span>
        <div class="mc-badge ${type}">${isL?'<div class="mc-dot"></div>':''}${isL?'LIVE':m.utcDate.slice(11,16)}</div>
      </div>
      <div class="mc-body">
        <div class="mc-row">
          <div class="mc-tm"><img class="mc-cr" src="${h.crest}"><span>${h.shortName || h.name}</span></div>
          <div class="mc-sc">${score.home ?? 0} : ${score.away ?? 0}</div>
          <div class="mc-tm" style="flex-direction:row-reverse">
            <img class="mc-cr" src="${a.crest}"><span>${a.shortName || a.name}</span>
          </div>
        </div>
      </div>
    </div>`;
}

// ── [복구] 순위 로드 (K리그 포함) ──
async function loadStd(code) {
  const c = document.getElementById('std-bd');
  c.innerHTML = `<div class="ldr"><div class="spin"></div><div class="spin-t">순위 정보를 가져오는 중...</div></div>`;

  if (code === 'KL1') {
    const d = await kl('/standings', { league: 292, season: 2025 });
    if (!d?.response?.[0]) { c.innerHTML = `<div class="empty">K리그 데이터를 찾을 수 없습니다.</div>`; return; }
    renderTable(c, d.response[0].league.standings[0], true);
  } else {
    const d = await fd(`/competitions/${code}/standings`);
    if (d?.errorCode === 429) {
      c.innerHTML = `<div class="empty">⏳ API 한도 초과 (30초 후 재시도 가능)</div>`;
      return;
    }
    renderTable(c, d.standings[0].table, false);
  }
}

function renderTable(container, rows, isKL) {
  let html = `<div class="std-wrap"><table class="stt"><tr><th>#</th><th>팀</th><th>경</th><th>승</th><th>무</th><th>패</th><th>승점</th></tr>`;
  rows.forEach(t => {
    const team = isKL ? t.team : t.team;
    const stats = isKL ? t.all : t;
    html += `<tr>
      <td>${isKL ? t.rank : t.position}</td>
      <td><div class="nm-cell"><img src="${isKL?team.logo:team.crest}">${isKL?team.name:team.shortName}</div></td>
      <td>${stats.played || stats.playedGames}</td><td>${stats.win || stats.won}</td><td>${stats.draw}</td><td>${stats.lose || stats.lost}</td>
      <td class="pts">${t.points}</td>
    </tr>`;
  });
  html += `</table></div>`;
  container.innerHTML = html;
}

// ── [복구] 탭 전환 및 기초 기능 ──
function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.si, .nbi').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  if (el) el.classList.add('on');

  if (name === 'home') loadHome();
  if (name === 'std') { renderPills('std'); loadStd(curStd); }
}

function renderPills(type) {
  const sp = document.getElementById(type === 'std' ? 'std-pills' : 'pl-pills');
  sp.innerHTML = LGS.map(l => `<button class="pill ${l.code===curStd?'on':''}" onclick="swStd('${l.code}',this)">${l.name}</button>`).join('');
}

function swStd(code, btn) {
  curStd = code;
  document.querySelectorAll('#std-pills .pill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  loadStd(code);
}

// ── [복구] 온보딩 팀 리스트 렌더링 ──
function renderOb() {
  const list = document.getElementById('ob-list');
  let html = `<div class="ob-lg-hdr" style="background:#3D195B"><span>인기 팀</span></div><div class="ob-grid">`;
  const favTeams = [
    {id:57, lg:'PL', col:'#EF0107', nm:'Arsenal', cr:'https://crests.football-data.org/57.png'},
    {id:65, lg:'PL', col:'#6CABDD', nm:'Man City', cr:'https://crests.football-data.org/65.png'},
    {id:73, lg:'PL', col:'#132257', nm:'Tottenham', cr:'https://crests.football-data.org/73.png'},
    {id:5, lg:'BL1', col:'#DC052D', nm:'Bayern', cr:'https://crests.football-data.org/5.png'},
    {id:2756, lg:'KL1', col:'#003DA5', nm:'수원삼성', cr:'https://media.api-sports.io/football/teams/2756.png'}
  ];
  favTeams.forEach(t => {
    html += `<div class="ob-team" onclick="op(this,${t.id},'${t.lg}','${t.col}','${t.nm}')">
      <img src="${t.cr}"><div class="ob-nm">${t.nm}</div>
    </div>`;
  });
  html += `</div>`;
  list.innerHTML = html;
}

function op(el, id, lg, color, name) {
  document.querySelectorAll('.ob-team').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
  MT = { id, league: lg, name, color, crest: el.querySelector('img').src };
  const btn = document.getElementById('ob-btn');
  btn.classList.add('ready'); btn.disabled = false;
  btn.textContent = `${name} 팬으로 시작하기 →`;
}

function startApp() {
  localStorage.setItem('pp_team', JSON.stringify(MT));
  location.reload();
}

function setTh(th) { document.body.setAttribute('data-theme', th); }
function cm(id) { document.getElementById(id).classList.remove('show'); }

// ── [초기화] ──
const saved = localStorage.getItem('pp_team');
if (saved) {
  MT = JSON.parse(saved);
  document.getElementById('ob').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('hdr-cr').src = MT.crest;
  swP('home');
} else {
  renderOb();
}
</script>
</body>
