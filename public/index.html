<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro | Global Hub</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2305070a'/%3E%3Ccircle cx='32' cy='32' r='26' fill='none' stroke='%2310b981' stroke-width='2.5'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Poppins,Arial Black' font-weight='900' font-size='26' fill='%2310b981'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ── [DESIGN SYSTEM: CINEMATIC NEON] ── */
:root {
  --f: 'Poppins', sans-serif; --f-h: 'Bebas Neue', sans-serif;
  --bg:#05070a; --bg2:#0d1117; --bg3:#161b22; --cd:rgba(20,24,31,0.95);
  --p:#10b981; --ps:rgba(16,185,129,0.12); --pb:rgba(16,185,129,0.28);
  --s:#3b82f6; --t:#f0f6fc; --t2:#8b949e; --t3:#30363d;
  --red:#ef4444; --br:24px; --sh:0 20px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--t); font-family:var(--f); overflow:hidden; -webkit-font-smoothing:antialiased; }
body { background-image: radial-gradient(ellipse at 0% 0%, var(--ps) 0%, transparent 40%); transition: background 0.8s ease; }

/* ── [ONBOARDING] ── */
#ob { position:fixed; inset:0; background:var(--bg); z-index:9999; overflow-y:auto; padding:60px 24px; display:block; }
.ob-header { text-align:center; margin-bottom:50px; }
.ob-header h1 { font-family:var(--f-h); font-size:64px; letter-spacing:4px; margin-bottom:10px; background:linear-gradient(135deg, #fff, var(--p)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.league-section { max-width:1100px; margin:0 auto 50px; }
.league-title { font-family:var(--f-h); font-size:28px; color:var(--p); margin-bottom:24px; border-left:5px solid var(--p); padding-left:18px; letter-spacing:1px; }
.ob-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:18px; }
.ob-team { background:var(--bg2); border:1.5px solid var(--t3); border-radius:20px; padding:25px 10px; text-align:center; cursor:pointer; transition:0.3s; position:relative; }
.ob-team.sel { border-color:var(--p); background:var(--ps); box-shadow:0 15px 30px rgba(16,185,129,0.2); }
.ob-team img { width:55px; height:55px; object-fit:contain; margin-bottom:12px; }
.ob-team span { font-size:12px; font-weight:800; display:block; }
.start-btn { display:block; margin:40px auto; padding:22px 100px; border-radius:100px; border:none; background:var(--p); color:#000; font-weight:900; font-size:20px; cursor:pointer; box-shadow:0 15px 50px var(--ps); }

/* ── [APP LAYOUT] ── */
#app { display:none; height:100vh; flex-direction:column; }
#app.show { display:flex; }
.hdr { height:76px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:rgba(13, 17, 23, 0.95); backdrop-filter:blur(30px); border-bottom:1px solid var(--t3); z-index:1000; }
.hdr-logo { font-family:var(--f-h); font-size:32px; letter-spacing:2px; background: linear-gradient(135deg, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.main-body { flex:1; display:flex; overflow:hidden; }
.sidebar { width:260px; background:var(--bg2); padding:30px 16px; border-right:1px solid var(--t3); display:flex; flex-direction:column; }
.si { display:flex; align-items:center; gap:16px; padding:18px; border-radius:18px; cursor:pointer; color:var(--t2); font-weight:700; margin-bottom:10px; transition:0.3s; }
.si.on { background:var(--ps); color:var(--p); border:1px solid var(--pb); }
.pages { flex:1; overflow-y:auto; padding:40px; scrollbar-width: none; }

/* ── [COMPONENTS: SCHEDULE & CARDS] ── */
.mc { background:var(--cd); border:1px solid var(--t3); border-radius:var(--br); margin-bottom:24px; overflow:hidden; box-shadow:var(--sh); transition:0.3s; }
.lg-hd { padding:22px 28px; background:var(--bg2); border-radius:20px; cursor:pointer; margin-top:20px; border:1px solid var(--t3); display:flex; justify-content:space-between; font-weight:900; font-family:var(--f-h); font-size:22px; }
.lg-ms { display:none; flex-direction:column; }
.lg-ms.open { display:flex; }
.pills { display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; margin-bottom:30px; scrollbar-width: none; }
.pill { padding:14px 28px; border-radius:100px; border:1px solid var(--t3); background:var(--bg2); color:var(--t2); cursor:pointer; font-weight:800; white-space:nowrap; transition:0.3s; }
.pill.on { background:var(--p); color:#000; box-shadow:0 0 25px var(--ps); }

/* AI & STATS */
.ai-card { background:linear-gradient(165deg, #0d1117 0%, #05070a 100%); border:1px solid var(--pb); border-radius:30px; padding:35px; margin-bottom:30px; position:relative; overflow:hidden; }
.stt { width:100%; border-collapse:separate; border-spacing:0 12px; }
.stt td { padding:20px 15px; background:var(--bg2); text-align:center; font-weight:700; border-top:1px solid rgba(255,255,255,0.02); }
.nm-cell { display:flex; align-items:center; gap:20px; text-align:left; }
.nm-cell img { width:32px; height:32px; object-fit:contain; }
</style>
</head>
<body>

<div id="ob">
  <div class="ob-container">
    <div class="ob-header">
      <h1>PITCH PRO</h1>
      <p style="color:var(--t2); font-weight:600;">Choose your clubs to experience global football hub.</p>
    </div>
    <div id="ob-list"></div>
    <button class="start-btn" id="ob-btn" onclick="startApp()" disabled>SELECT TEAM</button>
  </div>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-logo" onclick="location.reload()">PITCH PRO</div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="lpill" style="display:none; color:var(--red); font-weight:900; font-size:12px; text-shadow:0 0 10px var(--red);">● LIVE ACTION</div>
        <div id="team-display" style="display:flex; gap:12px;"></div>
    </div>
  </header>

  <div class="main-body">
    <aside class="sidebar">
      <div class="si on" onclick="swP('home',this)">⚡ LIVE STREAM</div>
      <div class="si" onclick="swP('sched',this)">📅 SCHEDULE</div>
      <div class="si" onclick="swP('ai',this)">🤖 AI PREDICT</div>
      <div class="si" onclick="swP('std',this)">📊 STANDINGS</div>
      <div class="si" onclick="swP('player',this)">👟 PLAYER STATS</div>
      <div class="si" onclick="swP('fan',this)">⭐ FAN ZONE</div>
    </aside>

    <main class="pages">
      <div class="page on" id="pg-home"><div id="home-bd"></div></div>
      <div class="page" id="pg-sched">
        <h1 style="font-family:var(--f-h); font-size:32px; margin-bottom:10px;">APRIL FIXTURES</h1>
        <div id="date-nav" class="pills"></div>
        <div id="sched-bd"></div>
      </div>
      <div class="page" id="pg-ai"><h1 style="font-family:var(--f-h); font-size:32px; margin-bottom:40px;">🤖 AI ANALYSIS</h1><div id="ai-bd"></div></div>
      <div class="page" id="pg-std"><div class="pills" id="std-pills"></div><div id="std-bd"></div></div>
      <div class="page" id="pg-player"><div class="pills" id="pl-pills"></div><div id="pl-bd"></div></div>
      <div class="page" id="pg-fan"><div id="fan-bd"></div></div>
    </main>
  </div>
</div>

<script>
// ── [JS ENGINE: REAL-TIME & 4-MONTH DATA] ──
const API = '/api/football';
const LEAGUES = [
  {n:'Premier League', c:'PL', cr:'https://crests.football-data.org/PL.png'},
  {n:'La Liga', c:'PD', cr:'https://crests.football-data.org/LA.png'},
  {n:'Bundesliga', c:'BL1', cr:'https://crests.football-data.org/BL1.png'},
  {n:'Serie A', c:'SA', cr:'https://crests.football-data.org/SA.png'},
  {n:'Ligue 1', c:'FL1', cr:'https://crests.football-data.org/FL1.png'},
  {n:'K League 1', c:'KL1', cr:'https://media.api-sports.io/football/leagues/292.png'}
];

const TEAMS_DB = [
  {lg:'K League 2', teams:[
    {id:764, n:'Hwaseong FC', col:'#FF5E00', cr:'https://crests.football-data.org/764.png'},
    {id:2756, n:'Suwon Samsung', col:'#003DA5', cr:'https://media.api-sports.io/football/teams/2756.png'},
    {id:2758, n:'Seongnam FC', col:'#000000', cr:'https://media.api-sports.io/football/teams/2758.png'}
  ]},
  {lg:'Premier League', teams:[
    {id:57, n:'Arsenal', col:'#EF0107', cr:'https://crests.football-data.org/57.png'},
    {id:65, n:'Man City', col:'#6CABDD', cr:'https://crests.football-data.org/65.png'},
    {id:64, n:'Liverpool', col:'#C8102E', cr:'https://crests.football-data.org/64.png'}
  ]}
];

let MY_TEAMS = [];
const cache = {};

// [API CORE]
async function fd(path, isStatic = false) {
  const k = path + isStatic;
  if(cache[k] && (Date.now() - cache[k].ts < (isStatic?3600000:60000))) return cache[k].data;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
    const d = await r.json();
    cache[k] = { data: d, ts: Date.now() };
    return d;
  } catch(e) { return null; }
}

// [1. ONBOARDING & THEME]
function initOb() {
  const c = document.getElementById('ob-list');
  c.innerHTML = TEAMS_DB.map(sec => `
    <div class="league-section">
      <div class="league-title">${sec.lg}</div>
      <div class="ob-grid">
        ${sec.teams.map(t => `
          <div class="ob-team" onclick="selectTeam(this, ${JSON.stringify(t).replace(/"/g, '&quot;')})">
            <img src="${t.cr}"><span>${t.n}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function selectTeam(el, team) {
  const idx = MY_TEAMS.findIndex(t => t.id === team.id);
  if(idx > -1) { MY_TEAMS.splice(idx,1); el.classList.remove('sel'); }
  else {
    if(MY_TEAMS.length >= 2) return;
    MY_TEAMS.push(team); el.classList.add('sel');
  }
  if(MY_TEAMS.length > 0) applyTheme(MY_TEAMS[0].color);
  document.getElementById('ob-btn').disabled = MY_TEAMS.length === 0;
  document.getElementById('ob-btn').textContent = MY_TEAMS.length > 0 ? 'SYNC & START' : 'SELECT TEAM';
}

function applyTheme(col) {
  document.documentElement.style.setProperty('--p', col);
  document.documentElement.style.setProperty('--ps', col + '26');
}

function startApp() {
  localStorage.setItem('pp_teams', JSON.stringify(MY_TEAMS));
  document.getElementById('ob').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('team-display').innerHTML = MY_TEAMS.map(t => `<img src="${t.cr}" style="width:24px;">`).join('');
  swP('home');
}

// [2. SCHEDULE: APRIL FULL + ACCORDION]
async function loadSched(date = "2026-04-12") {
  const c = document.getElementById('sched-bd');
  c.innerHTML = '<div style="text-align:center; padding:50px;">FETCHING FIXTURES...</div>';
  const d = await fd(`/matches?dateFrom=${date}&dateTo=${date}`);
  if(!d?.matches?.length) { c.innerHTML = '<div style="padding:100px; text-align:center; color:var(--t2);">No matches found.</div>'; return; }

  const groups = d.matches.reduce((acc, m) => {
    acc[m.competition.name] = acc[m.competition.name] || [];
    acc[m.competition.name].push(m); return acc;
  }, {});

  c.innerHTML = Object.entries(groups).map(([name, ms], i) => `
    <div class="lg-hd" onclick="this.nextElementSibling.classList.toggle('open')">
      <span>${name.toUpperCase()}</span><span>${ms.length} ▾</span>
    </div>
    <div class="lg-ms open">
      ${ms.map(m => `
        <div class="mc" style="margin-top:10px; padding:20px; display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:12px; color:var(--t3);">${m.utcDate.slice(11,16)}</span>
          <span style="flex:1; text-align:center; font-weight:800;">${m.homeTeam.shortName} vs ${m.awayTeam.shortName}</span>
          <span style="color:var(--p); font-weight:900;">${m.score.fullTime.home??'-'}:${m.score.fullTime.away??'-'}</span>
        </div>`).join('')}
    </div>`).join('');
}

function initDateNav() {
  const nav = document.getElementById('date-nav');
  if(nav.innerHTML) return;
  for(let i=1; i<=30; i++) {
    const ds = `2026-04-${String(i).padStart(2,'0')}`;
    const btn = document.createElement('button');
    btn.className = `pill ${i===12?'on':''}`;
    btn.textContent = `4/${i}`;
    btn.onclick = () => { document.querySelectorAll('#date-nav .pill').forEach(p=>p.classList.remove('on')); btn.classList.add('on'); loadSched(ds); };
    nav.appendChild(btn);
  }
}

// [3. LIVE & OTHER TABS]
async function loadHome() {
  const c = document.getElementById('home-bd');
  const d = await fd('/matches');
  if(!d?.matches) return;
  const live = d.matches.filter(m => ['IN_PLAY','HALFTIME'].includes(m.status));
  document.getElementById('lpill').style.display = live.length ? 'block' : 'none';
  c.innerHTML = live.map(m => `<div class="mc" style="padding:40px 20px; text-align:center;">
    <div style="font-size:11px; color:var(--p); font-weight:800; margin-bottom:15px;">${m.competition.name}</div>
    <div style="display:flex; justify-content:space-around; align-items:center;">
      <b style="font-size:24px;">${m.homeTeam.shortName}</b>
      <div style="font-size:48px; font-weight:900; font-family:var(--f-h);">${m.score.fullTime.home}:${m.score.fullTime.away}</div>
      <b style="font-size:24px;">${m.awayTeam.shortName}</b>
    </div>
  </div>`).join('') || '<div style="text-align:center; padding:100px; color:var(--t3);">NO LIVE ACTION.</div>';
}

async function loadStd(code) {
  const c = document.getElementById('std-bd');
  const d = await fd(`/competitions/${code}/standings`, true);
  if(!d.standings) return;
  const rows = d.standings[0].table;
  c.innerHTML = `<table class="stt"><tr><th>#</th><th>CLUB</th><th>PTS</th></tr>` + 
    rows.map(r => `<tr><td>${r.position}</td><td class="nm-cell"><img src="${r.team.crest}">${r.team.shortName}</td><td style="color:var(--p);">${r.points}</td></tr>`).join('') + `</table>`;
}

function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
  if(el) el.classList.add('on');
  if(name === 'home') loadHome();
  if(name === 'sched') { initDateNav(); loadSched(); }
  if(name === 'std') {
    const sp = document.getElementById('std-pills');
    if(!sp.innerHTML) sp.innerHTML = LEAGUES.map(l => `<button class="pill" onclick="loadStd('${l.c}')">${l.n}</button>`).join('');
    loadStd('PL');
  }
}

// INITIAL CHECK
window.onload = () => {
  const saved = localStorage.getItem('pp_teams');
  if(saved) { MY_TEAMS = JSON.parse(saved); applyTheme(MY_TEAMS[0].color); startApp(); }
  else { initOb(); }
};
</script>
</body>
</html>
