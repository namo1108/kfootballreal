<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PITCH Pro — Club Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12;
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.3);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; }
        
        #onboarding { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; z-index: 1000; }
        .ob-header { text-align: center; padding: 30px 20px 15px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p-color); letter-spacing: 3px; text-shadow: 0 0 15px var(--p-glow); }
        .ob-sub { color: var(--t2); font-size: 11px; margin-top: 5px; }

        /* 리그 선택 탭 */
        .lg-nav { display: flex; overflow-x: auto; padding: 10px 15px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0; gap: 8px; scrollbar-width: none; }
        .lg-nav::-webkit-scrollbar { display: none; }
        .lg-tab { padding: 8px 16px; background: rgba(255,255,255,0.02); border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .lg-tab.active { background: var(--p-glow); color: var(--p-color); border-color: rgba(0,255,135,0.2); }

        /* 팀 그리드 컨테이너 */
        .grid-container { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .grid-container.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        /* 팀 카드 */
        .t-item { background: var(--bg2); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .t-item:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
        .t-item img { width: 100%; max-width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
        .t-item div { font-size: 9px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .hidden { display: none !important; }
        #main-app { padding: 50px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT YOUR CLUB</div>
            <p class="ob-sub">유럽 5대 리그 전체 팀 중 하나를 선택하세요.</p>
        </div>

        <div class="lg-nav" id="lg-nav"></div>
        <div id="grid-area" style="flex:1; overflow:hidden; position:relative;"></div>
    </div>

    <div id="main-app" class="hidden">
        <h1 id="selected-team-name" style="font-family:'Orbitron'; color:var(--p-color);">TEAM SELECTED</h1>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px; background:var(--p-color); border:none; border-radius:5px;">RESET</button>
    </div>

    <script>
        // 코드 내부에 데이터를 직접 포함하여 빈 화면 방지
        const teamsData = [
            { id: "PL", sn: "EPL", teams: [
                { id: 73, n: "Tottenham", c: "#ffffff" }, { id: 65, n: "Man City", c: "#6caddf" },
                { id: 57, n: "Arsenal", c: "#ef0107" }, { id: 64, n: "Liverpool", c: "#e31b23" },
                { id: 66, n: "Man Utd", c: "#da291c" }, { id: 61, n: "Chelsea", c: "#034694" },
                { id: 76, n: "Wolves", c: "#fdb913" }, { id: 58, n: "Aston Villa", c: "#95bfe5" }
            ]},
            { id: "PD", sn: "LALIGA", teams: [
                { id: 86, n: "Real Madrid", c: "#ffffff" }, { id: 81, n: "Barcelona", c: "#a50044" },
                { id: 78, n: "Atletico", c: "#cb3524" }, { id: 92, n: "Real Sociedad", c: "#0067b1" },
                { id: 94, n: "Villarreal", c: "#fee300" }, { id: 558, n: "Sevilla", c: "#f43333" }
            ]},
            { id: "BL1", sn: "BUNDES", teams: [
                { id: 503, n: "FC Bayern", c: "#dc052d" }, { id: 4, n: "Dortmund", c: "#fde100" },
                { id: 3, n: "Leverkusen", c: "#e32221" }, { id: 28, n: "RB Leipzig", c: "#dd013f" }
            ]},
            { id: "SA", sn: "SERIE A", teams: [
                { id: 108, n: "Inter", c: "#0066b2" }, { id: 113, n: "Napoli", c: "#007fff" },
                { id: 98, n: "Milan", c: "#fb090b" }, { id: 109, n: "Juventus", c: "#ffffff" },
                { id: 100, n: "Roma", c: "#8e1f2f" }
            ]},
            { id: "FL1", sn: "LIGUE 1", teams: [
                { id: 524, n: "PSG", c: "#004170" }, { id: 516, n: "Marseille", c: "#00abf3" },
                { id: 548, n: "Monaco", c: "#ed1c24" }, { id: 523, n: "Lyon", c: "#da0812" }
            ]}
        ];

        const nav = document.getElementById('lg-nav');
        const area = document.getElementById('grid-area');

        function init() {
            teamsData.forEach((league, idx) => {
                // 탭 버튼 생성
                const btn = document.createElement('div');
                btn.className = `lg-tab ${idx === 0 ? 'active' : ''}`;
                btn.innerText = league.sn;
                btn.onclick = () => showLeague(idx);
                nav.appendChild(btn);

                // 그리드 생성
                const gridCont = document.createElement('div');
                gridCont.className = `grid-container ${idx === 0 ? 'active' : ''}`;
                gridCont.id = `grid-${idx}`;
                
                const grid = document.createElement('div');
                grid.className = 'team-grid';

                league.teams.forEach(team => {
                    const item = document.createElement('div');
                    item.className = 't-item';
                    item.innerHTML = `
                        <img src="https://crests.football-data.org/${team.id}.svg" alt="">
                        <div>${team.n}</div>
                    `;
                    item.onclick = () => select(team);
                    grid.appendChild(item);
                });

                gridCont.appendChild(grid);
                area.appendChild(gridCont);
            });
        }

        function showLeague(idx) {
            document.querySelectorAll('.lg-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.lg-tab')[idx].classList.add('active');
            document.querySelectorAll('.grid-container').forEach(g => g.classList.remove('active'));
            document.getElementById(`grid-${idx}`).classList.add('active');
        }

        function select(team) {
            document.documentElement.style.setProperty('--p-color', team.c);
            document.getElementById('selected-team-name').innerText = team.n.toUpperCase();
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
