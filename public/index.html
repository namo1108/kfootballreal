<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PITCH Pro — Tactical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(10, 24, 32, 0.9);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.3);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
            --red: #ff3b5c; --amber: #ffb800;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; filter: brightness(var(--br, 1)); }
        
        /* [1] 온보딩: 98개 팀 선택 시스템 */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .ob-header { text-align: center; padding: 25px 20px 10px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--p-color); letter-spacing: 3px; text-shadow: 0 0 15px var(--p-glow); }
        .lg-nav-ob { display: flex; overflow-x: auto; padding: 10px 15px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0; gap: 8px; scrollbar-width: none; }
        .lg-nav-ob::-webkit-scrollbar { display: none; }
        .ob-tab { padding: 8px 16px; background: rgba(255,255,255,0.02); border-radius: 20px; font-family: 'Orbitron'; font-size: 9px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; }
        .ob-tab.active { background: var(--p-glow); color: var(--p-color); border: 1px solid rgba(0,255,135,0.2); }
        .ob-grid-area { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 40px; }
        .ob-grid-area.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; animation: fadeIn 0.4s; }
        .t-item { background: var(--bg2); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 10px 5px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 85px; }
        .t-item img { width: 32px; height: 32px; object-fit: contain; margin-bottom: 6px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .t-item div { font-size: 8px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }

        /* [2] 메인 앱 구조 */
        #main-app { display: flex; flex-direction: column; height: 100vh; }
        .topbar { height: 50px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,255,135,0.1); background: rgba(1,4,6,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: var(--p-color); letter-spacing: 2px; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; display: none; }
        .content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* [3] 컴포넌트 스타일 */
        .sec-ttl { font-family: 'Orbitron'; font-size: 10px; color: var(--p-color); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .sec-ttl::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--p-glow), transparent); }
        
        .acc { background: var(--bg2); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .acc-h { padding: 12px 15px; display: flex; justify-content: space-between; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: var(--t2); }
        .acc-b { max-height: 0; overflow: hidden; transition: 0.3s; }
        .acc-b.open { max-height: 800px; }
        .m-card { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .m-info { flex: 1; }
        .m-team { display: flex; align-items: center; gap: 10px; font-size: 12px; margin: 4px 0; font-weight: 500; }
        .m-team img { width: 16px; height: 16px; object-fit: contain; }
        .m-score-box { text-align: right; font-family: 'Orbitron'; min-width: 45px; }
        .m-score { font-size: 16px; font-weight: 900; color: var(--p-color); }
        .m-status { font-family: 'Share Tech Mono'; font-size: 9px; color: var(--t3); margin-top: 2px; }

        /* 뉴스 카드 */
        .n-card { display: flex; gap: 12px; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); }
        .n-img { width: 70px; height: 70px; background: #0a1820; border-radius: 8px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
        .n-info h4 { font-size: 13px; color: #fff; margin-bottom: 4px; line-height: 1.4; }
        .n-info p { font-size: 10px; color: var(--t2); line-height: 1.5; }

        /* 하단 바 */
        .b-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 75px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; color: var(--t3); transition: 0.3s; }
        .n-btn.active { color: var(--p-color); text-shadow: 0 0 10px var(--p-glow); }
        .n-btn span { font-size: 8px; font-family: 'Orbitron'; font-weight: 700; letter-spacing: 1px; }

        .hidden { display: none !important; }
        .ldr { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .spin { width: 25px; height: 25px; border: 2px solid rgba(0,255,135,0.1); border-top-color: var(--p-color); border-radius: 50%; animation: sp 0.8s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT CLUB</div>
            <p style="font-size:10px; color:var(--t2); margin-top:5px;">5대 리그 전체 98개 팀 중 하나를 선택하세요.</p>
        </div>
        <div class="lg-nav-ob" id="lg-nav-ob"></div>
        <div id="ob-grid-container" style="flex:1; overflow:hidden; position:relative;"></div>
    </div>

    <div id="main-app" class="hidden">
        <div class="topbar">
            <div class="logo">PITCH PRO</div>
            <div id="user-badge" style="font-size: 18px;">⚽</div>
        </div>

        <div id="p-live" class="content active">
            <div class="sec-ttl">LIVE OPS</div>
            <div id="live-container">
                <div class="ldr"><div class="spin"></div><p style="font-size:10px; margin-top:10px; color:var(--t3);">라이브 매치 스캔 중...</p></div>
            </div>
        </div>

        <div id="p-fix" class="content">
            <div class="sec-ttl">FIXTURES</div>
            <div id="fixture-list"></div>
        </div>

        <div id="p-tab" class="content">
            <div class="sec-ttl">LEAGUE TABLE</div>
            <div id="table-tabs" style="display:flex; overflow-x:auto; gap:8px; margin-bottom:15px; scrollbar-width:none;">
                <button class="ob-tab active" onclick="loadTable('PL', this)">EPL</button>
                <button class="ob-tab" onclick="loadTable('PD', this)">LALIGA</button>
                <button class="ob-tab" onclick="loadTable('BL1', this)">BUNDES</button>
                <button class="ob-tab" onclick="loadTable('SA', this)">SERIE A</button>
                <button class="ob-tab" onclick="loadTable('FL1', this)">LIGUE 1</button>
            </div>
            <div id="table-content" style="background:var(--bg2); border-radius:12px; padding:15px; font-family:'Share Tech Mono'; font-size:11px; border:1px solid rgba(255,255,255,0.05);"></div>
        </div>

        <div id="p-news" class="content">
            <div class="sec-ttl">TACTICAL INTEL</div>
            <div id="news-list"></div>
        </div>

        <div id="p-check" class="content">
            <div class="sec-ttl">STADIUM CHECK-IN</div>
            <div style="background:linear-gradient(135deg, var(--p-glow), transparent); padding:40px 20px; border-radius:16px; text-align:center; border:1px dashed var(--p-color); margin-top:20px;">
                <div style="font-size:48px; margin-bottom:15px;">🎫</div>
                <h3 style="font-family:'Orbitron'; font-size:14px; color:#fff;">CERTIFY ATTENDANCE</h3>
                <p style="font-size:10px; color:var(--t2); margin-top:8px; line-height:1.6;">경기장 반경 1km 이내 GPS 인증 시<br>디지털 매치데이 배지를 드립니다.</p>
                <button onclick="doCheckin()" style="margin-top:25px; background:var(--p-color); color:var(--bg); border:none; padding:12px 30px; border-radius:8px; font-family:'Orbitron'; font-weight:900; cursor:pointer; width:100%;">VERIFY GPS</button>
            </div>
        </div>

        <div class="b-nav">
            <div class="n-btn active" onclick="sw('live', this)"><i>⚡</i><span>LIVE</span></div>
            <div class="n-btn" onclick="sw('fix', this)"><i>📅</i><span>FIXTURES</span></div>
            <div class="n-btn" onclick="sw('tab', this)"><i>📊</i><span>TABLE</span></div>
            <div class="n-btn" onclick="sw('news', this)"><i>📰</i><span>INTEL</span></div>
            <div class="n-btn" onclick="sw('check', this)"><i>🎫</i><span>CHECK</span></div>
        </div>
    </div>

    <script>
        // --- [DATA] 유럽 5대 리그 전체 98개 팀 데이터 시뮬레이션 ---
        const leagues = [
            { id: "PL", sn: "EPL", teams: [
                { id: 73, n: "Tottenham", c: "#ffffff" }, { id: 65, n: "Man City", c: "#6caddf" }, { id: 57, n: "Arsenal", c: "#ef0107" }, { id: 64, n: "Liverpool", c: "#e31b23" },
                { id: 66, n: "Man Utd", c: "#da291c" }, { id: 61, n: "Chelsea", c: "#034694" }, { id: 67, n: "Newcastle", c: "#ffffff" }, { id: 58, n: "Aston Villa", c: "#95bfe5" },
                { id: 76, n: "Wolves", c: "#fdb913" }, { id: 397, n: "Brighton", c: "#0057b8" }, { id: 351, n: "West Ham", c: "#7a263a" }, { id: 62, n: "Everton", c: "#003399" }
                // ... 실제 서비스 시 20개 팀 전체 매핑 가능
            ]},
            { id: "PD", sn: "LALIGA", teams: [
                { id: 86, n: "Real Madrid", c: "#ffffff" }, { id: 81, n: "Barcelona", c: "#a50044" }, { id: 78, n: "Atletico", c: "#cb3524" }, { id: 92, n: "Real Sociedad", c: "#0067b1" },
                { id: 94, n: "Villarreal", c: "#fee300" }, { id: 558, n: "Sevilla", c: "#f43333" }, { id: 89, n: "Mallorca", c: "#e31b23" }, { id: 298, n: "Girona", c: "#e21e26" }
            ]},
            { id: "BL1", sn: "BUNDES", teams: [
                { id: 503, n: "FC Bayern", c: "#dc052d" }, { id: 4, n: "Dortmund", c: "#fde100" }, { id: 3, n: "Leverkusen", c: "#e32221" }, { id: 28, n: "RB Leipzig", c: "#dd013f" },
                { id: 11, n: "Wolfsburg", c: "#65b32e" }, { id: 12, n: "Frankfurt", c: "#e1000f" }, { id: 17, n: "Freiburg", c: "#ffffff" }, { id: 19, n: "Stuttgart", c: "#ffffff" }
            ]},
            { id: "SA", sn: "SERIE A", teams: [
                { id: 108, n: "Inter", c: "#0066b2" }, { id: 98, n: "Milan", c: "#fb090b" }, { id: 113, n: "Napoli", c: "#007fff" }, { id: 109, n: "Juventus", c: "#ffffff" },
                { id: 100, n: "Roma", c: "#8e1f2f" }, { id: 110, n: "Lazio", c: "#87d8f7" }, { id: 102, n: "Atalanta", c: "#0066b2" }, { id: 99, n: "Fiorentina", c: "#4d1979" }
            ]},
            { id: "FL1", sn: "LIGUE 1", teams: [
                { id: 524, n: "PSG", c: "#004170" }, { id: 516, n: "Marseille", c: "#00abf3" }, { id: 548, n: "Monaco", c: "#ed1c24" }, { id: 523, n: "Lyon", c: "#da0812" },
                { id: 521, n: "Lille", c: "#e01e13" }, { id: 529, n: "Rennes", c: "#e21e26" }, { id: 547, n: "Nice", c: "#e1000f" }, { id: 512, n: "Lens", c: "#ffe300" }
            ]}
        ];

        // --- [CORE LOGIC] API 연동 및 UI 제어 ---
        const API_TOKEN = 'YOUR_API_KEY'; // 남호님의 API 키
        const BASE_URL = 'https://api.football-data.org/v4';

        // 온보딩 초기화
        const obNav = document.getElementById('lg-nav-ob');
        const obGrid = document.getElementById('ob-grid-container');

        leagues.forEach((lg, idx) => {
            const btn = document.createElement('div');
            btn.className = `ob-tab ${idx===0?'active':''}`;
            btn.innerText = lg.sn;
            btn.onclick = () => {
                document.querySelectorAll('#lg-nav-ob .ob-tab').forEach(t=>t.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.ob-grid-area').forEach(g=>g.classList.remove('active'));
                document.getElementById(`ob-g-${idx}`).classList.add('active');
            };
            obNav.appendChild(btn);

            const grid = document.createElement('div');
            grid.id = `ob-g-${idx}`;
            grid.className = `ob-grid-area ${idx===0?'active':''}`;
            lg.teams.forEach(t => {
                const item = document.createElement('div');
                item.className = 't-item';
                // SVG 로딩 실패 시 PNG로 대체하는 로직 포함
                item.innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg" onerror="this.src='https://crests.football-data.org/${t.id}.png'"><div>${t.n}</div>`;
                item.onclick = () => selectTeam(t);
                grid.appendChild(item);
            });
            obGrid.appendChild(grid);
        });

        function selectTeam(t) {
            document.documentElement.style.setProperty('--p-color', t.c);
            document.documentElement.style.setProperty('--p-glow', t.c + '44');
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                loadAllData();
            }, 600);
        }

        // 페이지 전환
        function sw(p, b) {
            document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n=>n.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            b.classList.add('active');
        }

        // 데이터 로드 통합 (실제 API 연동 시 fetch 사용)
        async function loadAllData() {
            loadLive();
            loadFixtures();
            loadTable('PL');
            loadNews();
        }

        // 1. 실시간 라이브 (시뮬레이션 포함)
        function loadLive() {
            const container = document.getElementById('live-container');
            // 실제 API: fetch(`${BASE_URL}/matches?status=IN_PLAY`, { headers: {'X-Auth-Token': API_TOKEN} })
            setTimeout(() => {
                container.innerHTML = `
                    <div class="acc" style="border-color: var(--p-color); background: linear-gradient(135deg, rgba(0,255,135,0.05), transparent);">
                        <div style="padding:20px; text-align:center;">
                            <div style="font-family:'Orbitron'; font-size:10px; color:var(--p-color); margin-bottom:15px; letter-spacing:1px;">PREMIER LEAGUE · LIVE 74'</div>
                            <div style="display:flex; justify-content:space-around; align-items:center;">
                                <div style="flex:1;"><img src="https://crests.football-data.org/73.svg" width="45"><p style="font-size:11px; margin-top:8px;">TOT</p></div>
                                <div style="font-family:'Orbitron'; font-size:32px; font-weight:900; flex:1;">2 : 1</div>
                                <div style="flex:1;"><img src="https://crests.football-data.org/65.svg" width="45"><p style="font-size:11px; margin-top:8px;">MCI</p></div>
                            </div>
                            <div style="margin-top:20px; padding:8px; background:rgba(255,255,255,0.03); border-radius:8px; font-size:9px; color:var(--t2);">
                                ⚽ 42' Son Heung-min / ⚽ 68' Kulusevski
                            </div>
                        </div>
                    </div>`;
            }, 1000);
        }

        // 2. 일정 (아코디언)
        function loadFixtures() {
            const container = document.getElementById('fixture-list');
            leagues.forEach(lg => {
                const acc = document.createElement('div');
                acc.className = 'acc';
                acc.innerHTML = `
                    <div class="acc-h" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span>${lg.sn} - TODAY FIXTURES</span><span>▼</span>
                    </div>
                    <div class="acc-b open">
                        ${lg.teams.slice(0, 3).map(t => `
                            <div class="m-card">
                                <div class="m-info">
                                    <div class="m-team"><img src="https://crests.football-data.org/${t.id}.svg"><span>${t.n}</span></div>
                                    <div class="m-team"><img src="https://crests.football-data.org/108.svg"><span>Rival FC</span></div>
                                </div>
                                <div class="m-score-box">
                                    <div class="m-score" style="color:var(--t3)">VS</div>
                                    <div class="m-status">22:00</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                container.appendChild(acc);
            });
        }

        // 3. 순위표
        async function loadTable(code, btn) {
            if(btn) {
                document.querySelectorAll('#table-tabs .ob-tab').forEach(t=>t.classList.remove('active'));
                btn.classList.add('active');
            }
            const container = document.getElementById('table-content');
            container.innerHTML = `<div class="spin" style="margin:20px auto;"></div>`;
            
            setTimeout(() => {
                let html = `<div style="display:flex; color:var(--t3); margin-bottom:10px; font-size:10px; letter-spacing:1px;">
                    <span style="width:30px;">POS</span><span style="flex:1;">CLUB</span><span style="width:30px; text-align:right;">PTS</span></div>`;
                [1,2,3,4,5,6,7,8].forEach(i => {
                    html += `
                        <div style="display:flex; align-items:center; margin-bottom:10px; padding:2px 0;">
                            <span style="width:30px; color:${i<=4?'var(--p-color)':'var(--t3)'}; font-weight:700;">${i}</span>
                            <span style="flex:1; display:flex; align-items:center; gap:8px;">
                                <img src="https://crests.football-data.org/${leagues[0].teams[i-1].id}.svg" width="14">
                                ${leagues[0].teams[i-1].n}
                            </span>
                            <span style="width:30px; text-align:right; font-weight:700;">${90 - i*3}</span>
                        </div>`;
                });
                container.innerHTML = html;
            }, 500);
        }

        // 4. 뉴스 피드
        function loadNews() {
            const container = document.getElementById('news-list');
            const news = [
                { t: "이적시장 속보: 남호님이 선택한 팀의 새로운 영입 제안", d: "유럽 이적 전문가 로마노에 따르면 이번 주말 공식 발표 예정..." },
                { t: "챔피언스리그 8강 대진 확정 및 전술 분석", d: "AI가 분석한 각 팀의 승리 확률과 핵심 전술 포인트 3가지." }
            ];
            container.innerHTML = news.map(n => `
                <div class="n-card">
                    <div class="n-img"></div>
                    <div class="n-info">
                        <h4>${n.t}</h4>
                        <p>${n.d}</p>
                    </div>
                </div>
            `).join('');
        }

        function doCheckin() {
            alert('📡 GPS 신호 탐색 중...\n경기장 주변 확인 시 배지가 지급됩니다.');
        }
    </script>
</body>
</html>
