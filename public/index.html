<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PITCH IN | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #10b981;
            --ps: rgba(16, 185, 129, 0.12);
            --pb: rgba(16, 185, 129, 0.25);
            --bg: #05070a;
            --bg-sidebar: #080a0f;
            --card: rgba(22, 27, 34, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --red: #ef4444;
            --blue: #3b82f6;
            --amber: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh; font-size: 14px; }

        /* --- 레이아웃 구조 --- */
        #app { display: none; grid-template-columns: 260px 1fr 320px; height: 100vh; }
        #app.on { display: grid; }

        /* PC 와이드 모드 */
        @media (min-width: 1400px) {
            #app { grid-template-columns: 280px 1fr 380px; }
        }

        /* 태블릿 모드 */
        @media (max-width: 1200px) {
            #app { grid-template-columns: 80px 1fr; }
            .widget-area { display: none; }
            .nav-text { display: none; }
        }

        /* 모바일 모드 */
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .bnav { display: flex; }
            .main-container { padding-bottom: 80px; }
        }

        /* --- 사이드바 --- */
        .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 6px; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; margin-bottom: 32px; padding: 0 12px; color: var(--p); cursor: pointer; text-decoration: none; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 16px; cursor: pointer; color: var(--text-dim); font-weight: 600; transition: 0.2s; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { background: var(--ps); color: var(--p); border: 1px solid var(--pb); }
        .nav-icon { font-size: 20px; width: 24px; text-align: center; }

        /* --- 메인 컨테이너 --- */
        .main-container { overflow-y: auto; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top left, var(--ps), transparent 40%); }
        header { position: sticky; top: 0; height: 70px; background: rgba(5,7,10,0.8); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid var(--border); z-index: 100; }
        .team-pill { display: flex; align-items: center; gap: 10px; background: var(--ps); padding: 6px 16px; border-radius: 100px; border: 1.5px solid var(--pb); cursor: pointer; }
        .team-pill img { width: 24px; height: 24px; object-fit: contain; }
        .team-pill span { font-weight: 700; font-size: 14px; color: var(--p); }

        .content { padding: 32px; max-width: 1000px; margin: 0 auto; width: 100%; }
        @media (max-width: 768px) { .content { padding: 16px; } header { padding: 0 16px; } }

        /* --- 컴포넌트 --- */
        .stl { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .stl h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .stl::before { content: ''; width: 4px; height: 20px; background: var(--p); border-radius: 4px; }

        /* 매치 카드 */
        .mc { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 16px; transition: 0.3s; cursor: pointer; }
        .mc:hover { transform: translateY(-4px); border-color: var(--p); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .mc-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
        .m-team { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .m-team img { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .m-name { font-weight: 700; font-size: 13px; color: #fff; }
        .m-score { background: #000; padding: 10px 24px; border-radius: 16px; font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; border: 1px solid var(--border); min-width: 110px; text-align: center; }
        .m-score.live { color: var(--p); border-color: var(--p); box-shadow: 0 0 20px var(--ps); }
        .m-meta { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 12px; font-weight: 600; display: flex; justify-content: center; gap: 10px; }

        /* 필터 피커 */
        .picker { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 24px; padding: 4px 0; }
        .picker::-webkit-scrollbar { display: none; }
        .p-btn { flex-shrink: 0; background: #0d1117; border: 1px solid var(--border); border-radius: 14px; padding: 12px 20px; font-weight: 700; color: var(--text-dim); cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 13px; }
        .p-btn.on { background: var(--p); color: #000; border-color: var(--p); }

        /* --- AI PITCH 상시 분석 레이아웃 --- */
        .ai-pitch-card { background: linear-gradient(145deg, #0d1117, #05070a); border: 1px solid var(--pb); border-radius: 32px; padding: 32px; margin-bottom: 24px; position: relative; overflow: hidden; }
        .ai-field { background: rgba(16, 185, 129, 0.05); border: 2px solid rgba(16, 185, 129, 0.2); border-radius: 20px; height: 200px; margin: 24px 0; position: relative; display: flex; align-items: center; justify-content: center; }
        .ai-field::before { content: ''; position: absolute; width: 100%; height: 1px; background: rgba(16, 185, 129, 0.2); }
        .ai-field::after { content: ''; position: absolute; width: 100px; height: 100px; border: 2px solid rgba(16, 185, 129, 0.2); border-radius: 50%; }
        .ai-tactic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
        .ai-tactic-item { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .ai-tactic-item h4 { font-size: 14px; color: var(--p); margin-bottom: 8px; font-weight: 800; }
        .ai-prob-bar { height: 12px; background: rgba(255,255,255,0.05); border-radius: 100px; overflow: hidden; display: flex; margin: 15px 0; }
        .ai-prob-fill { height: 100%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- 테이블 디자인 --- */
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        .data-table th { padding: 14px; text-align: left; color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .data-table td { padding: 14px; background: rgba(255,255,255,0.02); font-size: 14px; font-weight: 600; }
        .data-table tr td:first-child { border-radius: 16px 0 0 16px; width: 50px; text-align: center; }
        .data-table tr td:last-child { border-radius: 0 16px 16px 0; }
        .t-rank { font-weight: 900; font-family: 'JetBrains Mono'; }
        .t-rank.top { color: var(--p); }
        .t-team { display: flex; align-items: center; gap: 10px; }
        .t-team img { width: 24px; height: 24px; object-fit: contain; }

        /* --- 위젯 --- */
        .widget-area { background: var(--bg); border-left: 1px solid var(--border); padding: 32px 24px; overflow-y: auto; }
        .widget { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 24px; border: 1px solid var(--border); }
        .widget-ttl { font-size: 14px; font-weight: 800; color: var(--text-dim); margin-bottom: 16px; }

        /* --- 바텀 네비 --- */
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; height: 74px; background: rgba(8,10,15,0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; z-index: 500; }
        .bn-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); text-decoration: none; font-size: 11px; font-weight: 700; transition: 0.2s; }
        .bn-item.active { color: var(--p); }

        /* --- 온보딩 --- */
        #ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 48px 24px 120px; }
        .ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .ob-team { background: #0d1117; border: 1.5px solid var(--border); border-radius: 20px; padding: 16px 10px; cursor: pointer; transition: 0.2s; text-align: center; }
        .ob-team.sel { background: var(--ps); border-color: var(--p); box-shadow: 0 8px 20px var(--ps); }
        .ob-crest { width: 44px; height: 44px; object-fit: contain; margin-bottom: 10px; }

        .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 0; gap: 16px; }
        .spinner { width: 34px; height: 34px; border: 3.5px solid rgba(255,255,255,0.05); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Onboarding -->
    <div id="ob">
        <div class="ob-wrap" style="max-width:900px; margin:0 auto; text-align:center;">
            <h1 style="font-size:36px; font-weight:900; margin-bottom:8px;">PITCH IN</h1>
            <p style="color:var(--text-dim); margin-bottom:32px;">분석하고, 응원하고, 소통하라. 당신의 클럽을 선택하세요.</p>
            <div id="ob-tabs" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:24px; padding-bottom:12px;"></div>
            <div id="ob-grid" class="ob-grid"></div>
        </div>
        <div style="position:fixed; bottom:0; left:0; right:0; padding:32px; background:linear-gradient(to top, var(--bg) 60%, transparent); text-align:center;">
            <button id="ob-start" onclick="startApp()" disabled style="background:var(--p); color:#000; border:none; padding:18px 60px; border-radius:100px; font-weight:900; font-size:17px; cursor:pointer;">팀을 선택해주세요</button>
        </div>
    </div>

    <!-- App Main -->
    <div id="app">
        <aside class="sidebar">
            <a class="logo" onclick="location.reload()">PITCH IN</a>
            <nav id="pc-nav"></nav>
        </aside>

        <main class="main-container">
            <header>
                <div class="team-pill" onclick="resetApp()" id="header-team"></div>
                <div class="lv-badge" id="lv-badge">Lv.1 Rookie</div>
            </header>
            <div class="content" id="main-content"></div>
        </main>

        <aside class="widget-area">
            <div class="widget">
                <div class="widget-ttl">🔥 실시간 순위 하이라이트</div>
                <div id="mini-std"></div>
            </div>
            <div class="widget" style="border-color: var(--p);">
                <div class="widget-ttl" style="color: var(--p);">✨ AI Pick: Today</div>
                <div id="ai-mini-pick">
                    <p style="font-size:12px; line-height:1.6;">리버풀의 최근 원정 승률은 82%입니다. 살라의 측면 돌파가 관건이 될 것입니다.</p>
                </div>
            </div>
        </aside>

        <nav class="bnav" id="mb-nav"></nav>
    </div>

    <!-- UI Logic Scripts -->
    <script>
        const API = '/api/football';
        let SEL = JSON.parse(localStorage.getItem('pi_sel') || '[]');
        let curPage = 'home', curLg = 'PL', curStat = 'scorers', obLg = 'PL';
        const _cache = {};

        const LEAGUES = [
            { n:'Premier League', c:'PL', teams:[
                {ko:'노팅엄',id:351, col:'#DD0000'}, {ko:'뉴캐슬',id:67, col:'#241F20'}, {ko:'리버풀',id:64, col:'#C8102E'}, {ko:'리즈',id:341, col:'#FFCD00'},
                {ko:'맨시티',id:65, col:'#6CABDD'}, {ko:'맨유',id:66, col:'#DA291C'}, {ko:'번리',id:328, col:'#6C1D45'}, {ko:'본머스',id:1044, col:'#DA291C'},
                {ko:'브라이튼',id:397, col:'#0057B8'}, {ko:'브렌트포드',id:402, col:'#E30613'}, {ko:'선덜랜드',id:385, col:'#FF0000', src:'image_0aa60b.png'}, {ko:'아스날',id:57, col:'#EF0107'},
                {ko:'애스턴 빌라',id:58, col:'#670E36'}, {ko:'에버튼',id:62, col:'#003399'}, {ko:'울버햄튼',id:76, col:'#FDB913'}, {ko:'웨스트햄',id:563, col:'#7A263A'},
                {ko:'첼시',id:61, col:'#034694'}, {ko:'토트넘',id:73, col:'#132257'}, {ko:'팰리스',id:354, col:'#1B458F'}, {ko:'풀럼',id:63, col:'#000000'}
            ]},
            { n:'La Liga', c:'PD', teams:[
                {ko:'라요',id:726, src:'image_0b1247.png', col:'#E30613'}, {ko:'레반테',id:745, src:'image_0b1265.png', col:'#005DA9'}, {ko:'레알 마드리드',id:86, col:'#FFFFFF'}, {ko:'마요르카',id:279, src:'image_0b126d.png', col:'#E2001A'},
                {ko:'바르셀로나',id:81, col:'#004D98'}, {ko:'세비야',id:82, src:'image_0b160a.png', col:'#C4041C'}, {ko:'소시에다드',id:92, col:'#0067B1'}, {ko:'아틀레티코',id:78, col:'#CB3524'}
            ]},
            { n:'Bundesliga', c:'BL1', teams:[] },
            { n:'Serie A', c:'SA', teams:[] },
            { n:'Ligue 1', c:'FL1', teams:[] }
        ];

        const NAVS = [
            {p:'home', i:'⚡', n:'라이브'}, {p:'sched', i:'📅', n:'일정'}, {p:'std', i:'📊', n:'순위'}, 
            {p:'player', i:'👟', n:'선수'}, {p:'ai', i:'🧠', n:'AI PITCH'}, {p:'fan', i:'⭐', n:'팬존'}
        ];

        const getCrest = t => t.src || (t.id > 2000 ? `https://media.api-sports.io/football/teams/${t.id}.png` : `https://crests.football-data.org/${t.id}.png`);

        async function fd(path, ttl = 60000) {
            if(_cache[path] && Date.now() - _cache[path].ts < ttl) return _cache[path].d;
            try {
                const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
                const d = await r.json();
                if(d.errorCode === 429) { await new Promise(r=>setTimeout(r,2500)); return fd(path); }
                _cache[path] = {d, ts:Date.now()};
                return d;
            } catch(e) { return null; }
        }

        // --- Onboarding ---
        function initOb() {
            const tabs = document.getElementById('ob-tabs');
            tabs.innerHTML = LEAGUES.map(l => `<button class="p-btn ${l.c===obLg?'on':''}" onclick="obLg='${l.c}';initOb()">${l.n}</button>`).join('');
            const grid = document.getElementById('ob-grid');
            const lg = LEAGUES.find(l => l.c === obLg);
            grid.innerHTML = (lg.teams.length ? lg.teams : [{ko:'준비 중', id:0}]).map(t => {
                if(t.id===0) return `<div class="ob-team" style="opacity:0.5; pointer-events:none;">곧 추가됩니다</div>`;
                const isSel = SEL.find(s => s.id === t.id);
                return `<div class="ob-team ${isSel?'sel':''}" onclick="toggleTeam(${t.id})">
                    <img class="ob-crest" src="${getCrest(t)}">
                    <div style="font-size:12px; font-weight:700;">${t.ko}</div>
                </div>`;
            }).join('');
            const btn = document.getElementById('ob-start');
            btn.disabled = !SEL.length;
            btn.textContent = SEL.length ? `${SEL.map(s=>s.ko).join(' & ')} 시작하기 →` : '팀을 선택해주세요';
        }

        function toggleTeam(id) {
            const team = LEAGUES.flatMap(l=>l.teams).find(x=>x.id===id);
            const idx = SEL.findIndex(s=>s.id===id);
            if(idx > -1) SEL.splice(idx,1);
            else if(SEL.length < 2) SEL.push(team);
            initOb();
        }

        function startApp() {
            localStorage.setItem('pi_sel', JSON.stringify(SEL));
            document.getElementById('ob').style.display = 'none';
            document.getElementById('app').classList.add('on');
            updateTheme();
            renderNav();
            swPage('home');
            loadMiniStd();
        }

        function resetApp() { if(confirm('팀을 다시 선택하시겠습니까?')) { localStorage.removeItem('pi_sel'); location.reload(); } }

        function updateTheme() {
            if(!SEL.length) return;
            const c = SEL[0].col || '#10b981';
            const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
            document.documentElement.style.setProperty('--p', c);
            document.documentElement.style.setProperty('--ps', `rgba(${r},${g},${b},0.12)`);
            document.documentElement.style.setProperty('--pb', `rgba(${r},${g},${b},0.3)`);
            document.getElementById('header-team').innerHTML = SEL.map(t => `<img src="${getCrest(t)}"><span>${t.ko}</span>`).join('');
        }

        // --- Navigation ---
        function renderNav() {
            const pc = document.getElementById('pc-nav');
            const mb = document.getElementById('mb-nav');
            pc.innerHTML = NAVS.map(n => `<div class="nav-item ${curPage===n.p?'active':''}" onclick="swPage('${n.p}')"><span class="nav-icon">${n.i}</span><span class="nav-text">${n.n}</span></div>`).join('');
            mb.innerHTML = NAVS.map(n => `<div class="bn-item ${curPage===n.p?'active':''}" onclick="swPage('${n.p}')"><span class="bn-icon">${n.i}</span><span>${n.n}</span></div>`).join('');
        }

        async function swPage(page) {
            curPage = page;
            renderNav();
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;

            switch(page) {
                case 'home': await loadHome(); break;
                case 'sched': await loadSched(); break;
                case 'std': await loadStandings(); break;
                case 'player': await loadPlayers(); break;
                case 'ai': await loadAIPitch(); break;
                case 'fan': await loadFanZone(); break;
            }
        }

        // --- Page Functions ---

        async function loadHome() {
            const d = await fd('/matches');
            const live = (d?.matches || []).filter(m => ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status));
            let html = `<div class="stl"><h2>🔴 실시간 라이브</h2></div>`;
            if(!live.length) html += `<div class="mc" style="text-align:center; padding:40px; color:var(--text-dim);">현재 라이브 중인 경기가 없습니다.</div>`;
            else live.forEach(m => html += renderMC(m, true));

            const upcoming = (d?.matches || []).filter(m => m.status === 'SCHEDULED').slice(0, 5);
            if(upcoming.length) {
                html += `<div class="stl" style="margin-top:40px;"><h2>📅 다가오는 경기</h2></div>`;
                upcoming.forEach(m => html += renderMC(m));
            }
            document.getElementById('main-content').innerHTML = html;
        }

        async function loadSched() {
            const container = document.getElementById('main-content');
            const today = new Date();
            let html = `<div class="stl"><h2>📅 시즌 일정</h2></div><div class="picker">`;
            for(let i=-2; i<10; i++) {
                const dt = new Date(); dt.setDate(today.getDate() + i);
                const ds = dt.toISOString().split('T')[0];
                html += `<button class="p-btn ${i===0?'on':''}" onclick="fetchSched('${ds}', this)">${dt.getMonth()+1}/${dt.getDate()}</button>`;
            }
            html += `</div><div id="sched-list"></div>`;
            container.innerHTML = html;
            fetchSched(today.toISOString().split('T')[0]);
        }

        async function fetchSched(date, el) {
            if(el) { document.querySelectorAll('.picker .p-btn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
            const list = document.getElementById('sched-list');
            list.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
            const d = await fd(`/matches?dateFrom=${date}&dateTo=${date}`);
            list.innerHTML = d?.matches?.length ? d.matches.map(m=>renderMC(m)).join('') : `<div class="mc" style="text-align:center; padding:40px; color:var(--text-dim);">해당 일의 경기가 없습니다.</div>`;
        }

        async function loadStandings() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>📊 리그 순위</h2></div><div class="picker">` + 
                LEAGUES.map(l => `<button class="p-btn ${l.c===curLg?'on':''}" onclick="curLg='${l.c}';loadStandings()">${l.n}</button>`).join('') + `</div><div id="std-body"></div>`;
            
            const d = await fd(`/competitions/${curLg}/standings`);
            const table = d?.standings?.[0]?.table || [];
            document.getElementById('std-body').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>#</th><th>팀</th><th>경기</th><th>승점</th><th>득실</th></tr></thead>
                    <tbody>${table.map(t => `<tr>
                        <td class="t-rank ${t.position <= 4 ? 'top':''}">${t.position}</td>
                        <td class="t-name"><img src="${t.team.crest}"> ${t.team.shortName}</td>
                        <td>${t.playedGames}</td><td style="color:var(--p); font-weight:800;">${t.points}</td><td>${t.goalDifference}</td>
                    </tr>`).join('')}</tbody>
                </table>`;
        }

        async function loadPlayers() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>👟 선수 랭킹</h2></div><div class="picker">` + 
                LEAGUES.map(l => `<button class="p-btn ${l.c===curLg?'on':''}" onclick="curLg='${l.c}';loadPlayers()">${l.n}</button>`).join('') + 
                `</div><div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="p-btn ${curStat==='scorers'?'on':''}" onclick="curStat='scorers';loadPlayers()">득점</button>
                    <button class="p-btn ${curStat==='assists'?'on':''}" onclick="curStat='assists';loadPlayers()">도움</button>
                </div><div id="player-body"></div>`;
            
            const d = await fd(`/competitions/${curLg}/scorers`);
            const scorers = d?.scorers || [];
            document.getElementById('player-body').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>#</th><th>선수</th><th>팀</th><th>${curStat==='scorers'?'골':'도움'}</th></tr></thead>
                    <tbody>${scorers.map((s,i) => `<tr>
                        <td class="t-rank ${i<3?'top':''}">${i+1}</td>
                        <td><b>${s.player.name}</b></td>
                        <td class="t-team"><img src="${s.team.crest}"> ${s.team.shortName}</td>
                        <td style="color:var(--p); font-weight:800;">${curStat==='scorers'?s.goals:s.assists||0}</td>
                    </tr>`).join('')}</tbody>
                </table>`;
        }

        async function loadAIPitch() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="stl"><h2>🧠 AI PITCH 전술 분석</h2></div>
                <div class="ai-pitch-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="text-align:center;"><img src="https://crests.football-data.org/65.png" style="width:60px;"><div style="font-weight:900; margin-top:10px;">MAN CITY</div></div>
                        <div style="text-align:center;"><div style="font-size:12px; color:var(--p); font-weight:900;">BIG MATCH</div><div style="font-size:24px; font-weight:900;">VS</div></div>
                        <div style="text-align:center;"><img src="https://crests.football-data.org/57.png" style="width:60px;"><div style="font-weight:900; margin-top:10px;">ARSENAL</div></div>
                    </div>
                    <div class="ai-field">
                        <div style="position:absolute; top:20%; left:20%; width:10px; height:10px; background:#fff; border-radius:50%; box-shadow: 0 0 10px #fff;"></div>
                        <div style="position:absolute; bottom:20%; right:20%; width:10px; height:10px; background:#fff; border-radius:50%; box-shadow: 0 0 10px #fff;"></div>
                        <span style="color:rgba(255,255,255,0.3); font-weight:900;">TACTICAL BOARD VIEW</span>
                    </div>
                    <p style="line-height:1.8; color:rgba(255,255,255,0.8);">맨시티는 로드리를 기점으로 한 <b>3-2-4-1 반전 빌드업</b>을 구사하며 74%의 높은 중앙 점유율을 유지할 것으로 분석됩니다. 아스날은 외데고르의 하프스페이스 공략과 <b>박스형 4-4-2 압박</b>이 승부의 열쇠입니다.</p>
                    <div class="ai-tactic-grid">
                        <div class="ai-tactic-item"><h4>🎯 핵심 공격 루트</h4>맨시티의 우측 윙어 그릴리쉬와 풀백의 유기적인 전환 공격이 아스날의 수비벽을 흔들 확률 82%.</div>
                        <div class="ai-tactic-item"><h4>🛡️ 수비 저지선</h4>아스날의 살리바-가브리엘 센터백 조합은 박스 안에서의 경합 승률이 평소보다 12% 높게 예측됨.</div>
                    </div>
                    <div style="margin-top:20px;">
                        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:12px;"><span>승리 확률</span><span>MAN CITY 58% | DRAW 22% | ARSENAL 20%</span></div>
                        <div class="ai-prob-bar"><div class="ai-prob-fill" style="width:58%; background:var(--p);"></div><div class="ai-prob-fill" style="width:22%; background:var(--amber);"></div><div class="ai-prob-fill" style="width:20%; background:var(--red);"></div></div>
                    </div>
                </div>
            `;
        }

        async function loadFanZone() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>⭐ FAN ZONE</h2></div>
                <div class="ai-pitch-card" style="text-align:center; padding:40px;">
                    <div style="font-size:48px; margin-bottom:15px;">🏅</div>
                    <h3 style="font-size:24px; font-weight:900;">나의 등급: Veteran</h3>
                    <p style="color:var(--text-dim); margin-top:8px;">당신은 진정한 서포터입니다! 총 24번의 경기를 함께했습니다.</p>
                </div>
                <div class="stl"><h2>📅 MY TEAM 일정</h2></div>
                <div id="fan-team-list"></div>`;
            
            if(SEL.length) {
                const list = document.getElementById('fan-team-list');
                const d = await fd(`/teams/${SEL[0].id}/matches?status=SCHEDULED&limit=5`);
                list.innerHTML = (d?.matches?.length) ? d.matches.map(m => renderMC(m)).join('') : `<div class="mc" style="text-align:center;">예정된 경기 일정이 없습니다.</div>`;
            }
        }

        function renderMC(m, live=false) {
            const h = m.homeTeam, a = m.awayTeam;
            const hS = m.score.fullTime.home ?? '-';
            const aS = m.score.fullTime.away ?? '-';
            const time = new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `<div class="mc fade-in">
                <div class="mc-body">
                    <div class="m-team"><img src="${h.crest}"><div class="m-name">${h.shortName || h.name}</div></div>
                    <div class="m-score ${live?'live':''}">${hS} : ${aS}</div>
                    <div class="m-team"><img src="${a.crest}"><div class="m-name">${a.shortName || a.name}</div></div>
                </div>
                <div class="m-meta">
                    <span>${m.competition.name}</span>
                    <span style="color:var(--p)">${live?'LIVE':time}</span>
                </div>
            </div>`;
        }

        async function loadMiniStd() {
            const d = await fd('/competitions/PL/standings');
            const table = (d?.standings?.[0]?.table || []).slice(0, 5);
            document.getElementById('mini-std').innerHTML = table.map(t => `
                <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:12px;">
                    <span><b>${t.position}</b> ${t.team.shortName}</span><span style="font-weight:900; color:var(--p);">${t.points}</span>
                </div>`).join('');
        }

        window.onload = () => {
            if(SEL.length) startApp(); else { document.getElementById('ob').style.display='block'; initOb(); }
        };
    </script>
</body>
</html>
