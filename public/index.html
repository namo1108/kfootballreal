<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PitchPro Stable</title>

<style>
body { background:#0b0f14; color:white; font-family:sans-serif; }
.card { background:#111; padding:10px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<h2>PITCH PRO (안정버전)</h2>
<button onclick="loadLive()">LIVE 불러오기</button>

<div id="content"></div>

<script>
const API_KEY = "b00e3059f51741b7add3fcaab7eaadf0";

// 🔥 핵심: 프록시 함수
async function fetchAPI(url) {
  const proxy = "https://api.allorigins.win/raw?url=";
  const fullUrl = proxy + encodeURIComponent(url);

  const res = await fetch(fullUrl, {
    headers: {
      "x-apisports-key": API_KEY
    }
  });

  return await res.json();
}

// 🔴 LIVE
async function loadLive() {
  const content = document.getElementById("content");
  content.innerHTML = "불러오는중...";

  try {
    const data = await fetchAPI(
      "https://v3.football.api-sports.io/fixtures?live=all"
    );

    console.log(data);

    if (!data.response || data.response.length === 0) {
      content.innerHTML = "경기 없음";
      return;
    }

    content.innerHTML = "";

    data.response.forEach(m => {
      content.innerHTML += `
        <div class="card">
          ${m.league.name}<br>
          ${m.teams.home.name} vs ${m.teams.away.name}<br>
          ${m.goals.home} : ${m.goals.away}
        </div>
      `;
    });

  } catch (e) {
    console.error(e);
    content.innerHTML = "❌ API 실패";
  }
}
</script>

</body>
</html>
