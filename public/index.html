<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PITCH Pro | Tactical Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010508; --bg2: #040d12; --card: rgba(22, 27, 34, 0.96);
            --p: #00ff87; --pg: rgba(0, 255, 135, 0.15); --ps: rgba(0, 255, 135, 0.08);
            --amber: #ffb800; --red: #ff3b5c; --blue: #4fc3f7;
            --t: #d4f5e5; --t2: #8b949e; --t3: #484f58;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif;
            max-width: 480px; margin: 0 auto; overflow-x: hidden;
        }

        /* --- UI COMPONENTS --- */
        .hdr {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background: rgba(1, 5, 8, 0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .hdr-logo { font-family: 'Orbitron'; font-weight: 900; font-size: 18px; color: var(--p); letter-spacing: 2px; }
        
        .page { display: none; padding: 15px 15px 100px; min-height: 100vh; }
        .page.on { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MATCH CARDS --- */
        .mc { background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
        .mc-hd { padding: 10px 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; font-size: 10px; color: var(--t2); }
        .mc-body { padding: 20px 15px; display: grid; grid-template-columns: 1fr 100px 1fr; align-items: center; text-align: center; }
        .mc-score { font-family: 'Orbitron'; font-size: 26px; font-weight: 900; }
        .tm-img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .tm-nm { font-size: 12px; font-weight: 500; display: block; }

        /* --- PILLS & TABS --- */
        .pills { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .pill { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--t2); font-size: 11px; white-space: nowrap; cursor: pointer; }
        .pill.on { background: var(--p); color: #000; border-color: var(--p); font-weight: 700; }

        /* --- SETTINGS MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; padding: 20px; align-items: center; }
        .modal.show { display: flex; }
        .modal-in { background: #0b1117; width: 100%; border-radius: 20px; border: 1px solid var(--p); overflow: hidden; }
        .modal-hd { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; }
        .set-input { width: 100%; background: #161b22; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin: 10px 0; }

        /* --- NAV --- */
        .bnav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 70px; background: rgba(1, 5, 8, 0.98); border-top: 1px solid var(--border); display: flex; }
        .nbi { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--t3); gap: 4px; cursor: pointer; }
        .nbi.on { color: var(--p); }
        .nbi span { font-size: 9px; font-family: 'Orbitron'; font-weight: 700; }

        .empty { text-align: center; padding: 40px; color: var(--t3); font-size: 13px; }
        .loader { width: 20px; height: 20px; border: 2px solid var(--ps); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ob" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;">
        <h1 style="font-family:'Orbitron'; color:var(--p); margin-bottom:10px;">PITCH PRO</h1>
        <p style="color:var(--t2); font-size:14px; margin-bottom:30px;">당신의 전술적 파트너를 시작합니다.</p>
        <button onclick="closeOb()" style="background:var(--p); border:none; padding:15px 40px; border-radius:30px; font-family:'Orbitron'; font-weight:900; cursor:pointer;">GET STARTED</button>
    </div>

    <header class="hdr">
        <div class="hdr-logo">PITCH PRO</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="hdr-lv" style="font-size: 10px; background: var(--ps); color: var(--p); padding: 4px 10px; border-radius: 6px; font-family: 'Orbitron';">LV.1</div>
            <div onclick="openSettings()" style="cursor:pointer; color:var(--t2);">⚙️</div>
        </div>
    </header>

    <div id="pg-home" class="page on">
        <div class="pills" id="home-pills"></div>
        <div id="home-content"></div>
    </div>

    <div id="pg-std" class="page">
        <div class="pills" id="std-pills"></div>
        <div id="std-content"></div>
    </div>

    <div id="pg-fan" class="page">
        <div style="background:linear-gradient(135deg, var(--ps), transparent); padding:25px; border-radius:20px; border:1px solid var(--border); margin-bottom:20px; text-align:center;">
            <div id="fan-emoji" style="font-size:40px; margin-bottom:10px;">⚽</div>
            <h2 id="fan-rank" style="font-family:'Orbitron'; color:var(--p);">입문자</h2>
            <p id="fan-stat" style="font-size:12px; color:var(--t2); margin-top:5px;">0 경기 인증 완료</p>
        </div>
        <button onclick="checkIn()" style="width:100%; background:var(--card); border:1px solid var(--p); color:var(--p); padding:15px; border-radius:15px; font-family:'Orbitron'; font-weight:700;">LIVE CHECK-IN</button>
    </div>

    <div id="set-modal" class="modal">
        <div class="modal-in">
            <div class="modal-hd"><span style="font-family:'Orbitron'; color:var(--p);">SETTINGS</span><button onclick="cm('set-modal')" style="background:none; border:none; color:#fff; font-size:20px;">×</button></div>
            <div class="modal-body">
                <label style="font-size:11px; color:var(--t2);">API KEY (football-data.org)</label>
                <input type="password" id="api-key-input" class="set-input" placeholder="키를 입력하세요">
                <button onclick="saveKey()" style="width:100%; background:var(--p); border:none; padding:12px; border-radius:10px; font-weight:700; margin-top:10px;">SAVE & REFRESH</button>
            </div>
        </div>
    </div>

    <nav class="bnav">
        <div class="nbi on" onclick="swP('home', this)"><span>HOME</span></div>
        <div class="nbi" onclick="swP('std', this)"><span>RANK</span></div>
        <div class="nbi" onclick="swP('fan', this)"><span>FAN</span></div>
    </nav>

    <script>
        // --- STATE & CONFIG ---
        let API_KEY = localStorage.getItem('pp_api_key') || '';
        const LGS = [
            {id: 'PL', name: 'PREMIER LEAGUE'},
            {id: 'PD', name: 'LA LIGA'},
            {id: 'BL1', name: 'BUNDESLIGA'},
            {id: 'SA', name: 'SERIE A'}
        ];
        let curLg = 'PL';
        let fanData = JSON.parse(localStorage.getItem('pp_fan') || '{"count":0}');

        // --- CORE FUNCTIONS ---
        function openSettings() { document.getElementById('api-key-input').value = API_KEY; document.getElementById('set-modal').classList.add('show'); }
        function cm(id) { document.getElementById(id).classList.remove('show'); }
        function saveKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if(val) { localStorage.setItem('pp_api_key', val); location.reload(); }
        }

        async function fd(path) {
            if(!API_KEY) return null;
            try {
                const r = await fetch(`https://api.football-data.org/v4${path}`, { headers: {'X-Auth-Token': API_KEY} });
                return r.ok ? await r.json() : null;
            } catch { return null; }
        }

        // --- UI RENDERERS ---
        function swP(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
            document.querySelectorAll('.nbi').forEach(x => x.classList.remove('on'));
            document.getElementById('pg-'+p).classList.add('on');
            el.classList.add('on');
            if(p === 'home') loadHome();
            if(p === 'std') loadStd();
        }

        async function loadHome() {
            const container = document.getElementById('home-content');
            container.innerHTML = '<div class="loader"></div>';
            
            const data = await fd(`/competitions/${curLg}/matches?status=SCHEDULED&limit=5`);
            if(!data) { container.innerHTML = '<div class="empty">API 키를 설정해주세요.</div>'; return; }

            container.innerHTML = data.matches.map(m => `
                <div class="mc">
                    <div class="mc-hd"><span>${m.competition.name}</span><span>${new Date(m.utcDate).toLocaleString()}</span></div>
                    <div class="mc-body">
                        <div><img src="${m.homeTeam.crest}" class="tm-img"><span class="tm-nm">${m.homeTeam.shortName}</span></div>
                        <div class="mc-score">VS</div>
                        <div><img src="${m.awayTeam.crest}" class="tm-img"><span class="tm-nm">${m.awayTeam.shortName}</span></div>
                    </div>
                </div>
            `).join('') || '<div class="empty">예정된 경기가 없습니다.</div>';
        }

        async function loadStd() {
            const container = document.getElementById('std-content');
            container.innerHTML = '<div class="loader"></div>';
            const data = await fd(`/competitions/${curLg}/standings`);
            if(!data) return;

            const rows = data.standings[0].table;
            container.innerHTML = `
                <table style="width:100%; border-collapse:collapse; font-size:12px;">
                    <tr style="color:var(--t3); border-bottom:1px solid var(--border);">
                        <th style="padding:10px;">#</th><th style="text-align:left;">TEAM</th><th>P</th><th>PTS</th>
                    </tr>
                    ${rows.map(r => `
                        <tr style="border-bottom:1px solid var(--border);">
                            <td style="padding:12px; text-align:center; font-family:'Orbitron';">${r.position}</td>
                            <td style="display:flex; align-items:center; gap:8px; padding:12px;">
                                <img src="${r.team.crest}" style="width:20px;"> ${r.team.shortName}
                            </td>
                            <td style="text-align:center;">${r.playedGames}</td>
                            <td style="text-align:center; font-weight:700; color:var(--p);">${r.points}</td>
                        </tr>
                    `).join('')}
                </table>`;
        }

        function checkIn() {
            fanData.count++;
            localStorage.setItem('pp_fan', JSON.stringify(fanData));
            updateFanUI();
            alert('집관 인증 완료! 포인트가 적립되었습니다.');
        }

        function updateFanUI() {
            document.getElementById('fan-stat').textContent = `${fanData.count} 경기 인증 완료`;
            const lv = Math.floor(fanData.count / 5) + 1;
            document.getElementById('hdr-lv').textContent = `LV.${lv}`;
            if(lv > 2) {
                document.getElementById('fan-rank').textContent = "열혈 서포터";
                document.getElementById('fan-emoji').textContent = "🔥";
            }
        }

        // --- INIT ---
        if(!localStorage.getItem('pp_ob')) {
            document.getElementById('ob').style.display = 'flex';
        }
        function closeOb() { localStorage.setItem('pp_ob', 'done'); document.getElementById('ob').style.display = 'none'; }
        
        document.getElementById('home-pills').innerHTML = LGS.map(l => `<button class="pill ${l.id===curLg?'on':''}" onclick="curLg='${l.id}'; loadHome();">${l.name}</button>`).join('');
        document.getElementById('std-pills').innerHTML = LGS.map(l => `<button class="pill ${l.id===curLg?'on':''}" onclick="curLg='${l.id}'; loadStd();">${l.name}</button>`).join('');

        loadHome();
        updateFanUI();
    </script>
</body>
</html>
