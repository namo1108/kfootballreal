<!DOCTYPE html>
<html lang="ko" style="--p: #10b981; --ps: rgba(16,185,129,.13); --pb: rgba(16,185,129,.32);">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>PITCH IN</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2305070a'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%2310b981' stroke-width='3'/%3E%3Ctext x='32' y='42' font-family='Arial' font-weight='900' font-size='28' fill='%2310b981' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* [1. CSS - 원본 유지 및 모바일 최적화 레이어] */
        :root {
            --p: #10b981; --bg: #05070a; --bg2: #0d1117; --cd: rgba(22, 27, 34, 0.95);
            --t: #ffffff; --t2: #a1a1aa; --red: #ef4444; --blue: #3b82f6; --orange: #f59e0b; --purp: #a855f7;
            transition: all 0.4s ease;
        }
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        #ob { position: fixed; inset: 0; background: var(--bg); z-index: 10000; overflow-y: auto; padding-bottom: 120px; }
        #app { display: none; height: 100vh; flex-direction: column; }
        .hdr { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hdr-logo { font-size: 24px; font-weight: 900; color: var(--p); letter-spacing: -1px; }
        
        .main-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background: #080a0f; border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; transition: 0.3s; }
        .pages { flex: 1; overflow-y: auto; padding: 35px; background: var(--bg); -webkit-overflow-scrolling: touch; }
        .page { display: none; } .page.on { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* [MOBILE RESPONSIVE] */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 75px; 
                flex-direction: row; justify-content: space-around; padding: 5px;
                border-right: none; border-top: 1px solid rgba(255,255,255,0.1); 
                background: rgba(8, 10, 15, 0.95); backdrop-filter: blur(10px); z-index: 1000;
            }
            .si { flex-direction: column; gap: 4px; padding: 8px 5px; margin-bottom: 0; flex: 1; align-items: center; font-size: 10px; border-radius: 10px; }
            .si span { font-size: 20px; }
            .pages { padding: 20px 15px 100px 15px; }
            .hdr { height: 60px; }
            .ob-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
        }

        /* [COMPONENTS - 원본 스타일 그대로 복구] */
        .si { padding: 16px 22px; border-radius: 16px; cursor: pointer; color: var(--t2); font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .si.on { background: var(--p); color: #000; box-shadow: 0 10px 20px var(--ps); }
        .mc { background: var(--cd); border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .mc-header { padding: 15px 20px; font-size: 11px; font-weight: 700; color: var(--t2); background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; }
        
        .tab-btn { background: #161b22; color: var(--t2); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.2s; }
        .tab-btn.on { background: var(--p); color: #000; border-color: var(--p); }

        .ob-team { background: #161b22; border: 2px solid rgba(255,255,255,0.05); border-radius: 22px; padding: 25px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .ob-team.sel { border-color: var(--p); background: var(--ps); transform: translateY(-5px); }
        .crest-box { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; padding: 6px; }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--t2); font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        
        /* 로딩 애니메이션 */
        .loader { padding: 40px; text-align: center; color: var(--p); font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="ob">
    <div class="ob-header" style="text-align:center; padding: 60px 20px 30px;">
        <h1 id="main-title" style="font-size: 48px; font-weight: 900; color: var(--p); letter-spacing: -2px;">PITCH IN</h1>
        <p style="color:var(--t2); font-size:14px;">실시간 축구 대시보드 커스터마이징</p>
    </div>
    <div id="league-tabs" style="display:flex; gap:10px; padding:0 20px; margin-bottom:30px; overflow-x:auto; justify-content:center;"></div>
    <div id="ob-list" class="ob-grid" style="display:grid; padding:0 20px; max-width:1200px; margin:0 auto;"></div>
    <div class="ob-footer" style="position:fixed; bottom:0; width:100%; padding:30px; background:linear-gradient(to top, var(--bg) 80%, transparent); text-align:center;">
        <button class="btn-main" onclick="startApp()" style="background:var(--p); color:#000; padding:18px 60px; border-radius:100px; font-weight:900; font-size:18px; border:none; box-shadow:0 10px 30px var(--ps); cursor:pointer;">START DASHBOARD</button>
    </div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-logo">PITCH IN</div>
        <div id="hdr-selected" style="display:flex; align-items:center; gap:10px;"></div>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <div class="si on" onclick="swP('home',this)"><span>⚡</span> LIVE</div>
            <div class="si" onclick="swP('sched',this)"><span>📅</span> SCHEDULE</div>
            <div class="si" onclick="swP('std',this)"><span>📊</span> STANDINGS</div>
            <div class="si" onclick="swP('player',this)"><span>👟</span> PLAYERS</div>
            <div class="si" onclick="swP('ai',this)"><span>🧠</span> AI PITCH</div>
            <div class="si" onclick="swP('fan',this)"><span>⭐</span> FAN ZONE</div>
        </aside>
        <main class="pages">
            <div class="page on" id="pg-home"></div>
            <div class="page" id="pg-sched">
                <div id="days-container" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:20px; padding-bottom:10px;"></div>
                <div id="sched-list"></div>
            </div>
            <div class="page" id="pg-std">
                <div id="std-tabs" style="display:flex; gap:10px; margin-bottom:20px;"></div>
                <div id="std-bd" class="mc"></div>
            </div>
            <div class="page" id="pg-player">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="tab-btn on" onclick="loadScorers('goals',this)">GOALS</button>
                    <button class="tab-btn" onclick="loadScorers('assists',this)">ASSISTS</button>
                </div>
                <div id="pl-bd" class="mc"></div>
            </div>
            <div class="page" id="pg-ai"></div>
            <div class="page" id="pg-fan">
                <div id="fz-user" class="mc" style="padding:30px; text-align:center;"></div>
                <div id="fz-list"></div>
            </div>
        </main>
    </div>
</div>

<script>
/**
 * [2. JAVASCRIPT - 원본 로직 유지 및 API 최적화 수정]
 */
const API_BASE = 'https://api.football-data.org/v4';
const API_KEY = 'YOUR_API_KEY_HERE'; // 실사용 시 키를 입력하세요.
const PROXY = 'https://api.allorigins.win/raw?url='; // CORS 해결용 프록시

const TEAM_THEMES = {
    'Arsenal': { p: '#ef4444', bg: '#2b0a0a' },
    'Man City': { p: '#7cb3e3', bg: '#0d1e2d' },
    'Liverpool': { p: '#e31b23', bg: '#1a0505' },
    '화성 FC': { p: '#ff6b00', bg: '#231200' },
    '수원': { p: '#005bac', bg: '#001f3d' },
    '울산': { p: '#004794', bg: '#001a33' }
};

const DATA = [
    { n: 'Premier League', c: 'PL', teams: ['Arsenal', 'Man City', 'Liverpool', 'Tottenham', 'Chelsea', 'Man Utd'] },
    { n: 'K League 2', c: 'KL2', teams: ['화성 FC', '수원', '부산', '전남', '경남'] }
];

let SELECTED_TEAM = null;
let curLg = 'PL';
let fanData = { total: 0, checkins: [] };

// [Utility]
const getEmblem = (n) => `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=fff&color=000&bold=true`;
const elv = (v) => v || '-';

// [API Fetcher - 반응속도 최적화를 위한 캐싱 처리]
const cache = new Map();
async function fetchAPI(path) {
    if (cache.has(path)) return cache.get(path);
    try {
        const url = `${PROXY}${encodeURIComponent(API_BASE + path)}`;
        const res = await fetch(url, { headers: { 'X-Auth-Token': API_KEY } });
        const data = await res.json();
        cache.set(path, data);
        return data;
    } catch (e) {
        console.error("API Fetch Error:", e);
        return null;
    }
}

// [Onboarding]
function initOb() {
    const tabs = document.getElementById('league-tabs');
    tabs.innerHTML = DATA.map(lg => `<button class="tab-btn ${lg.c === curLg ? 'on' : ''}" onclick="swL('${lg.c}', this)">${lg.n}</button>`).join('');
    renderTeams();
}
function swL(c, el) {
    curLg = c;
    initOb();
}
function renderTeams() {
    const list = document.getElementById('ob-list');
    const lg = DATA.find(l => l.c === curLg);
    list.innerHTML = lg.teams.map(t => `
        <div class="ob-team ${SELECTED_TEAM === t ? 'sel' : ''}" onclick="applyTheme('${t}')">
            <div class="crest-box"><img src="${getEmblem(t)}" alt="${t}" width="40"></div>
            <span style="font-size:12px; font-weight:700;">${t}</span>
        </div>
    `).join('');
}
function applyTheme(team) {
    SELECTED_TEAM = team;
    const theme = TEAM_THEMES[team] || { p: '#10b981', bg: '#05070a' };
    document.documentElement.style.setProperty('--p', theme.p);
    document.documentElement.style.setProperty('--bg', theme.bg);
    document.documentElement.style.setProperty('--ps', theme.p + '22');
    renderTeams();
}

// [Core Functions]
function startApp() {
    if (!SELECTED_TEAM) return alert('팀을 선택해주세요!');
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('hdr-selected').innerHTML = `<img src="${getEmblem(SELECTED_TEAM)}" width="30" style="border-radius:50%;"><span style="font-weight:700;">${SELECTED_TEAM}</span>`;
    swP('home', document.querySelector('.si'));
}

async function swP(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    el.classList.add('on');

    if (id === 'home') loadHome();
    if (id === 'sched') renderSchedDays();
    if (id === 'std') loadStd(curLg);
    if (id === 'player') loadScorers('goals', document.querySelector('#pg-player .tab-btn'));
    if (id === 'ai') renderAI();
    if (id === 'fan') renderFan();
}

// [Home - Live Match]
async function loadHome() {
    const pg = document.getElementById('pg-home');
    pg.innerHTML = '<div class="loader">LIVE 데이터를 가져오는 중...</div>';
    
    // API 연결 불가 시 기본 레이아웃 출력
    pg.innerHTML = `
        <div class="mc" style="background:linear-gradient(135deg, var(--p), #000); border:none;">
            <div style="padding:40px 20px; display:flex; align-items:center; justify-content:space-around; color:#fff;">
                <div style="text-align:center;"><img src="${getEmblem(SELECTED_TEAM)}" width="60"><p style="margin-top:10px; font-weight:800;">${SELECTED_TEAM}</p></div>
                <div style="text-align:center;"><span style="font-size:40px; font-weight:900;">2 : 1</span><p style="font-size:11px; opacity:0.7;">LIVE 78'</p></div>
                <div style="text-align:center;"><img src="${getEmblem('Opponent')}" width="60"><p style="margin-top:10px; font-weight:800;">OPPONENT</p></div>
            </div>
        </div>
        <div class="mc">
            <div class="mc-header"><span>최근 경기 분석</span></div>
            <div style="padding:20px; font-size:14px; line-height:1.6;">${SELECTED_TEAM}은(는) 최근 점유율 55%를 유지하며 강력한 공격 축구를 보여주고 있습니다.</div>
        </div>
    `;
}

// [Schedule]
function renderSchedDays() {
    const cont = document.getElementById('days-container');
    const today = new Date();
    cont.innerHTML = Array.from({length: 7}, (_, i) => {
        const d = new Date(); d.setDate(today.getDate() + i);
        const day = d.getDate();
        return `<div class="day-card ${i===0?'on':''}" style="min-width:60px; padding:15px; background:var(--bg2); border-radius:15px; text-align:center; cursor:pointer;" onclick="loadSched('${d.toISOString().split('T')[0]}', this)">
            <span style="display:block; font-size:10px; color:var(--t2);">${d.toLocaleString('en', {weekday:'short'})}</span>
            <span style="font-size:18px; font-weight:900;">${day}</span>
        </div>`;
    }).join('');
    loadSched(today.toISOString().split('T')[0]);
}

async function loadSched(date, el) {
    if(el) {
        document.querySelectorAll('.day-card').forEach(c => c.style.borderColor = 'transparent');
        el.style.border = '2px solid var(--p)';
    }
    const bd = document.getElementById('sched-list');
    bd.innerHTML = '<div class="loader">경기를 찾는 중...</div>';
    
    const data = await fetchAPI(`/matches?dateFrom=${date}&dateTo=${date}`);
    if (data && data.matches.length > 0) {
        bd.innerHTML = data.matches.map(m => `
            <div class="mc">
                <div class="mc-header"><span>${m.competition.name}</span><span>${m.utcDate.slice(11,16)}</span></div>
                <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="flex:1; text-align:right; font-weight:700;">${m.homeTeam.shortName || m.homeTeam.name}</span>
                    <span style="margin:0 20px; font-weight:900; color:var(--p);">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</span>
                    <span style="flex:1; text-align:left; font-weight:700;">${m.awayTeam.shortName || m.awayTeam.name}</span>
                </div>
            </div>
        `).join('');
    } else {
        bd.innerHTML = '<p style="text-align:center; padding:40px; color:var(--t2);">해당 날짜에 경기가 없습니다.</p>';
    }
}

// [Standings]
async function loadStd(code) {
    const bd = document.getElementById('std-bd');
    bd.innerHTML = '<div class="loader">순위표 로드 중...</div>';
    
    const data = await fetchAPI(`/competitions/${code}/standings`);
    if (data) {
        const s = data.standings[0].table;
        bd.innerHTML = `<table>
            <tr><th width="50">#</th><th>TEAM</th><th width="50">W</th><th width="50">GD</th><th width="50">PTS</th></tr>
            ${s.map(t => `
                <tr style="${t.team.name.includes(SELECTED_TEAM)?'background:var(--ps);':''}">
                    <td style="font-weight:900; color:var(--p);">${t.position}</td>
                    <td style="font-weight:700;">${t.team.shortName || t.team.name}</td>
                    <td>${t.won}</td>
                    <td>${t.goalDifference}</td>
                    <td style="font-weight:900;">${t.points}</td>
                </tr>
            `).join('')}
        </table>`;
    }
}

// [Players]
async function loadScorers(type, el) {
    document.querySelectorAll('#pg-player .tab-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    const bd = document.getElementById('pl-bd');
    bd.innerHTML = '<div class="loader">리더보드 로드 중...</div>';
    
    const data = await fetchAPI(`/competitions/${curLg}/scorers`);
    if (data) {
        bd.innerHTML = `<table>
            <tr><th>순위</th><th>선수</th><th>팀</th><th>득점</th></tr>
            ${data.scorers.map((s, i) => `
                <tr>
                    <td style="color:var(--p); font-weight:800;">${i+1}</td>
                    <td style="font-weight:700;">${s.player.name}</td>
                    <td style="color:var(--t2);">${s.team.shortName || s.team.name}</td>
                    <td style="font-weight:900;">${s.goals}</td>
                </tr>
            `).join('')}
        </table>`;
    }
}

// [AI & FanZone]
function renderAI() {
    document.getElementById('pg-ai').innerHTML = `
        <div class="mc" style="padding:40px; text-align:center; border:1px dashed var(--p);">
            <h2 style="color:var(--p); margin-bottom:15px;">AI Match Prediction</h2>
            <p style="line-height:1.8; color:var(--t2);">최근 ${SELECTED_TEAM}의 경기력 지수는 84.5%입니다. 다음 경기에서 승리할 확률은 62%로 예측됩니다.</p>
        </div>
    `;
}

function renderFan() {
    document.getElementById('fz-user').innerHTML = `
        <h2 style="font-size:32px; font-weight:900; color:var(--p);">GOLD FAN</h2>
        <p style="margin-top:10px; color:var(--t2);">지금까지 ${fanData.total}회 체크인하셨습니다.</p>
    `;
}

// [Start]
initOb();
</script>
</body>
</html>
