<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PitchPro</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:sans-serif;
}

header {
  padding:15px;
  color:#00ff9f;
  font-size:20px;
  font-weight:bold;
}

#content {
  padding:15px;
  margin-bottom:70px;
}

.match {
  margin-bottom:15px;
  padding:10px;
  border-radius:10px;
  background:#111;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #222;
}

.nav div {
  cursor:pointer;
  color:#888;
}

.nav .active {
  color:#00ff9f;
}
</style>
</head>

<body>

<header>PITCH PRO</header>

<div id="content">로딩중...</div>

<div class="nav">
  <div onclick="loadLive(this)" class="active">Live</div>
  <div onclick="loadFixtures(this)">Fixtures</div>
  <div onclick="loadStandings(this)">Rank</div>
  <div onclick="loadAI(this)">AI Hub</div>
  <div onclick="loadFan(this)">집관인증</div>
</div>

<script>
const API_KEY = "b00e3059f51741b7add3fcaab7eaadf0";
const BASE = "https://cors-anywhere.herokuapp.com/https://v3.football.api-sports.io";

function setActive(el) {
  document.querySelectorAll(".nav div").forEach(d => d.classList.remove("active"));
  el.classList.add("active");
}

// 🔴 LIVE 경기
async function loadLive(el) {
  setActive(el);
  const content = document.getElementById("content");
  content.innerHTML = "LIVE 불러오는중...";

  try {
    const res = await fetch(BASE + "/fixtures?live=all", {
      headers: { "x-apisports-key": API_KEY }
    });
    const data = await res.json();

    const matches = data.response;

    if (!matches.length) {
      content.innerHTML = "현재 진행중인 경기 없음";
      return;
    }

    content.innerHTML = "";
    matches.forEach(m => {
      content.innerHTML += `
        <div class="match">
          🔴 LIVE<br>
          ${m.teams.home.name} vs ${m.teams.away.name}<br>
          ${m.goals.home} : ${m.goals.away}
        </div>
      `;
    });

  } catch(e) {
    content.innerHTML = "에러 발생";
  }
}

// 📅 예정 경기
async function loadFixtures(el) {
  setActive(el);
  const content = document.getElementById("content");
  content.innerHTML = "경기 일정 불러오는중...";

  try {
    const res = await fetch(BASE + "/fixtures?league=39&season=2024", {
      headers: { "x-apisports-key": API_KEY }
    });
    const data = await res.json();

    const matches = data.response.slice(0, 20);

    content.innerHTML = "";
    matches.forEach(m => {
      content.innerHTML += `
        <div class="match">
          ${m.teams.home.name} vs ${m.teams.away.name}<br>
          <span style="color:gray">${m.fixture.date}</span>
        </div>
      `;
    });

  } catch(e) {
    content.innerHTML = "에러 발생";
  }
}

// 📊 순위
async function loadStandings(el) {
  setActive(el);
  const content = document.getElementById("content");
  content.innerHTML = "순위 불러오는중...";

  try {
    const res = await fetch(BASE + "/standings?league=39&season=2024", {
      headers: { "x-apisports-key": API_KEY }
    });
    const data = await res.json();

    const table = data.response[0].league.standings[0];

    content.innerHTML = "";
    table.forEach(team => {
      content.innerHTML += `
        <div class="match">
          ${team.rank}. ${team.team.name} (${team.points}점)
        </div>
      `;
    });

  } catch(e) {
    content.innerHTML = "에러 발생";
  }
}

// 🤖 AI Hub
function loadAI(el) {
  setActive(el);
  document.getElementById("content").innerHTML =
    "🤖 AI 분석 기능 준비중 (선수 비교, 승부 예측 등)";
}

// 📸 집관 인증
function loadFan(el) {
  setActive(el);
  document.getElementById("content").innerHTML =
    "📸 집관 인증 기능 (사진 업로드 + 커뮤니티 예정)";
}

// 초기 로딩
loadLive(document.querySelector(".nav div"));

</script>

</body>
</html>
