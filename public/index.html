<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro: Cinematic Neon</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2310b981'/%3E%3Cstop offset='100%25' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M20 10h16a12 12 0 0 1 0 24H20v18h-6V10zm6 6v12h10a6 6 0 1 0 0-12H26z' fill='url(%23g)'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── [시네마틱 네온 디자인 시스템] ── */
:root{
  --f-h:'Poppins', sans-serif; /* 헤더용 포핀스 */
  --f-b:'Noto Sans KR', sans-serif; /* 본문용 노토산스 */
  --bg:#05070a; /* 깊은 블랙 */
  --bg2:#0d1117; /* 약간 밝은 블랙 */
  
  /* 색상 조화: 에메랄드 그린 + 스카이 블루 네온 */
  --p:#10b981; /* 네온 그린 */
  --ps:rgba(16, 185, 129, 0.1);
  --s:#3b82f6; /* 네온 블루 */
  
  --t:#ffffff;
  --t2:#a1a1aa;
  --t3:#3f3f46;
  --red:#ef4444;
  --br:20px;
}

*,*::before,*::after{box-sizing:border-box; margin:0; padding:0;}
body{
  background:var(--bg); color:var(--t); font-family:var(--f-b); 
  -webkit-font-smoothing:antialiased; overflow:hidden;
  background-image: radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                    radial-gradient(at 90% 90%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
}

/* ── [레이아웃 & 비정형 헤더] ── */
#app{display:flex; height:100vh; flex-direction:column;}
.hdr{
  height:70px; display:flex; align-items:center; justify-content:space-between; 
  padding:0 30px; background:rgba(13, 17, 23, 0.8); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.03); z-index:100;
}
.hdr-logo{
  font-family:var(--f-h); font-size:24px; font-weight:900; letter-spacing:-1px;
  background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.main-body{flex:1; display:flex; overflow:hidden;}
.sidebar{
  width:260px; background:var(--bg2); padding:30px 15px;
  border-right:1px solid rgba(255,255,255,0.03);
}
@media(max-width:1024px){.sidebar{display:none;}}

.si{
  display:flex; align-items:center; gap:15px; padding:16px 20px; border-radius:14px;
  cursor:pointer; color:var(--t2); font-weight:700; margin-bottom:10px; transition:0.3s;
  font-family:var(--f-h); font-size:15px;
}
.si:hover{background:rgba(255,255,255,0.02); color:var(--t);}
.si.on{
  background:linear-gradient(135deg, var(--ps) 0%, rgba(59,130,246,0.05) 100%);
  color:var(--t); box-shadow:0 4px 15px rgba(0,0,0,0.2);
  border:1px solid rgba(16, 185, 129, 0.1);
}

.pages{flex:1; overflow-y:auto; padding:40px; background:transparent;}
.page{display:none;}
.page.on{display:block;}

/* ── [비정형 시네마틱 매치 레이아웃] ── */
.home-grid{display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:25px;}

.mc{
  background:var(--bg2); border:1px solid rgba(255,255,255,0.03); border-radius:var(--br);
  overflow:hidden; transition:0.3s; position:relative;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
}
.mc:hover{transform:translateY(-5px); border-color:rgba(16,185,129,0.2);}

/* 시네마틱 탑 바 */
.mc-top{
  padding:12px 20px; background:rgba(255,255,255,0.01); display:flex; 
  justify-content:space-between; align-items:center; font-size:11px; 
  text-transform:uppercase; letter-spacing:1px; color:var(--t3);
  font-family:var(--f-h);
}
.mc-badge.live{
  color:var(--red); font-weight:800; animation:pulse 1.5s infinite;
  text-shadow:0 0 10px var(--red);
}
@keyframes pulse{0,100%{opacity:1} 50%{opacity:0.5}}

/* 비정형 바디: 팀 엠블럼을 배경처럼 활용 */
.mc-body{padding:30px 20px; position:relative; display:flex; align-items:center; justify-content:center; gap:10px;}
.mc-tm{
  flex:1; text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px;
  z-index:1;
}
.mc-crest-bg{
  position:absolute; width:120px; height:120px; opacity:0.05; 
  filter:grayscale(1) blur(2px); z-index:0; pointer-events:none;
}
.mc-tm span{font-family:var(--f-h); font-weight:900; font-size:18px; letter-spacing:-0.5px;}
.mc-sc-box{
  background:rgba(0,0,0,0.5); padding:10px 20px; border-radius:12px;
  border:1px solid rgba(255,255,255,0.05); z-index:1;
}
.mc-sc{
  font-family:var(--f-h); font-size:48px; font-weight:900; color:var(--t);
  letter-spacing:4px; font-variant-numeric: tabular-nums;
  background:linear-gradient(to bottom, #fff 50%, #aaa 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* ── [AI PITCH: 미래형 분석 카운터] ── */
.ai-section{display:flex; flex-direction:column; gap:20px;}
.ai-card{
  background:linear-gradient(135deg, #0d1117 0%, #05070a 100%);
  border:1px solid rgba(59,130,246,0.1); border-radius:25px; padding:30px;
  position:relative; overflow:hidden;
}
.ai-card::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
}
.ai-header{font-family:var(--f-h); color:var(--s); font-size:12px; font-weight:800; letter-spacing:2px; margin-bottom:15px;}
.prob-row{display:flex; align-items:center; gap:15px; margin:20px 0;}
.prob-num{font-family:var(--f-h); font-size:36px; font-weight:900;}
.prob-bar-cinematic{
  flex:1; height:12px; background:rgba(255,255,255,0.03); border-radius:100px;
  overflow:hidden; display:flex; position:relative;
  box-shadow:inset 0 2px 5px rgba(0,0,0,0.5);
}
.prob-h{background:linear-gradient(90deg, #059669, var(--p)); box-shadow:0 0 15px var(--p);}
.prob-a{background:linear-gradient(90deg, #dc2626, var(--red)); box-shadow:0 0 15px var(--red);}

/* ── [시네마틱 애니메이션 레이어] ── */
#gt{
  position:fixed; inset:0; z-index:9999; display:none; align-items:center; 
  justify-content:center; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px);
}
.gt-content{text-align:center;}
.gt-word{
  font-family:var(--f-h); font-size:120px; font-weight:900; text-transform:uppercase;
  letter-spacing:20px; 
  background:linear-gradient(to bottom, #fff, var(--p));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter:drop-shadow(0 0 30px var(--p));
  animation:gtCinema 0.8s cubic-bezier(0.17,0.89,0.32,1.2) forwards;
}
@keyframes gtCinema{0%{transform:scale(2) translateY(50px); opacity:0} 100%{transform:scale(1) translateY(0); opacity:1}}
</style>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="hdr-logo">PITCH PRO</div>
    <div style="font-size:11px; font-family:var(--f-h); background:var(--ps); color:var(--p); padding:6px 15px; border-radius:100px; font-weight:800; border:1px solid rgba(16,185,129,0.2); letter-spacing:1px;">LV.3 MASTER</div>
  </header>

  <div class="main-body">
    <aside class="sidebar">
      <div class="si on" onclick="swP('home',this)">⚡ LIVE MATCH</div>
      <div class="si" onclick="swP('ai',this)">🤖 AI PREDICT</div>
      <div class="si" onclick="swP('std',this)">📊 STANDINGS</div>
      <button onclick="testGoal()" style="margin-top:30px; width:100%; padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.03); background:var(--bg); color:var(--t2); cursor:pointer; font-family:var(--f-h); font-weight:700; font-size:12px;">⚽ SIMULATE GOAL</button>
    </aside>

    <main class="pages">
      <div class="page on" id="pg-home">
        <h1 style="margin-bottom:30px; font-family:var(--f-h); font-weight:900; font-size:32px; letter-spacing:-1px;">⚡ 실시간 중계</h1>
        <div class="home-grid" id="home-bd"></div>
      </div>
      <div class="page" id="pg-ai">
        <h1 style="margin-bottom:30px; font-family:var(--f-h); font-weight:900; font-size:32px; letter-spacing:-1px;">🤖 AI 슈퍼컴퓨터 예측</h1>
        <div class="ai-section" id="ai-bd"></div>
      </div>
      <div class="page" id="pg-std">
        <h1 style="margin-bottom:30px; font-family:var(--f-h); font-weight:900; font-size:32px; letter-spacing:-1px;">📊 리그 통합 순위</h1>
        <div id="std-bd">데이터 통합 중...</div>
      </div>
    </main>
  </div>
</div>

<div id="gt">
  <div class="gt-content">
    <div class="gt-word">GOAL!</div>
    <div id="gt-team" style="color:#fff; font-size:28px; font-weight:700; margin-top:30px; font-family:var(--f-h); letter-spacing:2px; text-transform:uppercase;"></div>
  </div>
</div>

<script>
// ── [점검용 설정 및 더미 데이터] ──
const IS_TEST_MODE = true; 

const mockData = {
  matches: [
    {id:1, competition:{name:'Premier League'}, homeTeam:{name:'Arsenal', shortName:'ARS', crest:'https://crests.football-data.org/57.png'}, awayTeam:{name:'Man City', shortName:'MCI', crest:'https://crests.football-data.org/65.png'}, score:{fullTime:{home:3, away:2}}, status:'IN_PLAY'},
    {id:2, competition:{name:'Champions League'}, homeTeam:{name:'Bayern', shortName:'FCB', crest:'https://crests.football-data.org/5.png'}, awayTeam:{name:'Real Madrid', shortName:'RMA', crest:'https://crests.football-data.org/86.png'}, score:{fullTime:{home:1, away:1}}, status:'IN_PLAY'},
    {id:3, competition:{name:'La Liga'}, homeTeam:{name:'Barcelona', shortName:'BAR', crest:'https://crests.football-data.org/81.png'}, awayTeam:{name:'Atleti', shortName:'ATM', crest:'https://crests.football-data.org/78.png'}, score:{fullTime:{home:0, away:1}}, status:'FINISHED'}
  ]
};

// ── [JS 엔진] ──
function loadHome() {
  const c = document.getElementById('home-bd');
  let html = '';
  mockData.matches.forEach(m => {
    const isLive = m.status === 'IN_PLAY';
    html += `
      <div class="mc">
        <div class="mc-top"><span>${m.competition.name}</span>${isLive?'<span class="mc-badge live">● LIVE</span>':''}</div>
        <div class="mc-body">
          <img src="${m.homeTeam.crest}" class="mc-crest-bg" style="left:10px;">
          <img src="${m.awayTeam.crest}" class="mc-crest-bg" style="right:10px;">
          <div class="mc-tm"><span>${m.homeTeam.shortName}</span></div>
          <div class="mc-sc-box"><div class="mc-sc">${m.score.fullTime.home} : ${m.score.fullTime.away}</div></div>
          <div class="mc-tm"><span>${m.awayTeam.shortName}</span></div>
        </div>
      </div>`;
  });
  c.innerHTML = html;
}

function loadAI() {
  const c = document.getElementById('ai-bd');
  let html = '';
  mockData.matches.slice(0,2).forEach(m => {
    const seed = m.id % 2;
    const hp = seed === 0 ? 68 : 42;
    const ap = 100 - hp - 8;
    html += `
      <div class="ai-card">
        <div class="ai-header">MATCHDAY PROBABILITY ANALYSIS</div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
          <div><div style="font-family:var(--f-h); font-size:24px; font-weight:900; letter-spacing:-1px;">${m.homeTeam.name}</div></div>
          <div><div style="font-family:var(--f-h); font-size:24px; font-weight:900; letter-spacing:-1px; text-align:right;">${m.awayTeam.name}</div></div>
        </div>
        <div class="prob-row">
          <div class="prob-num" style="color:var(--p);">${hp}%</div>
          <div class="prob-bar-cinematic"><div class="prob-h" style="width:${hp}%"></div><div style="width:8%; background:rgba(255,255,255,0.05);"></div><div class="prob-a" style="width:${ap}%"></div></div>
          <div class="prob-num" style="color:var(--red);">${ap}%</div>
        </div>
        <div style="font-size:13px; color:var(--t2); line-height:1.6; background:rgba(0,0,0,0.3); padding:15px; border-radius:12px;">
          📌 <b style="color:#fff;">전술 분석 결과:</b> ${m.homeTeam.name}팀의 홈 승률이 통계적으로 매우 우세합니다. 최근 ${m.awayTeam.name}팀의 수비 균열을 공략할 확률이 높습니다.
        </div>
      </div>`;
  });
  c.innerHTML = html;
}

// ── [테스트 시뮬레이션] ──
function testGoal() {
  const gt = document.getElementById('gt');
  document.getElementById('gt-team').textContent = "Arsenal Scored";
  gt.style.display = 'flex';
  setTimeout(() => { gt.style.display = 'none'; }, 3500);
}

function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
  if(el) el.classList.add('on');
  if(name === 'home') loadHome();
  if(name === 'ai') loadAI();
}

window.onload = () => { loadHome(); };
</script>
</body>
</html>
