<script>
const API_KEY = "여기에_키";

async function testAPI() {
  try {
    const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
      method: "GET",
      headers: {
        "x-apisports-key": API_KEY
      }
    });

    const data = await res.json();
    console.log(data);

    document.body.innerHTML += "<p style='color:lime'>연결 성공</p>";
  } catch (e) {
    console.error(e);
    document.body.innerHTML += "<p style='color:red'>연결 실패</p>";
  }
}

testAPI();
</script>
