<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PITCH Pro — Real-time Tactical Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(10, 24, 32, 0.98);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.4);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
            --red: #ff3b5c; --amber: #ffb800;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; position: relative; }

        /* [1] 온보딩: 팀 선택 UI */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .ob-header { text-align: center; padding: 40px 20px 20px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; color: var(--p-color); letter-spacing: 4px; text-shadow: 0 0 20px var(--p-glow); }
        .ob-tabs { display: flex; overflow-x: auto; padding: 12px 15px; background: var(--bg2); gap: 10px; scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ob-tab { padding: 10px 20px; background: rgba(255,255,255,0.03); border-radius: 25px; font-family: 'Orbitron'; font-size: 11px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .ob-tab.active { background: var(--p-glow); color: var(--p-color); border: 1px solid rgba(0,255,135,0.3); }
        .ob-grid { flex: 1; overflow-y: auto; padding: 20px; display: none; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .ob-grid.active { display: grid; animation: fadeIn 0.5s ease-out; }
        .t-card { background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 12px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .t-card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
        .t-card div { font-size: 9px; font-weight: 500; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* [2] 메인 레이아웃 */
        .topbar { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,255,135,0.1); background: rgba(1,4,6,0.95); backdrop-filter: blur(20px); z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p-color); letter-spacing: 2px; }
        .content { height: calc(100vh - 140px); overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; animation: slideUp 0.4s ease-out; }

        /* [3] 매치 및 데이터 컴포넌트 */
        .match-card { background: var(--bg2); border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 18px; position: relative; overflow: hidden; }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--p-color); opacity: 0.6; }
        .m-league { font-family: 'Orbitron'; font-size: 9px; color: var(--p-color); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; letter-spacing: 1px; }
        .m-row { display: flex; align-items: center; justify-content: space-between; }
        .m-team { flex: 1; text-align: center; }
        .m-team img { width: 40px; height: 40px; margin-bottom: 8px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .m-name { font-size: 12px; font-weight: 700; color: var(--t); }
        .m-score { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; color: #fff; width: 100px; text-align: center; text-shadow: 0 0 10px var(--p-glow); }

        /* 하단 네비게이션 */
        .b-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 80px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; color: var(--t3); transition: 0.3s; }
        .n-btn.active { color: var(--p-color); text-shadow: 0 0 15px var(--p-glow); }
        .n-btn i { font-size: 22px; }
        .n-btn span { font-size: 9px; font-family: 'Orbitron'; font-weight: 700; letter-spacing: 1px; }

        .spin { width: 30px; height: 30px; border: 3px solid rgba(0,255,135,0.1); border-top-color: var(--p-color); border-radius: 50%; animation: sp 1s linear infinite; margin: 50px auto; }
        @keyframes sp { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT CLUB</div>
            <p style="font-size:11px; color:var(--t2); margin-top:8px;">유럽 5대 리그 전체 팀 데이터 연동 완료.</p>
        </div>
        <div class="ob-tabs" id="ob-tabs"></div>
        <div id="ob-content" style="flex:1; overflow:hidden; position:relative;"></div>
    </div>

    <div id="app" style="display:none;">
        <div class="topbar">
            <div class="logo">PITCH PRO</div>
            <div id="user-team-logo" style="width:32px; height:32px;"></div>
        </div>

        <div id="p-live" class="content active">
            <div id="live-feed"></div>
        </div>

        <div id="p-fix" class="content">
            <div id="fixture-feed"></div>
        </div>

        <div id="p-tab" class="content">
            <div id="tab-nav" style="display:flex; overflow-x:auto; gap:10px; margin-bottom:15px; scrollbar-width:none;"></div>
            <div id="table-feed"></div>
        </div>

        <nav class="b-nav">
            <div class="n-btn active" onclick="sw('live', this)"><i>⚡</i><span>LIVE</span></div>
            <div class="n-btn" onclick="sw('fix', this)"><i>📅</i><span>FIXTURES</span></div>
            <div class="n-btn" onclick="sw('tab', this)"><i>📊</i><span>TABLES</span></div>
            <div class="n-btn" onclick="location.reload()"><i>🔄</i><span>RESET</span></div>
        </nav>
    </div>

    <script>
        // --- [설정: 남호님의 API 키 적용] ---
        const API_KEY = 'b00e3059f51741b7add3fcaab7eaadf0';
        const BASE_URL = 'https://api.football-data.org/v4';

        // 전 유럽 5대 리그 팀 데이터
        const leagues = [
            { id: "PL", sn: "EPL", n: "Premier League", teams: [
                { id: 73, n: "Tottenham", c: "#ffffff" }, { id: 65, n: "Man City", c: "#6caddf" }, { id: 57, n: "Arsenal", c: "#ef0107" }, { id: 64, n: "Liverpool", c: "#e31b23" },
                { id: 66, n: "Man Utd", c: "#da291c" }, { id: 61, n: "Chelsea", c: "#034694" }, { id: 67, n: "Newcastle", c: "#ffffff" }, { id: 58, n: "Aston Villa", c: "#95bfe5" },
                { id: 76, n: "Wolves", c: "#fdb913" }, { id: 62, n: "Everton", c: "#003399" }, { id: 397, n: "Brighton", c: "#0057b8" }, { id: 351, n: "West Ham", c: "#7a263a" }
            ]},
            { id: "BL1", sn: "BUNDES", n: "Bundesliga", teams: [
                { id: 503, n: "Bayern Munich", c: "#dc052d" }, { id: 4, n: "Dortmund", c: "#fde100" }, { id: 3, n: "Leverkusen", c: "#e32221" }, { id: 28, n: "RB Leipzig", c: "#dd013f" },
                { id: 11, n: "Wolfsburg", c: "#65b32e" }, { id: 12, n: "Frankfurt", c: "#e1000f" }, { id: 19, n: "Stuttgart", c: "#ffffff" }
            ]},
            { id: "PD", sn: "LALIGA", n: "La Liga", teams: [
                { id: 86, n: "Real Madrid", c: "#ffffff" }, { id: 81, n: "Barcelona", c: "#a50044" }, { id: 78, n: "Atletico", c: "#cb3524" }, { id: 298, n: "Girona", c: "#e21e26" },
                { id: 92, n: "Sociedad", c: "#0067b1" }, { id: 94, n: "Villarreal", c: "#fee300" }
            ]},
            { id: "SA", sn: "SERIE A", n: "Serie A", teams: [
                { id: 108, n: "Inter", c: "#0066b2" }, { id: 113, n: "Napoli", c: "#007fff" }, { id: 98, n: "Milan", c: "#fb090b" }, { id: 109, n: "Juventus", c: "#ffffff" }
            ]},
            { id: "FL1", sn: "LIGUE 1", n: "Ligue 1", teams: [
                { id: 524, n: "PSG", c: "#004170" }, { id: 516, n: "Marseille", c: "#00abf3" }, { id: 548, n: "Monaco", c: "#ed1c24" }
            ]}
        ];

        // --- [로직: API 연동] ---
        async function fetchPro(path) {
            try {
                const res = await fetch(BASE_URL + path, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                return await res.json();
            } catch (e) { return null; }
        }

        // [1] 온보딩 초기화
        function initOb() {
            const tabs = document.getElementById('ob-tabs');
            const cont = document.getElementById('ob-content');
            leagues.forEach((lg, idx) => {
                const tab = document.createElement('div');
                tab.className = `ob-tab ${idx===0?'active':''}`;
                tab.innerText = lg.sn;
                tab.onclick = () => {
                    document.querySelectorAll('.ob-tab').forEach(t=>t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.ob-grid').forEach(g=>g.classList.remove('active'));
                    document.getElementById(`g-${lg.id}`).classList.add('active');
                };
                tabs.appendChild(tab);

                const grid = document.createElement('div');
                grid.id = `g-${lg.id}`;
                grid.className = `ob-grid ${idx===0?'active':''}`;
                lg.teams.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 't-card';
                    card.innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg" onerror="this.src='https://crests.football-data.org/${t.id}.png'"><div>${t.n}</div>`;
                    card.onclick = () => startApp(t);
                    grid.appendChild(card);
                });
                cont.appendChild(grid);
            });
        }

        function startApp(t) {
            document.documentElement.style.setProperty('--p-color', t.c);
            document.documentElement.style.setProperty('--p-glow', t.c + '55');
            document.getElementById('user-team-logo').innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg" style="width:100%; height:100%;">`;
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadLive();
                loadTabNav();
            }, 600);
        }

        // [2] 데이터 렌더링
        async function loadLive() {
            const feed = document.getElementById('live-feed');
            feed.innerHTML = `<div class="spin"></div>`;
            const data = await fetchPro('/matches?status=IN_PLAY');
            
            if(!data || !data.matches.length) {
                feed.innerHTML = `<div style="text-align:center; padding:40px; color:var(--t3); font-family:'Orbitron'; font-size:11px;">NO LIVE OPERATIONS AT THE MOMENT</div>`;
                return;
            }

            feed.innerHTML = data.matches.map(m => `
                <div class="match-card">
                    <div class="m-league">⚡ ${m.competition.name}</div>
                    <div class="m-row">
                        <div class="m-team"><img src="${m.homeTeam.crest}"><div class="m-name">${m.homeTeam.shortName}</div></div>
                        <div class="m-score">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
                        <div class="m-team"><img src="${m.awayTeam.crest}"><div class="m-name">${m.awayTeam.shortName}</div></div>
                    </div>
                </div>
            `).join('');
        }

        function loadTabNav() {
            const nav = document.getElementById('tab-nav');
            leagues.forEach((lg, idx) => {
                const btn = document.createElement('div');
                btn.className = `ob-tab ${idx===0?'active':''}`;
                btn.innerText = lg.sn;
                btn.onclick = () => {
                    document.querySelectorAll('#tab-nav .ob-tab').forEach(t=>t.classList.remove('active'));
                    btn.classList.add('active');
                    loadTable(lg.id);
                };
                nav.appendChild(btn);
            });
            loadTable('PL');
        }

        async function loadTable(code) {
            const feed = document.getElementById('table-feed');
            feed.innerHTML = `<div class="spin"></div>`;
            const data = await fetchPro(`/competitions/${code}/standings`);
            if(!data) return;
            const table = data.standings[0].table;
            feed.innerHTML = `
                <div style="background:var(--bg2); border-radius:16px; padding:20px; font-family:'Share Tech Mono'; font-size:11px; border:1px solid rgba(255,255,255,0.05);">
                    <div style="display:flex; color:var(--t2); margin-bottom:15px;"><span style="width:30px;">#</span><span style="flex:1;">CLUB</span><span style="width:40px; text-align:right;">PTS</span></div>
                    ${table.map(r => `
                        <div style="display:flex; margin-bottom:12px; align-items:center;">
                            <span style="width:30px; color:${r.position<=4?'var(--p-color)':'var(--t2)'}; font-weight:700;">${r.position}</span>
                            <span style="flex:1; display:flex; align-items:center; gap:10px;"><img src="${r.team.crest}" width="18">${r.team.shortName}</span>
                            <span style="width:40px; text-align:right; font-weight:900; color:#fff;">${r.points}</span>
                        </div>
                    `).join('')}
                </div>`;
        }

        function sw(p, b) {
            document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n=>n.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            b.classList.add('active');
            if(p === 'live') loadLive();
        }

        initOb();
    </script>
</body>
</html>
