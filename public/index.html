<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PITCH Pro — Tactical Ops Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(10, 24, 32, 0.96);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.4);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
            --red: #ff3b5c; --amber: #ffb800;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; }
        
        /* [1] 온보딩: 98개 팀 선택 시스템 */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .ob-header { text-align: center; padding: 40px 20px 15px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 22px; font-weight: 900; color: var(--p-color); letter-spacing: 4px; text-shadow: 0 0 20px var(--p-glow); }
        .lg-nav-ob { display: flex; overflow-x: auto; padding: 12px 15px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; gap: 10px; scrollbar-width: none; }
        .ob-tab { padding: 8px 18px; background: rgba(255,255,255,0.03); border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .ob-tab.active { background: var(--p-glow); color: var(--p-color); border-color: rgba(0,255,135,0.3); }
        .ob-grid-area { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 60px; }
        .ob-grid-area.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; animation: fadeIn 0.5s ease-out; }
        .t-item { background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 12px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .t-item:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }
        .t-item img { width: 38px; height: 38px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .t-item div { font-size: 9px; font-weight: 500; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; padding: 0 4px; }

        /* [2] 메인 레이아웃 */
        #main-app { display: flex; flex-direction: column; height: 100vh; position: relative; }
        .topbar { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,255,135,0.1); background: rgba(1,4,6,0.9); backdrop-filter: blur(15px); z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p-color); letter-spacing: 3px; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: none; scroll-behavior: smooth; }
        .content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* [3] UI 컴포넌트 */
        .sec-ttl { font-family: 'Orbitron'; font-size: 11px; color: var(--p-color); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; letter-spacing: 1.5px; }
        .sec-ttl::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--p-glow), transparent); }
        
        /* 아코디언 리그 일정 */
        .acc { background: var(--bg2); border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .acc-h { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; font-weight: 700; color: var(--t2); }
        .acc-b { max-height: 0; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.2); }
        .acc-b.open { max-height: 1200px; padding: 10px 0; }
        
        .m-card { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .m-card:active { background: rgba(255,255,255,0.03); }
        .m-info { flex: 1; }
        .m-team { display: flex; align-items: center; gap: 12px; font-size: 13px; margin: 5px 0; font-weight: 500; }
        .m-team img { width: 20px; height: 20px; object-fit: contain; }
        .m-score-box { text-align: right; min-width: 50px; font-family: 'Orbitron'; }
        .m-score { font-size: 18px; font-weight: 900; color: var(--p-color); }
        .m-status { font-family: 'Share Tech Mono'; font-size: 10px; color: var(--t3); margin-top: 3px; }

        /* 뉴스 카드 */
        .n-card { display: flex; gap: 15px; background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .n-img { width: 80px; height: 80px; background: linear-gradient(135deg, #0a1820, #020608); border-radius: 10px; flex-shrink: 0; }
        .n-info h4 { font-size: 14px; color: #fff; margin-bottom: 6px; line-height: 1.4; }
        .n-info p { font-size: 11px; color: var(--t2); line-height: 1.6; }

        /* 하단 내비게이션 */
        .b-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 80px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.08); z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; color: var(--t3); transition: 0.3s; }
        .n-btn.active { color: var(--p-color); text-shadow: 0 0 15px var(--p-glow); }
        .n-btn i { font-size: 22px; transition: 0.3s; }
        .n-btn.active i { transform: scale(1.1); }
        .n-btn span { font-size: 9px; font-family: 'Orbitron'; font-weight: 700; letter-spacing: 1px; }

        /* [4] 특수 효과 */
        #goal-overlay { position: fixed; inset: 0; z-index: 9999; pointer-events: none; background: radial-gradient(circle, var(--p-glow) 0%, transparent 70%); display: none; align-items: center; justify-content: center; flex-direction: column; }
        #goal-overlay.active { display: flex; animation: goalAnim 3s forwards; }
        @keyframes goalAnim { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
        .goal-txt { font-family: 'Orbitron'; font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 40px var(--p-color); animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .hidden { display: none !important; }
        .ldr-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; }
        .spin { width: 30px; height: 30px; border: 3px solid rgba(0,255,135,0.1); border-top-color: var(--p-color); border-radius: 50%; animation: sp 1s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT CLUB</div>
            <p style="font-size:11px; color:var(--t2); margin-top:8px;">인터페이스가 응원하는 팀의 컬러로 동기화됩니다.</p>
        </div>
        <div class="lg-nav-ob" id="ob-tabs"></div>
        <div id="ob-grid-area" style="flex:1; overflow:hidden; position:relative;"></div>
    </div>

    <div id="main-app" class="hidden">
        <div class="topbar">
            <div class="logo">PITCH PRO</div>
            <div id="user-team-badge" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">⚽</div>
        </div>

        <div id="p-live" class="content active">
            <div class="sec-ttl">LIVE OPERATIONS</div>
            <div id="live-list">
                <div class="ldr-wrap"><div class="spin"></div><p style="font-size:10px; margin-top:15px; color:var(--t3); letter-spacing:1px;">SCANNING LIVE MATCHES...</p></div>
            </div>
        </div>

        <div id="p-fix" class="content">
            <div class="sec-ttl">TACTICAL FIXTURES</div>
            <div id="fix-list"></div>
        </div>

        <div id="p-tab" class="content">
            <div class="sec-ttl">LEAGUE INTELLIGENCE</div>
            <div id="tab-nav" style="display:flex; overflow-x:auto; gap:10px; margin-bottom:15px; scrollbar-width:none;"></div>
            <div id="tab-content" style="background:var(--bg2); border-radius:16px; padding:20px; font-family:'Share Tech Mono'; font-size:11px; border:1px solid rgba(255,255,255,0.05);"></div>
        </div>

        <div id="p-news" class="content">
            <div class="sec-ttl">INTEL FEED</div>
            <div id="news-list"></div>
        </div>

        <div id="p-check" class="content">
            <div class="sec-ttl">STADIUM VERIFICATION</div>
            <div style="background:linear-gradient(135deg, var(--p-glow), transparent); padding:40px 20px; border-radius:20px; text-align:center; border:1px dashed var(--p-color); margin-top:30px;">
                <div style="font-size:50px; margin-bottom:20px;">🎫</div>
                <h3 style="font-family:'Orbitron'; font-size:16px; color:#fff;">MATCHDAY CHECK-IN</h3>
                <p style="font-size:11px; color:var(--t2); margin-top:10px; line-height:1.7;">경기장 반경 1km 이내 GPS 인증 시<br>PITCH Pro 독점 매치데이 배지를 드립니다.</p>
                <button onclick="doCheckin()" style="margin-top:30px; background:var(--p-color); color:var(--bg); border:none; padding:15px 40px; border-radius:12px; font-family:'Orbitron'; font-weight:900; cursor:pointer; width:100%; letter-spacing:1px;">VERIFY GPS</button>
            </div>
        </div>

        <div class="b-nav">
            <div class="n-btn active" onclick="sw('live', this)"><i>⚡</i><span>LIVE</span></div>
            <div class="n-btn" onclick="sw('fix', this)"><i>📅</i><span>FIXTURES</span></div>
            <div class="n-btn" onclick="sw('tab', this)"><i>📊</i><span>TABLES</span></div>
            <div class="n-btn" onclick="sw('news', this)"><i>📰</i><span>INTEL</span></div>
            <div class="n-btn" onclick="sw('check', this)"><i>🎫</i><span>CHECK</span></div>
        </div>
    </div>

    <div id="goal-overlay">
        <div class="goal-txt">GOAL!</div>
        <div id="goal-info" style="font-family:'Orbitron'; color:var(--p-color); font-weight:700; margin-top:15px; letter-spacing:2px;"></div>
    </div>

    <script>
        // --- [CONFIG & DATA] ---
        const API_KEY = 'YOUR_KEY_HERE'; // 실시간 연동 시 Football-Data.org API 키 입력
        const BASE_URL = 'https://api.football-data.org/v4';

        const leaguesData = [
            { id: "PL", sn: "EPL", n: "Premier League", teams: [
                { id: 73, n: "Tottenham", c: "#ffffff" }, { id: 65, n: "Man City", c: "#6caddf" }, { id: 57, n: "Arsenal", c: "#ef0107" }, { id: 64, n: "Liverpool", c: "#e31b23" },
                { id: 66, n: "Man Utd", c: "#da291c" }, { id: 61, n: "Chelsea", c: "#034694" }, { id: 67, n: "Newcastle", c: "#ffffff" }, { id: 58, n: "Aston Villa", c: "#95bfe5" },
                { id: 76, n: "Wolves", c: "#fdb913" }, { id: 62, n: "Everton", c: "#003399" }
            ]},
            { id: "PD", sn: "LALIGA", n: "La Liga", teams: [
                { id: 86, n: "Real Madrid", c: "#ffffff" }, { id: 81, n: "Barcelona", c: "#a50044" }, { id: 78, n: "Atletico", c: "#cb3524" }, { id: 92, n: "Real Sociedad", c: "#0067b1" },
                { id: 94, n: "Villarreal", c: "#fee300" }, { id: 558, n: "Sevilla", c: "#f43333" }, { id: 89, n: "Mallorca", c: "#e31b23" }
            ]},
            { id: "BL1", sn: "BUNDES", n: "Bundesliga", teams: [
                { id: 503, n: "FC Bayern", c: "#dc052d" }, { id: 4, n: "Dortmund", c: "#fde100" }, { id: 3, n: "Leverkusen", c: "#e32221" }, { id: 28, n: "RB Leipzig", c: "#dd013f" }
            ]},
            { id: "SA", sn: "SERIE A", n: "Serie A", teams: [
                { id: 108, n: "Inter", c: "#0066b2" }, { id: 98, n: "Milan", c: "#fb090b" }, { id: 113, n: "Napoli", c: "#007fff" }, { id: 109, n: "Juventus", c: "#ffffff" }
            ]},
            { id: "FL1", sn: "LIGUE 1", n: "Ligue 1", teams: [
                { id: 524, n: "PSG", c: "#004170" }, { id: 516, n: "Marseille", c: "#00abf3" }, { id: 548, n: "Monaco", c: "#ed1c24" }
            ]}
        ];

        // --- [APP LOGIC] ---
        async function fetchAPI(path) {
            if(API_KEY === 'YOUR_KEY_HERE') return null; // 키가 없으면 시뮬레이션 데이터 사용
            try {
                const res = await fetch(BASE_URL + path, { headers: { 'X-Auth-Token': API_KEY } });
                return await res.json();
            } catch (e) { return null; }
        }

        // 온보딩: 팀 리스트 빌드
        function initOnboarding() {
            const tabs = document.getElementById('ob-tabs');
            const gridArea = document.getElementById('ob-grid-area');

            leaguesData.forEach((lg, idx) => {
                const btn = document.createElement('div');
                btn.className = `ob-tab ${idx === 0 ? 'active' : ''}`;
                btn.innerText = lg.sn;
                btn.onclick = () => {
                    document.querySelectorAll('.ob-tab').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.ob-grid-area').forEach(g => g.classList.remove('active'));
                    document.getElementById(`ob-g-${idx}`).classList.add('active');
                };
                tabs.appendChild(btn);

                const grid = document.createElement('div');
                grid.id = `ob-g-${idx}`;
                grid.className = `ob-grid-area ${idx === 0 ? 'active' : ''}`;
                lg.teams.forEach(t => {
                    const item = document.createElement('div');
                    item.className = 't-item';
                    item.innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg" onerror="this.src='https://crests.football-data.org/${t.id}.png'"><div>${t.n}</div>`;
                    item.onclick = () => selectTeam(t);
                    grid.appendChild(item);
                });
                gridArea.appendChild(grid);
            });
        }

        // 테마 적용 및 시작
        function selectTeam(t) {
            document.documentElement.style.setProperty('--p-color', t.c);
            document.documentElement.style.setProperty('--p-glow', t.c + '55');
            document.getElementById('user-team-badge').innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg" width="24" height="24">`;
            
            const ob = document.getElementById('onboarding');
            ob.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                ob.classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadAllData();
            }, 700);
        }

        // 페이지 전환
        function sw(p, b) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            if(b) b.classList.add('active');
            if(p === 'live') loadLive();
            if(p === 'fix') loadFixtures();
            if(p === 'tab') loadTable('PL');
            if(p === 'news') loadNews();
        }

        // 데이터 로드 엔진
        async function loadAllData() {
            loadLive();
            loadFixtures();
            loadTable('PL');
            loadNews();
            // 30초마다 라이브 갱신
            setInterval(loadLive, 30000);
        }

        // ⚡ LIVE (시뮬레이션 및 실제 API 연동)
        async function loadLive() {
            const list = document.getElementById('live-list');
            const data = await fetchAPI('/matches?status=IN_PLAY');
            
            if(!data || !data.matches.length) {
                // 샘플 데이터 (API 키가 없거나 경기가 없을 때)
                list.innerHTML = `
                    <div class="acc" style="border-color: var(--p-color); background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);">
                        <div style="padding:25px; text-align:center;">
                            <div style="font-family:'Orbitron'; font-size:10px; color:var(--p-color); margin-bottom:15px; letter-spacing:1px;">PREMIER LEAGUE · LIVE 82'</div>
                            <div style="display:flex; justify-content:space-around; align-items:center;">
                                <div style="flex:1;"><img src="https://crests.football-data.org/73.svg" width="50"></div>
                                <div style="font-family:'Orbitron'; font-size:36px; font-weight:900; flex:1;">2 : 1</div>
                                <div style="flex:1;"><img src="https://crests.football-data.org/65.svg" width="50"></div>
                            </div>
                            <div style="margin-top:20px; font-size:10px; color:var(--t2);">⚽ 41' Son Heung-min, 68' Kulusevski</div>
                        </div>
                    </div>`;
                return;
            }
            // 실제 API 렌더링 (구조만 기술)
            renderMatches(data.matches, list);
        }

        // 📅 FIXTURES (아코디언)
        async function loadFixtures() {
            const list = document.getElementById('fix-list');
            list.innerHTML = '';
            leaguesData.forEach(lg => {
                const acc = document.createElement('div');
                acc.className = 'acc';
                acc.innerHTML = `
                    <div class="acc-h" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span>${lg.n}</span><span>▼</span>
                    </div>
                    <div class="acc-b open">
                        ${lg.teams.slice(0, 3).map(t => `
                            <div class="m-card">
                                <div class="m-info">
                                    <div class="m-team"><img src="https://crests.football-data.org/${t.id}.svg"><span>${t.n}</span></div>
                                    <div class="m-team"><img src="https://crests.football-data.org/65.svg"><span>Man City</span></div>
                                </div>
                                <div class="m-score-box">
                                    <div class="m-score" style="color:var(--t3)">VS</div>
                                    <div class="m-status">22:00</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                list.appendChild(acc);
            });
        }

        // 📊 TABLES
        async function loadTable(code) {
            const cont = document.getElementById('tab-content');
            cont.innerHTML = `<div class="spin" style="margin:20px auto;"></div>`;
            const data = await fetchAPI(`/competitions/${code}/standings`);
            
            setTimeout(() => {
                let html = `<div style="display:flex; color:var(--t3); margin-bottom:15px; font-size:10px;">
                    <span style="width:30px;">#</span><span style="flex:1;">CLUB</span><span style="width:30px; text-align:right;">PTS</span></div>`;
                // 시뮬레이션 행 생성
                [1,2,3,4,5,6].forEach(i => {
                    html += `<div style="display:flex; align-items:center; margin-bottom:12px;">
                        <span style="width:30px; color:${i<=4?'var(--p-color)':'var(--t3)'}; font-weight:700;">${i}</span>
                        <span style="flex:1; display:flex; align-items:center; gap:10px;">
                            <img src="https://crests.football-data.org/${leaguesData[0].teams[i-1].id}.svg" width="16">
                            ${leaguesData[0].teams[i-1].n}
                        </span>
                        <span style="width:30px; text-align:right; font-weight:700;">${90 - i*2}</span>
                    </div>`;
                });
                cont.innerHTML = html;
            }, 600);
        }

        // 📰 NEWS
        function loadNews() {
            const list = document.getElementById('news-list');
            const intel = [
                { t: "이적 시장 독점: 남호님이 선택한 팀의 새로운 수비 타겟 포착", d: "유럽 이적 전문가에 따르면 구단주가 직접 협상 테이블에 참여..." },
                { t: "챔피언스리그 8강 전술 분석: 데이터로 본 우승 확률", d: "AI 기반 기대 득점(xG) 데이터가 보여주는 놀라운 결과." }
            ];
            list.innerHTML = intel.map(n => `
                <div class="n-card">
                    <div class="n-img"></div>
                    <div class="n-info">
                        <h4>${n.t}</h4>
                        <p>${n.d}</p>
                    </div>
                </div>
            `).join('');
        }

        function triggerGoal(msg) {
            const ov = document.getElementById('goal-overlay');
            document.getElementById('goal-info').innerText = msg;
            ov.classList.add('active');
            setTimeout(() => ov.classList.remove('active'), 3000);
        }

        function doCheckin() { alert('📡 GPS 신호 탐색 중... 경기장 주변 확인 시 독점 배지가 지급됩니다.'); }

        // 초기화
        initOnboarding();
        // 테스트용: 10초 뒤에 골 애니메이션 발동
        setTimeout(() => triggerGoal('SON HEUNG-MIN SCORED!'), 15000);
    </script>
</body>
</html>
