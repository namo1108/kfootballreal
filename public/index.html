<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── [1. CSS: 디자인 시스템 완전 복구] ── */
:root{--f:'Noto Sans KR',-apple-system,sans-serif;--r:14px;--nh:60px;--hh:56px;}
[data-theme=dark]{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--cd:#1c2128;--cd2:#21262d;--p:#22c55e;--ps:rgba(34,197,94,.1);--pb:rgba(34,197,94,.25);--t:#e6edf3;--t2:#8b949e;--t3:#484f58;--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.18);--red:#f85149;--am:#d29922;--sh:0 8px 24px rgba(0,0,0,.5);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--f);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* ONBOARDING */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9000;overflow-y:auto;}
.ob-inner{max-width:900px;margin:0 auto;padding-bottom:48px;}
.ob-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:0 16px;}
.ob-team{background:var(--cd);border:2px solid var(--b);border-radius:11px;padding:11px 5px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ob-team.sel{border-color:var(--p);background:var(--ps);}
.ob-team img{width:32px;height:32px;object-fit:contain;}
.ob-start{display:block;margin:22px 16px;padding:15px;border-radius:12px;border:none;background:var(--p);color:#fff;font-weight:700;cursor:pointer;}

/* APP LAYOUT */
#app{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);}
#app.show{display:flex;}
.hdr{height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.hdr-logo{font-size:16px;font-weight:800;letter-spacing:2px;color:var(--p);}
.main-body{flex:1;display:flex;overflow:hidden;min-height:0;}
.sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--b);padding:10px 8px;display:none;background:var(--bg2);}
@media(min-width:768px){.sidebar{display:flex;flex-direction:column;gap:2px;}}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;}
.si.on{background:var(--ps);}
.si.on span{color:var(--p);font-weight:700;}
.pages{flex:1;position:relative;overflow:hidden;}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px;display:none;}
.page.on{display:block;}

/* [2. 기능별 스타일] */
.mc{background:var(--cd);border:1px solid var(--b);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer;}
.mc-top{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-bottom:1px solid var(--b);}
.mc-badge.live{background:rgba(239,68,68,0.1);color:var(--red);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.mc-sc{font-size:24px;font-weight:800;color:var(--t);}
.lg-hd{display:flex;align-items:center;gap:9px;padding:12px 14px;background:var(--cd);border:1px solid var(--b);border-radius:11px;cursor:pointer;margin-bottom:6px;}
.lg-ms{display:flex;flex-direction:column;gap:2px;margin-bottom:12px;}

/* GOAL ANIMATION */
#gt{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none;align-items:center;justify-content:center;}
.gt-box{text-align:center; animation: gtPop 3s ease forwards; background:rgba(0,0,0,0.9); padding:40px; border-radius:30px; border:2px solid var(--p);}
@keyframes gtPop{0%{transform:scale(0.5);opacity:0} 15%{transform:scale(1.1);opacity:1} 100%{opacity:0}}

/* FOOTER NAV */
.bnav{display:flex; height:var(--nh); background:var(--bg2); border-top:1px solid var(--b);}
@media(min-width:768px){.bnav{display:none;}}
.nbi{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; background:none; border:none; cursor:pointer;}
.nbi.on .ni-lb{color:var(--p);}
.ni-lb{font-size:10px; color:var(--t3);}
</style>
</head>
<body data-theme="dark">

<div id="ob">
<div class="ob-inner">
  <div class="ob-hero">
    <div class="ob-logo">PITCH PRO</div>
    <div class="ob-hint">응원하는 팀을 선택하고 시작하세요</div>
  </div>
  <div class="ob-grid" id="ob-list"></div>
  <button class="ob-start" id="ob-btn" onclick="startApp()">시작하기</button>
</div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-logo">PITCH PRO</div>
    <div class="hdr-r">
      <div class="lpill" id="lpill"><div class="ldot"></div><span>LIVE</span></div>
      <div class="hdr-lv" id="hdr-lv">Lv.1</div>
      <img class="hdr-cr" id="hdr-cr" src="">
    </div>
  </div>
  <div class="main-body">
    <div class="sidebar">
      <div class="si on" onclick="swP('home',this)"><span>⚡ 라이브</span></div>
      <div class="si" onclick="swP('sched',this)"><span>📅 일정</span></div>
      <div class="si" onclick="swP('std',this)"><span>📊 순위</span></div>
      <div class="si" onclick="swP('player',this)"><span>👟 선수</span></div>
      <div class="si" onclick="swP('fan',this)"><span>⭐ 팬존</span></div>
    </div>
    <div class="pages">
      <div class="page on" id="pg-home"><div id="home-bd"></div></div>
      <div class="page" id="pg-sched">
        <div id="date-nav" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
        <div id="sched-bd"></div>
      </div>
      <div class="page" id="pg-std"><div class="pills" id="std-pills" style="display:flex; gap:6px; overflow-x:auto; margin-bottom:15px;"></div><div id="std-bd"></div></div>
      <div class="page" id="pg-player"><div class="pills" id="pl-pills" style="display:flex; gap:6px; margin-bottom:15px;"></div><div id="pl-bd"></div></div>
      <div class="page" id="pg-fan"><div id="fan-bd"></div></div>
    </div>
  </div>
  <div class="bnav">
    <button class="nbi on" onclick="swP('home',this)"><div class="ni-ic">⚡</div><div class="ni-lb">라이브</div></button>
    <button class="nbi" onclick="swP('sched',this)"><div class="ni-ic">📅</div><div class="ni-lb">일정</div></button>
    <button class="nbi" onclick="swP('std',this)"><div class="ni-ic">📊</div><div class="ni-lb">순위</div></button>
    <button class="nbi" onclick="swP('fan',this)"><div class="ni-ic">⭐</div><div class="ni-lb">팬존</div></button>
  </div>
</div>

<div id="gt">
  <div class="gt-box">
    <h1 style="font-size:60px; color:var(--p); margin:0;">GOAL!</h1>
    <div id="gt-scorer" style="font-size:24px; color:#fff; margin-top:10px;"></div>
  </div>
</div>

<div class="modal" id="dtl-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center; padding:20px;">
  <div class="modal-in" style="background:var(--cd); border-radius:20px; width:100%; max-width:500px; padding:20px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h3 id="dtl-ttl">경기 정보</h3>
      <button onclick="document.getElementById('dtl-modal').style.display='none'" style="background:none; border:none; color:var(--t); font-size:24px;">×</button>
    </div>
    <div id="dtl-body"></div>
  </div>
</div>

<script>
// ── [3. JS: 로직 및 기능 완전 복구] ──

const API = '/api/football';
const LGS = [
  {code:'PL', name:'프리미어리그', emblem:'https://crests.football-data.org/PL.png'},
  {code:'PD', name:'라리가', emblem:'https://crests.football-data.org/PD.png'},
  {code:'BL1',name:'분데스리가', emblem:'https://crests.football-data.org/BL1.png'},
  {code:'SA', name:'세리에A', emblem:'https://crests.football-data.org/SA.png'},
  {code:'KL1',name:'K리그 1', emblem:'https://media.api-sports.io/football/leagues/292.png'}
];

const cache = {};
let prevScores = {};
let MT = null;
let curSchedDate = new Date().toISOString().split('T')[0];

// [시간 보정 - KST]
const formatKST = (utc) => new Date(new Date(utc).getTime() + 9*60*60*1000).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});

// [스마트 캐시 - 429 방지]
async function fetchData(path, isStatic = false) {
  const ttl = isStatic ? 1800000 : 60000;
  if(cache[path] && (Date.now() - cache[path].ts < ttl)) return cache[path].data;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if(d.errorCode === 429) return cache[path]?.data || d;
    cache[path] = { data: d, ts: Date.now() };
    return d;
  } catch(e) { return null; }
}

// [1. 라이브 경기 & 골 애니메이션]
async function loadHome() {
  const c = document.getElementById('home-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const d = await fetchData('/matches');
  if(!d?.matches) return;

  const live = d.matches.filter(m => ['IN_PLAY','HALFTIME','PAUSED'].includes(m.status));
  document.getElementById('lpill').classList.toggle('show', live.length > 0);

  // 골 감지 로직
  live.forEach(m => {
    const sc = `${m.score.fullTime.home}-${m.score.fullTime.away}`;
    if(prevScores[m.id] && prevScores[m.id] !== sc) {
      triggerGoal(m.homeTeam.shortName || m.homeTeam.name);
    }
    prevScores[m.id] = sc;
  });

  let html = '<div class="sec"><span class="stl">라이브 경기</span></div>';
  live.forEach(m => {
    html += `
      <div class="mc" onclick="showDtl(${m.id})">
        <div class="mc-top"><span>${m.competition.name}</span><span class="mc-badge live">LIVE</span></div>
        <div class="mc-body" style="display:flex; justify-content:space-between; align-items:center;">
          <div style="text-align:center; flex:1;"><img src="${m.homeTeam.crest}" style="width:30px;"><br>${m.homeTeam.shortName}</div>
          <div class="mc-sc">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
          <div style="text-align:center; flex:1;"><img src="${m.awayTeam.crest}" style="width:30px;"><br>${m.awayTeam.shortName}</div>
        </div>
      </div>`;
  });
  c.innerHTML = live.length ? html : '<div class="empty">현재 진행 중인 경기가 없습니다.</div>';
}

function triggerGoal(team) {
  const gt = document.getElementById('gt');
  document.getElementById('gt-scorer').textContent = `${team} 득점!`;
  gt.style.display = 'flex';
  new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3').play().catch(()=>{});
  setTimeout(() => gt.style.display = 'none', 3000);
}

// [2. 일정 - 리그별 접기/펴기]
async function loadSched(date) {
  curSchedDate = date;
  const c = document.getElementById('sched-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  
  const d = await fetchData(`/matches?dateFrom=${date}&dateTo=${date}`);
  if(!d.matches?.length) { c.innerHTML = '<div class="empty">경기가 없습니다.</div>'; return; }

  // 리그별 그룹화
  const groups = d.matches.reduce((acc, m) => {
    acc[m.competition.name] = acc[m.competition.name] || [];
    acc[m.competition.name].push(m);
    return acc;
  }, {});

  let html = '';
  for(const [name, matches] of Object.entries(groups)) {
    const cid = `lg-${name.replace(/\s/g,'')}`;
    html += `
      <div class="lg-hd" onclick="toggleLg('${cid}')">
        <span style="flex:1;">${name}</span>
        <span style="font-size:12px; color:var(--t3);">${matches.length} 경기 ▾</span>
      </div>
      <div class="lg-ms" id="${cid}">
        ${matches.map(m => `
          <div class="mc" onclick="showDtl(${m.id})" style="margin:5px 0;">
            <div style="display:flex; justify-content:space-between; padding:10px 15px;">
              <span>${formatKST(m.utcDate)}</span>
              <span>${m.homeTeam.shortName} vs ${m.awayTeam.shortName}</span>
              <span style="color:var(--p); font-weight:700;">${m.status==='FINISHED'?m.score.fullTime.home+':'+m.score.fullTime.away:'VS'}</span>
            </div>
          </div>
        `).join('')}
      </div>`;
  }
  c.innerHTML = html;
  renderDateNav();
}

function toggleLg(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

// [3. 순위 - 리그별 아이콘]
async function loadStd(code) {
  const c = document.getElementById('std-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const d = await fetchData(`/competitions/${code}/standings`, true);
  if(!d.standings) return;

  const rows = d.standings[0].table;
  let html = `<div class="std-wrap"><table class="stt"><tr><th>#</th><th>팀</th><th>경</th><th>승</th><th>무</th><th>패</th><th>P</th></tr>`;
  rows.forEach(r => {
    html += `<tr>
      <td>${r.position}</td>
      <td class="nm-cell"><img src="${r.team.crest}">${r.team.shortName}</td>
      <td>${r.playedGames}</td><td>${r.won}</td><td>${r.draw}</td><td>${r.lost}</td>
      <td class="pts">${r.points}</td>
    </tr>`;
  });
  html += '</table></div>';
  c.innerHTML = html;
}

// [4. 선수 - 득점/도움]
async function loadPlayers(lg) {
  const c = document.getElementById('pl-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const d = await fetchData(`/competitions/${lg}/scorers`, true);
  if(!d.scorers) return;

  let html = '';
  d.scorers.slice(0,15).forEach((s,i) => {
    html += `
      <div style="display:flex; align-items:center; gap:15px; padding:12px; background:var(--cd); border-radius:10px; margin-bottom:8px;">
        <span style="font-weight:800; color:var(--p);">${i+1}</span>
        <div style="flex:1;"><b>${s.player.name}</b><br><small>${s.team.name}</small></div>
        <div style="text-align:right;"><b>${s.goals} 골</b></div>
      </div>`;
  });
  c.innerHTML = html;
}

// [5. 팬존 - 레벨 & 집관인증]
function updateFan() {
  const c = document.getElementById('fan-bd');
  const now = new Date();
  // 가상의 로직: 현재 시간 근처에 경기가 있는지 확인
  c.innerHTML = `
    <div style="background:var(--ps); border:2px solid var(--pb); border-radius:15px; padding:20px; text-align:center; margin-bottom:20px;">
      <div style="font-size:40px;">🏆</div>
      <h2 style="color:var(--p);">Level. 3</h2>
      <p style="font-size:12px; color:var(--t2);">현재 총 12경기 집관 완료!</p>
    </div>
    <div class="sec"><span class="stl">집관 인증</span></div>
    <div class="empty" id="ci-status">현재 인증 가능한 경기가 없습니다.<br><small>경기 시작 30분 전부터 가능합니다.</small></div>
  `;
}

// [기초 유틸리티]
async function showDtl(id) {
  const d = await fetchData(`/matches/${id}`);
  const m = d;
  const modal = document.getElementById('dtl-modal');
  const body = document.getElementById('dtl-body');
  body.innerHTML = `
    <div style="text-align:center;">
      <div style="display:flex; justify-content:space-around; align-items:center;">
        <div><img src="${m.homeTeam.crest}" style="width:50px;"><br>${m.homeTeam.name}</div>
        <div style="font-size:30px; font-weight:800;">${m.score.fullTime.home ?? 0} : ${m.score.fullTime.away ?? 0}</div>
        <div><img src="${m.awayTeam.crest}" style="width:50px;"><br>${m.awayTeam.name}</div>
      </div>
      <hr style="margin:20px 0; opacity:0.1;">
      <p>📅 일시: ${formatKST(m.utcDate)}</p>
      <p>🏟️ 경기장: ${m.venue || '정보 없음'}</p>
    </div>
  `;
  modal.style.display = 'flex';
}

function renderDateNav() {
  const nav = document.getElementById('date-nav');
  if(nav.children.length > 0) return;
  for(let i=-2; i<=4; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const ds = d.toISOString().split('T')[0];
    const btn = document.createElement('button');
    btn.className = `pill ${ds === curSchedDate ? 'on' : ''}`;
    btn.textContent = i===0 ? '오늘' : `${d.getMonth()+1}/${d.getDate()}`;
    btn.onclick = () => {
      document.querySelectorAll('#date-nav .pill').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      loadSched(ds);
    };
    nav.appendChild(btn);
  }
}

function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  if(el) {
    document.querySelectorAll('.si, .nbi').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }
  if(name === 'home') loadHome();
  if(name === 'sched') loadSched(new Date().toISOString().split('T')[0]);
  if(name === 'std') {
    const sp = document.getElementById('std-pills');
    if(!sp.innerHTML) sp.innerHTML = LGS.map(l => `<button class="pill" onclick="loadStd('${l.code}')"><img src="${l.emblem}" style="width:14px; vertical-align:middle; margin-right:5px;">${l.name}</button>`).join('');
    loadStd('PL');
  }
  if(name === 'player') {
    const pp = document.getElementById('pl-pills');
    if(!pp.innerHTML) pp.innerHTML = LGS.map(l => `<button class="pill" onclick="loadPlayers('${l.code}')">${l.name}</button>`).join('');
    loadPlayers('PL');
  }
  if(name === 'fan') updateFan();
}

function startApp() {
  document.getElementById('ob').style.display = 'none';
  document.getElementById('app').classList.add('show');
  swP('home');
}

// 주기적 라이브 업데이트 (30초)
setInterval(loadHome, 30000);
</script>
</body>
</html>
