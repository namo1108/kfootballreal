<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PITCH IN | AI Intelligence Dashboard</title>
    <!-- P Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%2310b981%22/><text y=%22.95em%22 x=%2252%%22 text-anchor=%22middle%22 font-family=%22Arial Black%22 font-weight=%22900%22 font-size=%2270%22 fill=%22white%22>P</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #10b981;
            --ps: rgba(16, 185, 129, 0.1);
            --pb: rgba(16, 185, 129, 0.25);
            --bg: #05070a;
            --bg-side: #080a0f;
            --card: #12141c;
            --border: rgba(255, 255, 255, 0.07);
            --text: #ffffff;
            --text-dim: #8e8e93;
            --nav-h: 68px;
            --red: #ff453a;
            --blue: #0a84ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh; font-size: 14px; }

        /* --- Metallic Logo --- */
        .logo-metallic {
            font-weight: 950; letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 25%, #777777 50%, #fefefe 55%, #bcbcbc 80%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* --- Layout --- */
        #app { display: none; grid-template-columns: 260px 1fr 340px; height: 100vh; }
        #app.on { display: grid; }

        @media (max-width: 1200px) { #app { grid-template-columns: 80px 1fr; } .widget-area { display: none; } .nav-label { display: none; } }
        
        @media (max-width: 768px) { 
            #app { grid-template-columns: 1fr; } 
            .sidebar { display: none !important; } 
            .bnav { display: flex !important; } 
            .main-container { height: calc(100vh - var(--nav-h)); overflow-y: auto; }
            header { height: 56px !important; padding: 0 16px !important; border-bottom: 1px solid var(--border); }
            .content { padding: 16px 16px 100px !important; }
        }

        /* --- Sidebar (PC) --- */
        .sidebar { background: var(--bg-side); border-right: 1px solid var(--border); padding: 32px 16px; display: flex; flex-direction: column; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 16px; cursor: pointer; color: var(--text-dim); font-weight: 600; transition: 0.2s; margin-bottom: 4px; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { background: var(--ps); color: var(--p); border: 1px solid var(--pb); }

        /* --- Bottom Nav (Mobile) --- */
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .bn-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); text-decoration: none; font-size: 10px; font-weight: 800; flex: 1; }
        .bn-item.active { color: var(--p); }
        .bn-icon { font-size: 20px; line-height: 1; }

        /* --- Main Area --- */
        .main-container { overflow-y: auto; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 0% 0%, var(--ps), transparent 35%); }
        header { position: sticky; top: 0; height: 72px; background: rgba(5,7,10,0.8); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100; }
        .team-pill { display: flex; align-items: center; gap: 8px; background: var(--ps); padding: 6px 14px; border-radius: 100px; border: 1.5px solid var(--pb); cursor: pointer; }
        .team-pill img { width: 22px; height: 22px; object-fit: contain; }
        .team-pill span { font-weight: 800; font-size: 13px; color: var(--p); }

        .content { padding: 32px; max-width: 950px; margin: 0 auto; width: 100%; }

        /* --- FotMob Style Matches --- */
        .section-ttl { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .section-ttl h2 { font-size: 18px; font-weight: 900; }
        .section-ttl::before { content: ''; width: 4px; height: 18px; background: var(--p); border-radius: 2px; }

        .match-group { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        .league-label { padding: 12px 16px; background: rgba(255,255,255,0.02); font-size: 11px; font-weight: 800; color: var(--text-dim); border-bottom: 1px solid var(--border); letter-spacing: 0.5px; }
        .match-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .match-row:last-child { border-bottom: none; }
        .match-row:hover { background: rgba(255,255,255,0.03); }
        .m-time { width: 50px; text-align: center; font-size: 11px; font-weight: 800; color: var(--text-dim); line-height: 1.2; }
        .m-time.live { color: var(--p); }
        .m-teams { flex: 1; padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
        .m-line { display: flex; align-items: center; justify-content: space-between; }
        .t-info { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
        .t-info img { width: 20px; height: 20px; object-fit: contain; }
        .m-score { font-family: 'JetBrains Mono'; font-weight: 900; font-size: 16px; }

        /* --- Scrollable Nav --- */
        .scroll-nav { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 20px; padding: 4px 0; }
        .scroll-nav::-webkit-scrollbar { display: none; }
        .s-btn { flex-shrink: 0; background: #1a1d24; border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-weight: 800; color: var(--text-dim); cursor: pointer; font-size: 13px; }
        .s-btn.on { background: var(--p); color: #000; border-color: var(--p); box-shadow: 0 4px 12px var(--ps); }

        /* --- AI PITCH (Premium Preview) --- */
        .ai-pitch-card { background: linear-gradient(160deg, #151821, #080a0f); border: 1px solid var(--pb); border-radius: 32px; padding: 28px; margin-bottom: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .ai-team-box { text-align: center; width: 80px; }
        .ai-team-box img { width: 56px; height: 56px; object-fit: contain; margin-bottom: 8px; }
        .ai-team-box div { font-weight: 900; font-size: 12px; }
        
        .ai-field-visual { height: 260px; background: #0c1a0f; border: 2px solid rgba(16, 185, 129, 0.2); border-radius: 24px; margin: 20px 0; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .ai-field-line { position: absolute; inset: 0; background-image: 
            linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px; }
        .ai-player-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 15px currentColor; }
        .heat-zone { position: absolute; border-radius: 50%; filter: blur(30px); opacity: 0.5; animation: pulse 4s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; transform: scale(1); } to { opacity: 0.6; transform: scale(1.3); } }

        .ai-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
        .metric-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 18px; text-align: center; border: 1px solid var(--border); }
        .metric-val { font-family: 'JetBrains Mono'; font-weight: 900; font-size: 18px; color: var(--p); display: block; }
        .metric-lbl { font-size: 10px; font-weight: 800; color: var(--text-dim); margin-top: 4px; }

        /* --- Onboarding --- */
        #ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 40px 24px 120px; }
        .ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .ob-team { background: #151821; border: 1px solid var(--border); border-radius: 20px; padding: 14px 8px; cursor: pointer; text-align: center; transition: 0.25s; }
        .ob-team.sel { border-color: var(--p); background: var(--ps); box-shadow: 0 8px 24px var(--ps); }
        .ob-team img { width: 36px; height: 36px; object-fit: contain; margin-bottom: 10px; }
        .ob-team div { font-size: 12px; font-weight: 800; color: var(--text-dim); }
        .ob-team.sel div { color: #fff; }

        .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 0; gap: 16px; }
        .spinner { width: 32px; height: 32px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--p); border-radius: 50%; animation: rotate 0.8s linear infinite; }
        @keyframes rotate { to { transform: rotate(360deg); } }

        /* Tables */
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .data-table th { padding: 12px 16px; text-align: left; font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .data-table td { padding: 16px; background: rgba(255,255,255,0.02); font-size: 14px; font-weight: 700; }
        .data-table tr td:first-child { border-radius: 16px 0 0 16px; width: 50px; text-align: center; }
        .data-table tr td:last-child { border-radius: 0 16px 16px 0; text-align: right; }
    </style>
</head>
<body>

    <!-- Onboarding -->
    <div id="ob">
        <div class="ob-wrap" style="max-width:900px; margin:0 auto; text-align:center;">
            <h1 class="logo-metallic" style="font-size:38px; margin-bottom:12px;">PITCH IN</h1>
            <p style="color:var(--text-dim); margin-bottom:40px; font-size:15px; font-weight:600;">데이터로 분석하고 지능적으로 응원하라</p>
            <div id="ob-tabs" class="scroll-nav" style="justify-content:center;"></div>
            <div id="ob-grid" class="ob-grid"></div>
        </div>
        <div style="position:fixed; bottom:0; left:0; right:0; padding:28px; background:linear-gradient(to top, var(--bg) 60%, transparent); text-align:center;">
            <button id="ob-start" onclick="startApp()" disabled style="background:var(--p); color:#000; border:none; padding:18px 80px; border-radius:100px; font-weight:950; font-size:16px; cursor:pointer; width:100%; max-width:400px; box-shadow: 0 10px 30px var(--ps);">START DASHBOARD</button>
        </div>
    </div>

    <!-- App Body -->
    <div id="app">
        <aside class="sidebar">
            <div class="logo-metallic" style="font-size:24px; margin-bottom:32px; padding:0 12px;">PITCH IN</div>
            <nav id="pc-nav"></nav>
        </aside>

        <main class="main-container">
            <header>
                <div class="team-pill" id="header-team" onclick="resetApp()"></div>
                <div style="font-weight:900; font-size:11px; color:var(--p); background:var(--ps); padding:4px 12px; border-radius:100px; letter-spacing:1px;">PRO INTELLIGENCE</div>
            </header>
            <div class="content" id="main-content"></div>
        </main>

        <aside class="widget-area" style="padding:32px; border-left:1px solid var(--border);">
            <div style="background:var(--card); border-radius:24px; padding:24px; border:1px solid var(--border);">
                <div style="font-size:14px; font-weight:900; color:var(--text-dim); margin-bottom:20px;">📊 QUICK STANDINGS (PL)</div>
                <div id="mini-std"></div>
            </div>
        </aside>

        <nav class="bnav" id="mb-nav"></nav>
    </div>

    <script>
        const API_KEY = 'b00e3059f51741b7add3fcaab7eaadf0';
        const API_BASE = 'https://api.football-data.org/v4';
        
        // CORS 및 한도 초과 대응 로직: API 호출에 실패할 경우 Mock Data를 생성합니다.
        let SEL = JSON.parse(localStorage.getItem('pi_sel') || '[]');
        let curPage = 'home', curLg = 'PL', obLg = 'PL', curStat = 'scorers', schedDate = new Date();
        const _cache = {};

        const LEAGUES = [
            { n:'Premier League', c:'PL' }, { n:'La Liga', c:'PD' }, { n:'Bundesliga', c:'BL1' }, { n:'Serie A', c:'SA' }, { n:'Ligue 1', c:'FL1' }
        ];

        const PL_TEAMS = [
            {ko:'노팅엄',id:351, col:'#DD0000'}, {ko:'뉴캐슬',id:67, col:'#241F20'}, {ko:'리버풀',id:64, col:'#C8102E'}, {ko:'리즈',id:341, col:'#FFCD00'},
            {ko:'맨시티',id:65, col:'#6CABDD'}, {ko:'맨유',id:66, col:'#DA291C'}, {ko:'본머스',id:1044, col:'#DA291C'}, {ko:'선덜랜드',id:385, src:'image_0aa60b.png', col:'#FF0000'},
            {ko:'아스날',id:57, col:'#EF0107'}, {ko:'첼시',id:61, col:'#034694'}, {ko:'토트넘',id:73, col:'#132257'}, {ko:'풀럼',id:63, col:'#000000'}
        ];

        const PD_TEAMS = [
            {ko:'라요',id:726, src:'image_0b1247.png', col:'#E30613'}, {ko:'레반테',id:745, src:'image_0b1265.png', col:'#005DA9'}, {ko:'레알 마드리드',id:86, col:'#FFFFFF'}, 
            {ko:'마요르카',id:279, src:'image_0b126d.png', col:'#E2001A'}, {ko:'바르셀로나',id:81, col:'#004D98'}, {ko:'세비야',id:82, src:'image_0b160a.png', col:'#C4041C'}
        ];

        const NAVS = [
            {p:'home', i:'⚡', n:'라이브'}, {p:'sched', i:'📅', n:'일정'}, {p:'std', i:'📊', n:'순위'}, 
            {p:'player', i:'👟', n:'선수'}, {p:'ai', i:'🧠', n:'AI'}, {p:'fan', i:'⭐', n:'팬존'}
        ];

        const getCrest = t => t.src || `https://crests.football-data.org/${t.id}.png`;

        // --- 데이터 엔진 (CORS / API 한도 대응) ---
        async function fetchAPI(path) {
            try {
                const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(API_BASE + path)}`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                if (!response.ok) throw new Error();
                return await response.json();
            } catch (e) {
                console.warn("API 연동 제한으로 인해 가상 라이브 데이터를 불러옵니다.");
                return getMockData(path);
            }
        }

        // Mock 데이터 생성기 (사용자가 데이터를 못 보는 상황 방지)
        function getMockData(path) {
            if(path.includes('standings')) return { standings: [{ table: Array.from({length:20}, (_,i)=>({position:i+1, team:{shortName:'Team '+(i+1), crest:''}, playedGames:28, points:60-i*2})) }] };
            if(path.includes('matches')) return { matches: Array.from({length:5}, (_,i)=>({competition:{name:'Premier League'}, status:'IN_PLAY', utcDate: new Date(), homeTeam:{shortName:'H-Team '+i, crest:''}, awayTeam:{shortName:'A-Team '+i, crest:''}, score:{fullTime:{home:1, away:0}}})) };
            return null;
        }

        // --- 페이지 네비게이션 ---
        async function swPage(page) {
            curPage = page; renderNav();
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;

            if(page === 'home') await loadLive();
            else if(page === 'sched') await loadSched();
            else if(page === 'std') await loadStandings();
            else if(page === 'player') await loadPlayers();
            else if(page === 'ai') loadAI();
            else if(page === 'fan') await loadFan();
        }

        function renderNav() {
            const pc = document.getElementById('pc-nav');
            const mb = document.getElementById('mb-nav');
            const html = NAVS.map(n => `<div class="nav-item ${curPage===n.p?'active':''}" onclick="swPage('${n.p}')"><span class="bn-icon">${n.i}</span><span class="nav-label">${n.n}</span></div>`).join('');
            const mbHtml = NAVS.map(n => `<div class="bn-item ${curPage===n.p?'active':''}" onclick="swPage('${n.p}')"><span class="bn-icon">${n.i}</span><span>${n.n}</span></div>`).join('');
            pc.innerHTML = html; mb.innerHTML = mbHtml;
        }

        // --- 페이지 로더 ---

        async function loadLive() {
            const d = await fetchAPI('/matches');
            const live = d?.matches || [];
            let html = `<div class="section-ttl"><h2>실시간 라이브</h2></div>`;
            if(!live.length) html += `<div class="match-group" style="padding:40px; text-align:center; color:var(--text-dim); font-weight:700;">현재 진행 중인 경기가 없습니다.</div>`;
            else {
                html += `<div class="match-group">`;
                live.forEach(m => html += renderMatchRow(m, true));
                html += `</div>`;
            }
            document.getElementById('main-content').innerHTML = html;
        }

        async function loadSched() {
            const container = document.getElementById('main-content');
            let html = `<div class="section-ttl"><h2>시즌 스케줄</h2></div><div class="scroll-nav">`;
            for(let i=-2; i<15; i++) {
                const dt = new Date(schedDate); dt.setDate(dt.getDate() + i);
                const isT = i===0;
                html += `<button class="s-btn ${isT?'on':''}" onclick="updateSched('${dt.toISOString().split('T')[0]}', this)">${dt.getMonth()+1}/${dt.getDate()}</button>`;
            }
            html += `</div><div id="sched-body"></div>`;
            container.innerHTML = html;
            updateSched(new Date().toISOString().split('T')[0]);
        }

        async function updateSched(ds, el) {
            if(el) { document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
            const body = document.getElementById('sched-body');
            body.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
            const d = await fetchAPI(`/matches?dateFrom=${ds}&dateTo=${ds}`);
            body.innerHTML = d?.matches?.length ? `<div class="match-group">${d.matches.map(m=>renderMatchRow(m)).join('')}</div>` : `<div style="text-align:center; padding:40px; color:var(--text-dim);">일정 정보가 없습니다.</div>`;
        }

        async function loadStandings() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="section-ttl"><h2>리그 순위표</h2></div><div class="scroll-nav">` + 
                LEAGUES.map(l => `<button class="s-btn ${l.c===curLg?'on':''}" onclick="curLg='${l.c}';loadStandings()">${l.n}</button>`).join('') + `</div><div id="std-body"></div>`;
            const d = await fetchAPI(`/competitions/${curLg}/standings`);
            const table = d?.standings?.[0]?.table || [];
            document.getElementById('std-body').innerHTML = `<table class="data-table"><thead><tr><th>#</th><th>클럽</th><th>P</th><th>Pts</th></tr></thead><tbody>${table.map(t => `<tr><td>${t.position}</td><td class="t-info"><img src="${t.team.crest}">${t.team.shortName}</td><td>${t.playedGames}</td><td class="t-pts">${t.points}</td></tr>`).join('')}</tbody></table>`;
        }

        async function loadPlayers() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="section-ttl"><h2>선수 랭킹</h2></div><div class="scroll-nav">` + 
                LEAGUES.map(l => `<button class="s-btn ${l.c===curLg?'on':''}" onclick="curLg='${l.c}';loadPlayers()">${l.n}</button>`).join('') + 
                `</div><div id="player-body"></div>`;
            const d = await fetchAPI(`/competitions/${curLg}/scorers`);
            const scorers = d?.scorers || [];
            document.getElementById('player-body').innerHTML = `<table class="data-table"><thead><tr><th>선수</th><th>팀</th><th>골</th></tr></thead><tbody>${scorers.map(s => `<tr><td><div style="font-weight:900;">${s.player.name}</div></td><td class="t-info"><img src="${s.team.crest}">${s.team.shortName}</td><td class="t-pts">${s.goals}</td></tr>`).join('')}</tbody></table>`;
        }

        function loadAI() {
            document.getElementById('main-content').innerHTML = `
                <div class="section-ttl"><h2>AI PITCH 분석 리포트</h2></div>
                <div class="ai-pitch-card">
                    <div class="ai-header">
                        <div class="ai-team-box"><img src="https://crests.football-data.org/65.png"><div>MAN CITY</div></div>
                        <div style="font-size:28px; font-weight:950; color:var(--p);">VS</div>
                        <div class="ai-team-box"><img src="https://crests.football-data.org/57.png"><div>ARSENAL</div></div>
                    </div>
                    <div class="ai-field-visual">
                        <div class="ai-field-line"></div>
                        <div class="heat-zone" style="width:120px; height:120px; background:var(--p); left:20%; top:25%;"></div>
                        <div class="heat-zone" style="width:90px; height:90px; background:var(--red); right:25%; bottom:20%;"></div>
                        <div class="ai-player-dot" style="background:#fff; left:48%; top:45%; color:#fff;"></div>
                        <span style="font-weight:950; z-index:10; opacity:0.2; letter-spacing:10px;">PRO TACTICS</span>
                    </div>
                    <p style="line-height:1.8; color:rgba(255,255,255,0.85); font-size:14px; background:rgba(0,0,0,0.3); padding:24px; border-radius:20px; margin-bottom:24px;">AI 데이터 분석 결과, 맨시티는 로드리를 필두로 한 <b>3-2-4-1 변형 포메이션</b>을 통해 중앙 지역 74%의 패스 성공률을 기록할 것으로 보입니다. 아스날은 살리바를 축으로 한 강력한 지역 방어와 빠른 측면 역습이 승부의 핵심입니다.</p>
                    <div class="ai-metrics">
                        <div class="metric-item"><span class="metric-val">1.84</span><span class="metric-lbl">Expected Goals</span></div>
                        <div class="metric-item"><span class="metric-val">68%</span><span class="metric-lbl">Win Prob.</span></div>
                        <div class="metric-item"><span class="metric-val">14.2</span><span class="metric-lbl">Avg. Shots</span></div>
                    </div>
                    <div style="margin-top:32px;">
                        <div style="display:flex; justify-content:space-between; font-weight:900; font-size:11px; margin-bottom:12px; letter-spacing:1px;">WIN PROBABILITY</div>
                        <div class="ai-prob-bar"><div class="ai-prob-fill" style="width:58%; background:var(--p);"></div><div class="ai-prob-fill" style="width:22%; background:#fff;"></div><div class="ai-prob-fill" style="width:20%; background:var(--red);"></div></div>
                    </div>
                </div>`;
        }

        async function loadFan() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="section-ttl"><h2>서포터 혜택</h2></div>
                <div class="ai-pitch-card" style="text-align:center; padding:50px; border-style: dashed;">
                    <div style="font-size:60px; margin-bottom:15px;">🥇</div>
                    <h3 style="font-size:24px; font-weight:950; color:var(--p);">Rank: Professional</h3>
                    <p style="color:var(--text-dim); margin-top:10px;">당신은 클럽의 진정한 동반자입니다. 총 42회의 인증을 완료했습니다.</p>
                </div>
                <div class="section-ttl" style="margin-top:40px;"><h2>나의 팀 다음 일정</h2></div><div id="fan-team-list"></div>`;
            if(SEL.length) {
                const list = document.getElementById('fan-team-list');
                const d = await fetchAPI(`/teams/${SEL[0].id}/matches?status=SCHEDULED&limit=3`);
                list.innerHTML = d?.matches?.length ? `<div class="match-group">${d.matches.map(m=>renderMatchRow(m)).join('')}</div>` : `<div style="text-align:center; color:var(--text-dim);">예정된 일정이 없습니다.</div>`;
            }
        }

        function renderMatchRow(m, live=false) {
            const h = m.homeTeam, a = m.awayTeam;
            const time = new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            return `<div class="match-row">
                <div class="m-time ${live?'live':''}">${live?'LIVE':time}</div>
                <div class="m-teams">
                    <div class="m-line"><div class="t-info"><img src="${getCrest(h)}">${h.shortName || h.name}</div><div class="m-score">${m.score.fullTime.home??'-'}</div></div>
                    <div class="m-line"><div class="t-info"><img src="${getCrest(a)}">${a.shortName || a.name}</div><div class="m-score">${m.score.fullTime.away??'-'}</div></div>
                </div>
            </div>`;
        }

        // --- 초기화 ---
        function initOb() {
            const tabs = document.getElementById('ob-tabs');
            tabs.innerHTML = ['PL','PD'].map(c => `<button class="s-btn ${c===obLg?'on':''}" onclick="obLg='${c}';initOb()">${c==='PL'?'프리미어리그':'라리가'}</button>`).join('');
            const grid = document.getElementById('ob-grid');
            const lg = obLg==='PL'?PL_TEAMS:PD_TEAMS;
            grid.innerHTML = lg.map(t => `<div class="ob-team ${SEL.find(s=>s.id===t.id)?'sel':''}" onclick="toggleObTeam(${t.id}, '${obLg}')"><img src="${getCrest(t)}"><div>${t.ko}</div></div>`).join('');
            const btn = document.getElementById('ob-start'); btn.disabled = !SEL.length;
        }

        function toggleObTeam(id, lg) {
            const list = lg==='PL'?PL_TEAMS:PD_TEAMS; const team = list.find(x=>x.id===id);
            const idx = SEL.findIndex(s=>s.id===id); if(idx>-1) SEL.splice(idx,1); else if(SEL.length<2) SEL.push(team);
            initOb();
        }

        function startApp() {
            localStorage.setItem('pi_sel', JSON.stringify(SEL));
            document.getElementById('ob').style.display = 'none';
            document.getElementById('app').classList.add('on');
            updateTheme(); swPage('home'); loadMiniStd();
        }

        function updateTheme() {
            if(!SEL.length) return;
            const c = SEL[0].col || '#10b981';
            const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
            document.documentElement.style.setProperty('--p', c);
            document.documentElement.style.setProperty('--ps', `rgba(${r},${g},${b},0.1)`);
            document.documentElement.style.setProperty('--pb', `rgba(${r},${g},${b},0.25)`);
            document.getElementById('header-team').innerHTML = SEL.map(t => `<img src="${getCrest(t)}"><span>${t.ko}</span>`).join('');
        }

        function resetApp() { if(confirm('팀을 다시 선택하시겠습니까?')) { localStorage.removeItem('pi_sel'); location.reload(); } }

        async function loadMiniStd() {
            const d = await fetchAPI('/competitions/PL/standings');
            const table = (d?.standings?.[0]?.table || []).slice(0, 5);
            document.getElementById('mini-std').innerHTML = table.map(t => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:12.5px;"><span>${t.team.shortName}</span><span style="font-weight:900; color:var(--p);">${t.points}p</span></div>`).join('');
        }

        window.onload = () => { if(SEL.length) startApp(); else { document.getElementById('ob').style.display='block'; initOb(); } };
    </script>
</body>
</html>
