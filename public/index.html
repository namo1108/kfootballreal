<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PITCH PRO</title>

<style>
body{margin:0;background:#010508;color:#fff;font-family:sans-serif}
#app{display:none;flex-direction:column;height:100vh}
#app.show{display:flex}

.pages{flex:1;position:relative;height:100%}
.page{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  overflow:auto;
  display:none;
  padding:20px;
}
.page.on{display:block}

.bnav{
  height:60px;
  display:flex;
  background:#000;
  border-top:1px solid #333;
  position:relative;
  z-index:200;
}
.nbi{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.nbi.on{
  background:#00ff87;
  color:#000;
}
.card{
  background:#111;
  margin-bottom:10px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="app" class="show">

  <div class="pages">
    <div class="page on" id="pg-home"></div>
    <div class="page" id="pg-sched"></div>
    <div class="page" id="pg-std"></div>
    <div class="page" id="pg-player"></div>
    <div class="page" id="pg-fan"></div>
  </div>

  <div class="bnav">
    <div class="nbi on" onclick="swP('home',this)">홈</div>
    <div class="nbi" onclick="swP('sched',this)">일정</div>
    <div class="nbi" onclick="swP('std',this)">순위</div>
    <div class="nbi" onclick="swP('player',this)">선수</div>
    <div class="nbi" onclick="swP('fan',this)">팬존</div>
  </div>

</div>

<script>
// 🔑 API KEY
const API_KEY = "b00e3059f51741b7add3fcaab7eaadf0";
const BASE_URL = "https://api.football-data.org/v4";

// 🧭 페이지 전환
function swP(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');

  document.querySelectorAll('.nbi').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');

  if(name==='home') loadHome();
  if(name==='sched') loadSched();
  if(name==='std') loadStandings();
  if(name==='player') loadPlayers();
  if(name==='fan') loadFan();
}

// 📡 API 호출
async function api(path){
  const res = await fetch(BASE_URL + path,{
    headers: { "X-Auth-Token": API_KEY }
  });
  return res.json();
}

// 🟢 HOME (라이브 경기)
async function loadHome(){
  const el = document.getElementById('pg-home');
  el.innerHTML = "Loading...";

  try{
    const data = await api("/matches");
    const matches = data.matches.slice(0,10);

    el.innerHTML = matches.map(m=>`
      <div class="card">
        <b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b><br>
        ${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}<br>
        <small>${m.status}</small>
      </div>
    `).join("");
  }catch(e){
    el.innerHTML = "에러 발생";
  }
}

// 📅 일정
async function loadSched(){
  const el = document.getElementById('pg-sched');
  el.innerHTML = "Loading...";

  const data = await api("/matches");

  el.innerHTML = data.matches.slice(0,10).map(m=>`
    <div class="card">
      ${m.homeTeam.name} vs ${m.awayTeam.name}<br>
      ${new Date(m.utcDate).toLocaleString()}
    </div>
  `).join("");
}

// 🏆 순위
async function loadStandings(){
  const el = document.getElementById('pg-std');
  el.innerHTML = "Loading...";

  const data = await api("/competitions/PL/standings");

  el.innerHTML = data.standings[0].table.map(t=>`
    <div class="card">
      ${t.position}. ${t.team.name} (${t.points}점)
    </div>
  `).join("");
}

// 👟 선수
async function loadPlayers(){
  const el = document.getElementById('pg-player');
  el.innerHTML = "Loading...";

  const data = await api("/competitions/PL/scorers");

  el.innerHTML = data.scorers.map(s=>`
    <div class="card">
      ${s.player.name} - ${s.goals}골
    </div>
  `).join("");
}

// 🔥 팬존
function loadFan(){
  const el = document.getElementById('pg-fan');
  el.innerHTML = `
    <div class="card">
      ⚽ 축알못 입문자<br>
      집관 0경기
    </div>
  `;
}

// 최초 로딩
loadHome();
</script>

</body>
</html>
