<script>
const API_KEY = "b00e3059f51741b7add3fcaab7eaadf0";

async function loadMatches() {
  const status = document.getElementById("status");
  const container = document.getElementById("matches");

  status.innerText = "요청중...";
  container.innerHTML = "";

  try {
    const res = await fetch(
      "https://cors-anywhere.herokuapp.com/https://v3.football.api-sports.io/fixtures?date=2024-04-01",
      {
        headers: {
          "x-apisports-key": API_KEY
        }
      }
    );

    const data = await res.json();

    console.log(data);

    const matches = data.response;

    if (!matches || matches.length === 0) {
      status.innerText = "⚠️ 경기 없음";
      return;
    }

    status.innerText = "✅ 성공 (" + matches.length + "경기)";

    matches.forEach(match => {
      const div = document.createElement("div");

      div.innerHTML = `
        <div style="margin-bottom:15px;">
          <b>${match.teams.home.name}</b> vs 
          <b>${match.teams.away.name}</b><br/>
          <span style="color:gray">${match.fixture.date}</span>
        </div>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    status.innerText = "❌ 실패";
  }
}
</script>
