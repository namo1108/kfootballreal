<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN - Professional Football Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --p: #10b981; --bg: #05070a; --bg2: #0d1117; --cd: rgba(22, 27, 34, 0.95);
    --t: #ffffff; --t2: #a1a1aa; --red: #ef4444; --blue: #3b82f6; --orange: #f59e0b; --purp: #a855f7;
    transition: all 0.4s ease;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Pretendard', sans-serif; }
body { background: var(--bg); color: var(--t); overflow: hidden; height: 100vh; }

/* 온보딩 */
#ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding-bottom: 120px; display: block; }
.ob-header { text-align: center; padding: 60px 20px 20px; }
.ob-header h1 { font-size: 48px; font-weight: 900; color: var(--p); letter-spacing: -2px; }
.ob-tabs { display: flex; justify-content: center; gap: 8px; margin: 30px 0; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
.tab-btn { background: #161b22; color: var(--t2); border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 700; white-space: nowrap; }
.tab-btn.on { background: var(--p); color: #000; border-color: var(--p); }

.ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.ob-team { background: #161b22; border: 2px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
.ob-team.sel { border-color: var(--p); background: rgba(255,255,255,0.1); transform: translateY(-5px); }
.ob-team .crest-box { width: 56px; height: 56px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; padding: 6px; }
.ob-team img { width: 100%; height: 100%; object-fit: contain; }

.ob-footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 80%, transparent); padding: 30px; text-align: center; }
.btn-main { background: var(--p); color: #000; padding: 18px 60px; border-radius: 100px; font-weight: 900; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

/* 앱 메인 레이아웃 */
#app { display: none; height: 100vh; flex-direction: column; }
.hdr { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); }
.hdr-logo { font-size: 26px; font-weight: 900; color: var(--p); }
.main-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 260px; background: #080a0f; border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; }
.si { padding: 16px 20px; border-radius: 15px; cursor: pointer; color: var(--t2); font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
.si.on { background: var(--p); color: #000; }
.pages { flex: 1; overflow-y: auto; padding: 40px; background: #05070a; }
.page { display: none; } .page.on { display: block; }

/* 공통 카드 및 테이블 */
.mc { background: var(--cd); border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
.mc-header { padding: 12px 20px; font-size: 11px; color: var(--t2); background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; }
.mc-content { padding: 25px; display: flex; align-items: center; justify-content: space-around; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; color: var(--t2); font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.1); }
td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

/* 일정 슬라이더 */
.days-slider { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
.day-card { min-width: 65px; padding: 12px; background: #161b22; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid transparent; }
.day-card.on { border-color: var(--p); background: rgba(255,255,255,0.1); color: var(--p); }

/* 라이브 매치박스 */
.live-match { background: linear-gradient(135deg, var(--bg2), #1a1f26); border: 1px solid var(--p); }
.score { font-size: 32px; font-weight: 900; letter-spacing: 5px; color: var(--p); }

#gt { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
.gt-box h1 { font-size: 100px; font-weight: 900; color: var(--p); text-shadow: 0 0 50px var(--p); }
</style>
</head>
<body>

<div id="ob">
    <div class="ob-header"><h1>PITCH IN</h1><p>응원하는 팀을 선택하여 대시보드를 커스텀하세요.</p></div>
    <div id="league-tabs" class="ob-tabs"></div>
    <div id="ob-list" class="ob-grid"></div>
    <div class="ob-footer"><button class="btn-main" onclick="startApp()">시작하기</button></div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-logo">PITCH IN</div>
        <div id="hdr-selected" style="display:flex; gap:10px;"></div>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <div class="si on" onclick="swP('home',this)"><span>⚡</span> LIVE</div>
            <div class="si" onclick="swP('sched',this)"><span>📅</span> SCHEDULE</div>
            <div class="si" onclick="swP('std',this)"><span>📊</span> STANDINGS</div>
            <div class="si" onclick="swP('player',this)"><span>👟</span> PLAYERS</div>
            <div class="si" onclick="swP('ai',this)"><span>🧠</span> AI PITCH</div>
            <div class="si" onclick="swP('fan',this)"><span>⭐</span> FAN ZONE</div>
        </aside>
        <main class="pages">
            <div class="page on" id="pg-home">
                <div class="mc live-match">
                    <div class="mc-header"><span>LIVE MATCH - PREMIER LEAGUE</span><span style="color:var(--red);">● LIVE 74'</span></div>
                    <div class="mc-content">
                        <div style="text-align:center;"><img src="" id="home-logo" width="60"><p>HOME</p></div>
                        <div class="score">2 : 1</div>
                        <div style="text-align:center;"><img src="" id="away-logo" width="60"><p>AWAY</p></div>
                    </div>
                </div>
            </div>
            <div class="page" id="pg-sched">
                <div id="days-container" class="days-slider"></div>
                <div id="sched-list" style="margin-top:20px;"></div>
            </div>
            <div class="page" id="pg-std">
                <div id="std-tabs" class="ob-tabs" style="justify-content:flex-start;"></div>
                <div id="std-bd" style="margin-top:20px;"></div>
            </div>
            <div class="page" id="pg-player">
                <div class="ob-tabs" style="justify-content:flex-start; margin-bottom:20px;">
                    <button class="tab-btn on" onclick="loadScorers('goals', this)">득점</button>
                    <button class="tab-btn" onclick="loadScorers('assists', this)">도움</button>
                </div>
                <div id="pl-bd"></div>
            </div>
            <div class="page" id="pg-ai">
                <div class="mc" style="padding:40px; border:1px dashed var(--p); text-align:center;">
                    <h2 style="color:var(--p); margin-bottom:15px;">AI Match Intelligence</h2>
                    <p id="ai-txt" style="line-height:1.8;">분석 로직 가동 중...</p>
                </div>
            </div>
            <div class="page" id="pg-fan">
                <div class="mc" style="padding:40px; text-align:center;">
                    <h2 style="margin-bottom:15px;">FAN ZONE - 집관 인증</h2>
                    <p style="color:var(--t2); margin-bottom:30px;">경기를 시청하며 팬들과 소통하세요.</p>
                    <button class="btn-main" onclick="alert('인증 성공! 100 포인트가 지급되었습니다.')">지금 바로 인증 🔥</button>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
const TEAM_THEMES = {
    'Arsenal': { p: '#ef4444', bg: '#2b0a0a' },
    'Man City': { p: '#7cb3e3', bg: '#0d1e2d' },
    'Liverpool': { p: '#e31b23', bg: '#1a0505' },
    '화성 FC': { p: '#ff6b00', bg: '#231200' },
    '수원': { p: '#005bac', bg: '#001f3d' },
    '울산': { p: '#004794', bg: '#001a33' }
};

const DATA = [
    { n: 'Premier League', c: 'PL', teams: ['Arsenal', 'Man City', 'Liverpool', 'Tottenham', 'Chelsea', 'Man Utd'] },
    { n: 'K League 2', c: 'KL2', teams: ['화성 FC', '수원', '부산', '전남', '경남'] }
];

let SELECTED_TEAM = null;
let curLg = 'PL';

const getEmblem = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=fff&color=000&bold=true`;

function initOb() {
    const tabs = document.getElementById('league-tabs');
    tabs.innerHTML = DATA.map(lg => `<button class="tab-btn ${lg.c === curLg ? 'on' : ''}" onclick="swL('${lg.c}', this)">${lg.n}</button>`).join('');
    renderTeams();
}

function swL(c, el) {
    curLg = c;
    document.querySelectorAll('#league-tabs .tab-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    renderTeams();
}

function renderTeams() {
    const list = document.getElementById('ob-list');
    const lg = DATA.find(l => l.c === curLg);
    list.innerHTML = lg.teams.map(t => `
        <div class="ob-team ${SELECTED_TEAM === t ? 'sel' : ''}" onclick="applyTheme('${t}')">
            <div class="crest-box"><img src="${getEmblem(t)}" alt="${t}"></div>
            <span style="font-size:12px; font-weight:700;">${t}</span>
        </div>
    `).join('');
}

function applyTheme(team) {
    SELECTED_TEAM = team;
    const theme = TEAM_THEMES[team] || { p: '#10b981', bg: '#05070a' };
    document.documentElement.style.setProperty('--p', theme.p);
    document.documentElement.style.setProperty('--bg', theme.bg);
    renderTeams();
}

function startApp() {
    if (!SELECTED_TEAM) return alert('팀을 선택해주세요.');
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('hdr-selected').innerHTML = `<img src="${getEmblem(SELECTED_TEAM)}" style="width:32px; height:32px; border-radius:50%; border:1px solid #fff;">`;
    
    // 라이브 로고 업데이트
    document.getElementById('home-logo').src = getEmblem(SELECTED_TEAM);
    document.getElementById('away-logo').src = getEmblem('Opponent');
    loadHome();
}

function swP(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    el.classList.add('on');

    if(id === 'sched') renderSched();
    if(id === 'std') {
        const stdTabs = document.getElementById('std-tabs');
        stdTabs.innerHTML = DATA.map(lg => `<button class="tab-btn" onclick="loadStd('${lg.c}')">${lg.n}</button>`).join('');
        loadStd('PL');
    }
    if(id === 'ai') {
        document.getElementById('ai-txt').innerText = `${SELECTED_TEAM}의 최근 전술 데이터를 분석한 결과, 승률 68.4%가 예상됩니다.`;
    }
}

function renderSched() {
    const cont = document.getElementById('days-container');
    cont.innerHTML = Array.from({length: 14}, (_, i) => {
        const d = i + 1;
        return `<div class="day-card ${d===13?'on':''}">
            <div style="font-size:10px; color:var(--t2)">4월</div>
            <div style="font-size:16px; font-weight:800;">${d+12}</div>
        </div>`;
    }).join('');
    
    document.getElementById('sched-list').innerHTML = `
        <div class="mc"><div class="mc-content"><span>${SELECTED_TEAM}</span> <b>VS</b> <span>경쟁팀 A</span></div></div>
    `;
}

async function loadStd(code) {
    const bd = document.getElementById('std-bd');
    bd.innerHTML = `<table><tr><th>순위</th><th>팀</th><th>승점</th></tr>
        <tr style="background:rgba(255,255,255,0.05); border-left:4px solid var(--p);"><td>1</td><td>${SELECTED_TEAM}</td><td>45</td></tr>
        <tr><td>2</td><td>샘플 구단 B</td><td>42</td></tr>
    </table>`;
}

function loadScorers(type, el) {
    document.querySelectorAll('#pg-player .tab-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    document.getElementById('pl-bd').innerHTML = `<table><tr><th>순위</th><th>선수</th><th>${type==='goals'?'득점':'도움'}</th></tr>
        <tr><td>1</td><td>에이스 선수</td><td>12</td></tr></table>`;
}

initOb();
</script>
</body>
</html>
