<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PitchPro 2.0</title>

<style>
body { margin:0; background:#0b0f14; color:white; font-family:sans-serif; }
header { padding:15px; color:#00ff9f; font-weight:bold; }

#content { padding:15px; margin-bottom:70px; }

.match {
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav div { color:#888; cursor:pointer; }
.active { color:#00ff9f; }

.goal-banner {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#00ff9f;
  color:black;
  padding:15px;
  border-radius:15px;
}

</style>
</head>

<body>

<header id="header"></header>
<div id="content"></div>

<div class="nav">
  <div onclick="loadLive(this)" class="active">LIVE</div>
  <div onclick="loadAI(this)">AI</div>
  <div onclick="loadFan(this)">집관</div>
</div>

<script>
const API_KEY = "b00e3059f51741b7add3fcaab7eaadf0";
const BASE = "https://cors-anywhere.herokuapp.com/https://v3.football.api-sports.io";

document.getElementById("header").innerText =
  "PITCH PRO - " + new Date().toLocaleDateString();

let lastScores = {};
let userXP = 0;

// 🔊 골 알림
function goalAlert(text){
  new Audio("https://www.soundjay.com/human/goal-cheer-01.mp3").play();

  const el=document.createElement("div");
  el.className="goal-banner";
  el.innerText=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// 🧠 AI 승부예측
function aiPredict(home, away){
  if(home > away) return "홈팀이 흐름을 주도 중입니다";
  if(away > home) return "원정팀 역습이 효과적입니다";
  return "양 팀 팽팽한 경기입니다";
}

// 🔴 LIVE
async function loadLive(el){
  setActive(el);
  const content=document.getElementById("content");

  const res=await fetch(BASE+"/fixtures?live=all",{headers:{'x-apisports-key':API_KEY}});
  const data=await res.json();

  content.innerHTML="";

  data.response.forEach(m=>{
    const id=m.fixture.id;
    const score=(m.goals.home||0)+"-"+(m.goals.away||0);

    if(lastScores[id] && lastScores[id]!==score){
      goalAlert(`⚽ ${m.teams.home.name} ${score} ${m.teams.away.name}`);
    }

    lastScores[id]=score;

    content.innerHTML+=`
      <div class="match" onclick="openMatch(${id})">
        ${m.league.name}<br>
        ${m.teams.home.name} vs ${m.teams.away.name}<br>
        ${score}
      </div>
    `;
  });
}

// 🤖 AI HUB
function loadAI(el){
  setActive(el);

  document.getElementById("content").innerHTML = `
    <h3>🤖 AI 분석</h3>
    경기 데이터를 기반으로 자동 분석됩니다<br><br>
    - 경기 요약<br>
    - 승부 예측 이유<br>
    - 흐름 분석<br>
  `;
}

// 📸 집관 인증
function loadFan(el){
  setActive(el);

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;

    userXP += 10;

    document.getElementById("content").innerHTML = `
      📍 위치 확인됨 (${lat.toFixed(2)})<br><br>
      ✅ 집관 인증 완료!<br><br>
      현재 경험치: ${userXP}<br>
      레벨: ${getLevel(userXP)}
    `;
  });
}

// 레벨 계산
function getLevel(xp){
  if(xp<20) return "⚽ 초보";
  if(xp<50) return "📺 라이트팬";
  if(xp<100) return "🧠 축잘알";
  if(xp<200) return "🎮 FM유저";
  return "🧠 방구석 퍼거슨";
}

// 상세
async function openMatch(id){
  const pop=document.createElement("div");
  pop.style="position:fixed;bottom:0;background:#111;width:100%;height:50%;padding:15px;";
  document.body.appendChild(pop);

  const res=await fetch(BASE+`/fixtures?live=all`,{headers:{'x-apisports-key':API_KEY}});
  const data=await res.json();

  const match=data.response.find(m=>m.fixture.id===id);

  const ai=aiPredict(match.goals.home, match.goals.away);

  pop.innerHTML=`
    <button onclick="this.parentElement.remove()">닫기</button>
    <h3>${match.teams.home.name} vs ${match.teams.away.name}</h3>
    🤖 AI 분석: ${ai}
  `;
}

// 탭
function setActive(el){
  document.querySelectorAll(".nav div").forEach(d=>d.classList.remove("active"));
  el.classList.add("active");
}

// 자동 갱신
setInterval(loadLive,10000);

// 실행
loadLive();
</script>

</body>
</html>
