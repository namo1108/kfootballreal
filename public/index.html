<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro | Global Football Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --f-h: 'Poppins', sans-serif;
    --bg: #05070a; --bg2: #0d1117; --cd: rgba(20, 24, 31, 0.9);
    --p: #10b981; --ps: rgba(16, 185, 129, 0.15); --pb: rgba(16, 185, 129, 0.3);
    --s: #3b82f6; --t: #ffffff; --t2: #a1a1aa; --red: #ef4444; --br: 20px;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    background: var(--bg); color: var(--t); font-family: var(--f-h);
    overflow: hidden; height: 100vh; transition: background 0.5s ease;
    background-image: radial-gradient(at 0% 0%, var(--ps) 0px, transparent 40%);
}

/* --- ONBOARDING --- */
#ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 60px 20px; display: block; }
.ob-container { max-width: 1000px; margin: 0 auto; }
.ob-header { text-align: center; margin-bottom: 40px; }
.ob-header h1 { font-size: 36px; font-weight: 900; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.league-section { margin-bottom: 30px; }
.league-title { font-size: 18px; font-weight: 800; color: var(--p); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--ps); padding-bottom: 8px; }
.ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
.ob-team { background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
.ob-team img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
.ob-team span { font-size: 12px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ob-team.sel { border-color: var(--p); background: var(--ps); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
.ob-team.sel::after { content: '✓'; position: absolute; top: 5px; right: 8px; color: var(--p); font-weight: 900; }
.start-btn { display: block; width: 300px; margin: 40px auto; padding: 20px; border-radius: 100px; border: none; background: var(--p); color: #000; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 10px 30px var(--ps); }

/* --- APP LAYOUT --- */
#app { display: none; height: 100vh; flex-direction: column; }
.hdr { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
.main-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 260px; background: var(--bg2); padding: 20px 10px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
@media(max-width: 1024px) { .sidebar { display: none; } }
.si { display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: 15px; cursor: pointer; color: var(--t2); font-weight: 700; margin-bottom: 8px; transition: 0.3s; }
.si.on { background: var(--ps); color: var(--p); }
.pages { flex: 1; overflow-y: auto; padding: 30px; }
.page { display: none; } .page.on { display: block; }

/* --- MATCH CARDS & ACCORDION --- */
.mc { background: var(--cd); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--br); margin-bottom: 15px; overflow: hidden; }
.mc-top { padding: 10px 20px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: var(--t2); }
.mc-body { padding: 20px; display: flex; align-items: center; justify-content: center; gap: 20px; }
.mc-tm { flex: 1; text-align: center; font-weight: 800; font-size: 16px; }
.mc-sc-box { background: #000; padding: 10px 20px; border-radius: 12px; border: 1px solid var(--pb); font-size: 28px; font-weight: 900; }
.lg-hd { padding: 18px 24px; background: var(--bg2); border-radius: 15px; cursor: pointer; margin-top: 15px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; font-weight: 800; }
.lg-ms { display: none; flex-direction: column; padding: 10px 0; }
.lg-ms.open { display: flex; }

/* --- UTILS --- */
.pills { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; scrollbar-width: none; }
.pill { padding: 10px 20px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.05); background: var(--bg2); color: var(--t2); cursor: pointer; font-weight: 700; white-space: nowrap; }
.pill.on { background: var(--p); color: #000; }

/* GOAL OVERLAY */
#gt { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); pointer-events: none; }
.gt-box { text-align: center; animation: pop 0.5s ease-out; }
@keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div id="ob">
    <div class="ob-container">
        <div class="ob-header">
            <h1>CHOOSE YOUR CLUBS</h1>
            <p>Select up to 2 teams. System theme will adapt to your choice.</p>
        </div>
        <div id="ob-list"></div>
        <button class="start-btn" onclick="startApp()">START SYSTEM</button>
    </div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-logo">PITCH PRO</div>
        <div id="team-display" style="display:flex; gap:10px;"></div>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <div class="si on" onclick="swP('home',this)">⚡ LIVE</div>
            <div class="si" onclick="swP('sched',this)">📅 SCHEDULE</div>
            <div class="si" onclick="swP('std',this)">📊 STANDINGS</div>
            <div class="si" onclick="swP('fan',this)">⭐ FAN ZONE</div>
        </aside>
        <main class="pages">
            <div class="page on" id="pg-home">
                <h2 style="margin-bottom:20px;">LIVE ACTION</h2>
                <div id="home-bd"></div>
            </div>
            <div class="page" id="pg-sched">
                <div id="date-nav" class="pills"></div>
                <div id="sched-bd"></div>
            </div>
            <div class="page" id="pg-std">
                <div id="std-pills" class="pills"></div>
                <div id="std-bd"></div>
            </div>
            <div class="page" id="pg-fan">
                <div id="fan-bd"></div>
            </div>
        </main>
    </div>
</div>

<div id="gt"><div class="gt-box"><h1 style="font-size:80px; color:var(--p);">GOAL!</h1><div id="gt-team" style="font-size:24px;"></div></div></div>

<script>
const API = '/api/football';
const LEAGUES = [
    { name: 'Premier League', code: 'PL', teams: [{id:57, n:'Arsenal', c:'#EF0107'}, {id:65, n:'Man City', c:'#6CABDD'}, {id:64, n:'Liverpool', c:'#C8102E'}, {id:66, n:'Man Utd', c:'#DA291C'}] },
    { name: 'La Liga', code: 'LA', teams: [{id:86, n:'Real Madrid', c:'#FEBE10'}, {id:81, n:'Barcelona', c:'#A50044'}, {id:78, n:'Atletico', c:'#CB3524'}, {id:558, n:'Girona', c:'#E23221'}] },
    { name: 'K League 2', code: 'KL2', teams: [{id:764, n:'Hwaseong FC', c:'#FF5E00'}, {id:2756, n:'Suwon Samsung', c:'#003DA5'}, {id:2758, n:'Seongnam FC', c:'#000000'}, {id:1101, n:'Seoul E-Land', c:'#00204E'}] },
    { name: 'Bundesliga', code: 'BL1', teams: [{id:5, n:'Bayern', c:'#DC052D'}, {id:4, n:'Dortmund', c:'#FDE100'}, {id:3, n:'Leverkusen', c:'#E32221'}] },
    { name: 'Serie A', code: 'SA', teams: [{id:108, n:'Inter', c:'#0068A8'}, {id:98, n:'AC Milan', c:'#FB090B'}, {id:109, n:'Juventus', c:'#000000'}] }
];

let SELECTED_TEAMS = [];
const cache = {};

// ── [1. ONBOARDING LOGIC] ──
function initOb() {
    const list = document.getElementById('ob-list');
    list.innerHTML = LEAGUES.map(lg => `
        <div class="league-section">
            <div class="league-title">${lg.name}</div>
            <div class="ob-grid">
                ${lg.teams.map(t => `
                    <div class="ob-team" onclick="toggleTeam(this, ${t.id}, '${t.n}', '${t.c}')">
                        <img src="https://crests.football-data.org/${t.id}.png" onerror="this.src='https://via.placeholder.com/40?text=${t.n.charAt(0)}'">
                        <span>${t.n}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function toggleTeam(el, id, name, color) {
    const idx = SELECTED_TEAMS.findIndex(t => t.id === id);
    if (idx > -1) {
        SELECTED_TEAMS.splice(idx, 1);
        el.classList.remove('sel');
    } else {
        if (SELECTED_TEAMS.length >= 2) return alert("Maximum 2 teams allowed.");
        SELECTED_TEAMS.push({id, name, color});
        el.classList.add('sel');
    }
    if (SELECTED_TEAMS.length > 0) applyTheme(SELECTED_TEAMS[0].color);
}

function applyTheme(color) {
    const root = document.documentElement.style;
    root.setProperty('--p', color);
    root.setProperty('--ps', color + '26');
    root.setProperty('--pb', color + '4d');
}

function startApp() {
    if (SELECTED_TEAMS.length === 0) return alert("Select at least 1 team.");
    localStorage.setItem('pp_teams', JSON.stringify(SELECTED_TEAMS));
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderHeaderTeams();
    swP('home');
}

function renderHeaderTeams() {
    const container = document.getElementById('team-display');
    container.innerHTML = SELECTED_TEAMS.map(t => `
        <div style="background:var(--ps); color:var(--p); padding:4px 12px; border-radius:100px; font-size:11px; font-weight:800; border:1px solid var(--pb);">${t.name.toUpperCase()}</div>
    `).join('');
}

// ── [2. CORE DATA ENGINE] ──
async function fetchData(path) {
    try {
        const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
        const d = await r.json();
        return d;
    } catch(e) { return null; }
}

async function loadHome() {
    const bd = document.getElementById('home-bd');
    bd.innerHTML = '<div style="text-align:center; padding:50px;">FETCHING LIVE...</div>';
    const d = await fetchData('/matches');
    if (!d || !d.matches) { bd.innerHTML = "No matches today."; return; }
    
    const live = d.matches.filter(m => ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status));
    bd.innerHTML = live.map(m => `
        <div class="mc">
            <div class="mc-top"><span>${m.competition.name}</span><span style="color:var(--red)">● LIVE</span></div>
            <div class="mc-body">
                <div class="mc-tm">${m.homeTeam.shortName || m.homeTeam.name}</div>
                <div class="mc-sc-box">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
                <div class="mc-tm">${m.awayTeam.shortName || m.awayTeam.name}</div>
            </div>
        </div>
    `).join('') || "No live matches right now.";
}

async function loadSched(date = new Date().toISOString().split('T')[0]) {
    const bd = document.getElementById('sched-bd');
    bd.innerHTML = '<div style="text-align:center; padding:50px;">LOADING...</div>';
    const d = await fetchData(`/matches?dateFrom=${date}&dateTo=${date}`);
    if (!d || !d.matches || d.matches.length === 0) { bd.innerHTML = "No games scheduled."; return; }

    const groups = d.matches.reduce((acc, m) => {
        const lg = m.competition.name;
        acc[lg] = acc[lg] || [];
        acc[lg].push(m);
        return acc;
    }, {});

    bd.innerHTML = Object.entries(groups).map(([lg, matches], i) => `
        <div class="lg-hd" onclick="this.nextElementSibling.classList.toggle('open')">
            <span>${lg.toUpperCase()}</span><span>${matches.length} ▾</span>
        </div>
        <div class="lg-ms">
            ${matches.map(m => `
                <div class="mc" style="margin-top:10px; padding:15px 20px; display:flex; justify-content:space-between;">
                    <span style="color:var(--t2); font-size:12px;">${m.utcDate.slice(11,16)}</span>
                    <span style="font-weight:700;">${m.homeTeam.shortName} vs ${m.awayTeam.shortName}</span>
                    <span style="color:var(--p); font-weight:900;">${m.score.fullTime.home??'-'} : ${m.score.fullTime.away??'-'}</span>
                </div>
            `).join('')}
        </div>
    `).join('');
}

function swP(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + name).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    if(el) el.classList.add('on');
    
    if(name === 'home') loadHome();
    if(name === 'sched') {
        const dnav = document.getElementById('date-nav');
        if(!dnav.innerHTML) {
            for(let i=0; i<7; i++) {
                const d = new Date(); d.setDate(d.getDate() + i);
                const ds = d.toISOString().split('T')[0];
                const btn = document.createElement('button');
                btn.className = 'pill' + (i===0?' on':'');
                btn.textContent = i===0 ? 'TODAY' : `${d.getMonth()+1}/${d.getDate()}`;
                btn.onclick = () => {
                    document.querySelectorAll('#date-nav .pill').forEach(p => p.classList.remove('on'));
                    btn.classList.add('on');
                    loadSched(ds);
                };
                dnav.appendChild(btn);
            }
        }
        loadSched();
    }
}

// ── [3. INITIALIZATION] ──
window.onload = () => {
    const saved = localStorage.getItem('pp_teams');
    if (saved) {
        SELECTED_TEAMS = JSON.parse(saved);
        applyTheme(SELECTED_TEAMS[0].color);
        startApp();
    } else {
        initOb();
    }
};
</script>
</body>
</html>
