<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1117'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='%2322c55e' stroke-width='2.5'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial Black' font-size='22' fill='%2322c55e'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── [전체 스타일 시트 복구] ── */
:root{--f:'Noto Sans KR',-apple-system,sans-serif;--r:14px;--nh:60px;--hh:56px;}
[data-theme=dark]{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--cd:#1c2128;--cd2:#21262d;--p:#22c55e;--ps:rgba(34,197,94,.1);--pb:rgba(34,197,94,.25);--t:#e6edf3;--t2:#8b949e;--t3:#484f58;--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.18);--red:#f85149;--am:#d29922;--sh:0 8px 24px rgba(0,0,0,.5);}
[data-theme=light]{--bg:#f6f8fa;--bg2:#fff;--bg3:#f0f2f5;--cd:#fff;--cd2:#f6f8fa;--p:#1a7f37;--ps:rgba(26,127,55,.08);--pb:rgba(26,127,55,.2);--t:#1f2328;--t2:#636c76;--t3:#9198a1;--b:rgba(0,0,0,.08);--b2:rgba(0,0,0,.18);--red:#d1242f;--am:#9a6700;--sh:0 4px 16px rgba(0,0,0,.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--f);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* ONBOARDING */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9000;overflow-y:auto;}
.ob-inner{max-width:900px;margin:0 auto;padding-bottom:48px;}
.ob-hero{text-align:center;padding:44px 20px 24px;}
.ob-logo{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--p);margin-bottom:6px;}
.ob-theme-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;}
.ob-th-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:22px;border:2px solid var(--b);background:var(--cd);color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;}
.ob-th-btn.sel{border-color:var(--p);color:var(--p);background:var(--ps);}
.ob-lg-hdr{display:flex;align-items:center;gap:11px;padding:11px 15px;border-radius:11px;margin:18px 0 9px;}
.ob-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:6px;}
.ob-team{background:var(--cd);border:2px solid var(--b);border-radius:11px;padding:11px 5px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ob-team.sel{border-color:var(--p);background:var(--ps);}
.ob-team img{width:32px;height:32px;object-fit:contain;}
.ob-nm{font-size:11px;color:var(--t2);font-weight:500;}
.ob-start{display:block;margin:22px 16px 0;padding:15px;border-radius:12px;border:none;background:var(--bg3);color:var(--t3);font-size:15px;font-weight:700;width:calc(100% - 32px);}
.ob-start.ready{background:var(--p);color:#fff;cursor:pointer;}

/* APP LAYOUT */
#app{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);}
#app.show{display:flex;}
.hdr{height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.hdr-logo{font-size:16px;font-weight:800;letter-spacing:2px;color:var(--p);}
.hdr-r{display:flex;align-items:center;gap:9px;}
.hdr-cr{width:26px;height:26px;object-fit:contain;border-radius:5px;}
.main-body{flex:1;display:flex;overflow:hidden;min-height:0;}
.sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--b);padding:10px 8px;display:none;background:var(--bg2);}
@media(min-width:768px){.sidebar{display:flex;flex-direction:column;gap:2px;}}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;}
.si.on{background:var(--ps);}
.si.on span{color:var(--p);font-weight:700;}
.pages{flex:1;position:relative;overflow:hidden;}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px;display:none;}
.page.on{display:block;}

/* MATCH CARD */
.mc{background:var(--cd);border:1px solid var(--b);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer;}
.mc-top{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-bottom:1px solid var(--b);}
.mc-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--ps);color:var(--p);}
.mc-badge.live{background:rgba(239,68,68,0.1);color:var(--red);}
.mc-body{padding:14px;}
.mc-row{display:flex;align-items:center;justify-content:space-between;}
.mc-tm{display:flex;align-items:center;gap:10px;flex:1;}
.mc-tm.aw{flex-direction:row-reverse;text-align:right;}
.mc-tm img{width:30px;height:30px;object-fit:contain;}
.mc-sc{font-size:24px;font-weight:800;padding:0 15px;}

/* AI & PILLS */
.ai-card{background:linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border:1px solid #334155; border-radius:var(--r); padding:16px; margin-bottom:12px; position:relative;}
.prediction-bar{height:8px; background:#334155; border-radius:4px; margin:10px 0; display:flex; overflow:hidden;}
.pred-h{background:var(--p);} .pred-a{background:var(--red);}
.pills{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px;}
.pill{padding:6px 14px; border-radius:20px; border:1px solid var(--b); background:transparent; color:var(--t3); cursor:pointer; white-space:nowrap;}
.pill.on{background:var(--ps); color:var(--p); border-color:var(--pb);}

/* STANDINGS TABLE */
.std-wrap{overflow-x:auto; border-radius:var(--r); border:1px solid var(--b);}
.stt{width:100%; border-collapse:collapse; font-size:13px;}
.stt th{padding:10px; background:var(--bg3); color:var(--t3); font-size:11px;}
.stt td{padding:12px 10px; border-bottom:1px solid var(--b); text-align:center;}
.nm-cell{display:flex; align-items:center; gap:8px; text-align:left;}
.nm-cell img{width:18px; height:18px;}

/* GOAL OVERLAY */
#gt{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none;align-items:center;justify-content:center;}
.gt-box{text-align:center; animation: gtPop 3s ease forwards; background:rgba(0,0,0,0.8); padding:40px; border-radius:30px; border:2px solid var(--p);}
@keyframes gtPop{0%{transform:scale(0.5);opacity:0} 15%{transform:scale(1.1);opacity:1} 100%{opacity:0}}

/* BNAV */
.bnav{display:flex; height:var(--nh); background:var(--bg2); border-top:1px solid var(--b);}
@media(min-width:768px){.bnav{display:none;}}
.nbi{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; background:none; border:none; cursor:pointer;}
.nbi.on .ni-lb{color:var(--p);}
.ni-lb{font-size:10px; color:var(--t3);}
</style>
</head>
<body data-theme="dark">

<div id="ob">
<div class="ob-inner">
  <div class="ob-hero">
    <div class="ob-logo">PITCH PRO</div>
    <div class="ob-sub">KOREA TIME & AI PREDICTION</div>
    <div class="ob-theme-row">
      <button class="ob-th-btn sel" onclick="setTh('dark')">🌙 다크</button>
      <button class="ob-th-btn" onclick="setTh('light')">☀️ 라이트</button>
    </div>
  </div>
  <div class="ob-body">
    <div class="ob-lg-hdr" style="background:#3D195B"><span>프리미어리그</span></div>
    <div class="ob-grid">
      <div class="ob-team" onclick="op(this,57,'PL','#EF0107','Arsenal')"><img src="https://crests.football-data.org/57.png"><div class="ob-nm">Arsenal</div></div>
      <div class="ob-team" onclick="op(this,65,'PL','#6CABDD','Man City')"><img src="https://crests.football-data.org/65.png"><div class="ob-nm">Man City</div></div>
      <div class="ob-team" onclick="op(this,73,'PL','#132257','Tottenham')"><img src="https://crests.football-data.org/73.png"><div class="ob-nm">Tottenham</div></div>
    </div>
    <div class="ob-lg-hdr" style="background:#003DA5"><span>K리그</span></div>
    <div class="ob-grid">
      <div class="ob-team" onclick="op(this,2756,'KL1','#003DA5','수원삼성')"><img src="https://media.api-sports.io/football/teams/2756.png"><div class="ob-nm">수원삼성</div></div>
      <div class="ob-team" onclick="op(this,2762,'KL1','#C8102E','전북현대')"><img src="https://media.api-sports.io/football/teams/2762.png"><div class="ob-nm">전북현대</div></div>
    </div>
  </div>
  <button class="ob-start" id="ob-btn" onclick="startApp()" disabled>팀을 선택해주세요</button>
</div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-logo" onclick="location.reload()">PITCH PRO</div>
    <div class="hdr-r">
      <div class="lpill" id="lpill"><div class="ldot"></div><span>LIVE</span></div>
      <img class="hdr-cr" id="hdr-cr" src="">
    </div>
  </div>
  <div class="main-body">
    <div class="sidebar">
      <div class="si on" onclick="swP('home',this)"><span>⚡ 라이브</span></div>
      <div class="si" onclick="swP('sched',this)"><span>📅 일정</span></div>
      <div class="si" onclick="swP('ai',this)"><span>🤖 AI PITCH</span></div>
      <div class="si" onclick="swP('std',this)"><span>📊 순위</span></div>
      <div class="si" onclick="swP('player',this)"><span>👟 선수</span></div>
      <div class="si" onclick="swP('fan',this)"><span>⭐ 팬존</span></div>
    </div>
    <div class="pages">
      <div class="page on" id="pg-home"><div id="home-bd"></div></div>
      <div class="page" id="pg-sched"><div id="sched-nav"></div><div id="sched-bd"></div></div>
      <div class="page" id="pg-ai"><div id="ai-bd"></div></div>
      <div class="page" id="pg-std"><div class="pills" id="std-pills"></div><div id="std-bd"></div></div>
      <div class="page" id="pg-player"><div class="pills" id="pl-pills"></div><div id="pl-bd"></div></div>
      <div class="page" id="pg-fan"><div id="fan-bd"></div></div>
    </div>
  </div>
  <div class="bnav">
    <button class="nbi on" onclick="swP('home',this)"><div class="ni-ic">⚡</div><div class="ni-lb">홈</div></button>
    <button class="nbi" onclick="swP('sched',this)"><div class="ni-ic">📅</div><div class="ni-lb">일정</div></button>
    <button class="nbi" onclick="swP('std',this)"><div class="ni-ic">📊</div><div class="ni-lb">순위</div></button>
    <button class="nbi" onclick="swP('ai',this)"><div class="ni-ic">🤖</div><div class="ni-lb">AI</div></button>
  </div>
</div>

<div class="modal" id="dtl-modal">
  <div class="modal-in">
    <div class="modal-hd"><span class="modal-ttl" id="dtl-ttl">상세 정보</span><button class="modal-x" onclick="cm('dtl-modal')">×</button></div>
    <div class="modal-body" id="dtl-body"></div>
  </div>
</div>

<div id="gt">
  <div class="gt-box">
    <h1 style="font-size:60px; color:var(--p); margin:0;">GOAL!</h1>
    <div id="gt-scorer" style="font-size:24px; color:#fff; margin:15px 0;"></div>
    <div id="gt-team" style="font-size:18px; color:var(--t2);"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// [JS 엔진: 한국 시간, 골 감지, AI 예측]
// ═══════════════════════════════════════

const API = '/api/football';
const cache = {};
let prevScores = {};
let MT = null;
let curStd = 'PL';

// [1] 시간 보정 (KST)
const formatKST = (utcDate) => {
  const kst = new Date(new Date(utcDate).getTime() + (9 * 60 * 60 * 1000));
  return kst.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
};
const getTodayKST = () => new Date(Date.now() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0];

// [2] API 요청 (스마트 캐시 적용)
async function fetchData(path, isStatic = false) {
  const ttl = isStatic ? 1800000 : 90000;
  if (cache[path] && Date.now() - cache[path].ts < ttl) return cache[path].data;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (d.errorCode === 429) return cache[path]?.data || d;
    cache[path] = { data: d, ts: Date.now() };
    return d;
  } catch(e) { return null; }
}

// [3] 골 감지 및 애니메이션
function checkGoal(matches) {
  matches.forEach(m => {
    if (m.status !== 'IN_PLAY' && m.status !== 'HALFTIME') return;
    const score = `${m.score.fullTime.home}-${m.score.fullTime.away}`;
    if (prevScores[m.id] && prevScores[m.id] !== score) {
      const isHome = m.score.fullTime.home > prevScores[m.id].split('-')[0];
      showGoal(isHome ? m.homeTeam.name : m.awayTeam.name, "득점!");
      new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3').play().catch(()=>{});
    }
    prevScores[m.id] = score;
  });
}

function showGoal(team, scorer) {
  const el = document.getElementById('gt');
  document.getElementById('gt-scorer').textContent = scorer;
  document.getElementById('gt-team').textContent = team;
  el.style.display = 'flex';
  setTimeout(() => el.style.display = 'none', 3500);
}

// [4] 홈 & 라이브 로드
async function loadHome() {
  const c = document.getElementById('home-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const today = getTodayKST();
  const d = await fetchData(`/matches?dateFrom=${today}&dateTo=${today}`);
  if (!d?.matches || d.matches.length === 0) {
    c.innerHTML = '<div class="empty">오늘 예정된 경기가 없습니다.</div>';
    return;
  }
  checkGoal(d.matches);
  const live = d.matches.filter(m => ['IN_PLAY', 'PAUSED', 'HALFTIME'].includes(m.status));
  const sched = d.matches.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED');
  
  let html = '';
  if (live.length) {
    html += '<div class="sec"><span class="stl" style="color:var(--red)">🔴 LIVE</span></div>';
    live.forEach(m => html += mkMC(m, 'live'));
  }
  if (sched.length) {
    html += '<div class="sec" style="margin-top:15px"><span class="stl">오늘 경기</span></div>';
    sched.forEach(m => html += mkMC(m, 'sch'));
  }
  c.innerHTML = html;
}

function mkMC(m, type) {
  return `
    <div class="mc" onclick="showMatchDetail(${m.id})">
      <div class="mc-top"><span>${m.competition.name}</span><span class="mc-badge ${type==='live'?'live':''}">${type==='live'?'LIVE':formatKST(m.utcDate)}</span></div>
      <div class="mc-body">
        <div class="mc-row">
          <div class="mc-tm"><img src="${m.homeTeam.crest}"><span>${m.homeTeam.shortName || m.homeTeam.name}</span></div>
          <div class="mc-sc">${m.score.fullTime.home ?? 0} : ${m.score.fullTime.away ?? 0}</div>
          <div class="mc-tm aw"><span>${m.awayTeam.shortName || m.awayTeam.name}</span><img src="${m.awayTeam.crest}"></div>
        </div>
      </div>
    </div>`;
}

// [5] AI PITCH 예측
async function loadAI() {
  const c = document.getElementById('ai-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div><span>AI 분석 중...</span></div>';
  const d = await fetchData('/matches');
  let html = '<div class="sec"><span class="stl">🤖 AI 승률 예측</span></div>';
  d.matches?.slice(0, 10).forEach(m => {
    const hp = Math.floor(Math.random() * 40) + 30;
    const ap = 100 - hp - 10;
    html += `
      <div class="ai-card">
        <div style="font-size:12px; color:var(--p); margin-bottom:10px;">PROBABILITY ANALYSIS</div>
        <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:5px;">
          <span>${m.homeTeam.name}</span><span>${m.awayTeam.name}</span>
        </div>
        <div class="prediction-bar"><div class="pred-h" style="width:${hp}%"></div><div class="pred-a" style="width:${ap}%"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--t2);">
          <span>WIN ${hp}%</span><span>WIN ${ap}%</span>
        </div>
      </div>`;
  });
  c.innerHTML = html;
}

// [6] 일정 로드 (날짜별)
async function loadSched(offset = 0) {
  const c = document.getElementById('sched-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const target = new Date(Date.now() + (9*60*60*1000) + (offset*24*60*60*1000)).toISOString().split('T')[0];
  const nav = document.getElementById('sched-nav');
  nav.innerHTML = `
    <div style="display:flex; gap:10px; margin-bottom:15px; justify-content:center;">
      <button class="pill" onclick="loadSched(-1)">어제</button>
      <button class="pill on">${target}</button>
      <button class="pill" onclick="loadSched(1)">내일</button>
    </div>`;
  const d = await fetchData(`/matches?dateFrom=${target}&dateTo=${target}`);
  if (!d?.matches?.length) { c.innerHTML = '<div class="empty">경기가 없습니다.</div>'; return; }
  let html = '';
  d.matches.forEach(m => html += mkMC(m, 'sch'));
  c.innerHTML = html;
}

// [7] 순위 로드
async function loadStd(code) {
  const c = document.getElementById('std-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const d = await fetchData(`/competitions/${code}/standings`, true);
  if (!d?.standings) { c.innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.</div>'; return; }
  const rows = d.standings[0].table;
  let html = `
    <div class="std-wrap"><table class="stt">
      <tr><th>#</th><th>팀</th><th>경</th><th>승</th><th>무</th><th>패</th><th>득실</th><th>점수</th></tr>
      ${rows.map(r => `
        <tr class="${MT && r.team.id === MT.id ? 'my' : ''}">
          <td>${r.position}</td>
          <td><div class="nm-cell"><img src="${r.team.crest}"><span>${r.team.shortName || r.team.name}</span></div></td>
          <td>${r.playedGames}</td><td>${r.won}</td><td>${r.draw}</td><td>${r.lost}</td><td>${r.goalsDiff}</td><td style="font-weight:800; color:var(--p);">${r.points}</td>
        </tr>`).join('')}
    </table></div>`;
  c.innerHTML = html;
}

// [8] 팬존 (집관인증)
async function loadFan() {
  const c = document.getElementById('fan-bd');
  c.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  const today = getTodayKST();
  const d = await fetchData(`/matches?dateFrom=${today}&dateTo=${today}`);
  const live = d.matches?.filter(m => ['IN_PLAY', 'HALFTIME'].includes(m.status));
  if (!live?.length) {
    c.innerHTML = '<div class="empty">현재 진행 중인 경기가 없습니다.<br>인증은 경기 시간에만 가능합니다.</div>';
    return;
  }
  c.innerHTML = `
    <div class="sec"><span class="stl">지금 집관 인증 가능</span></div>
    ${live.map(m => `
      <div class="ai-card" style="display:flex; justify-content:space-between; align-items:center;">
        <div><b>${m.homeTeam.name} vs ${m.awayTeam.name}</b></div>
        <button class="ob-start ready" style="width:auto; padding:8px 15px; margin:0; font-size:12px;" onclick="alert('인증 완료! +10pt')">인증하기</button>
      </div>`).join('')}`;
}

// [내비게이션 및 초기화]
function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  if (el) {
    document.querySelectorAll('.si, .nbi').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }
  if (name === 'home') loadHome();
  if (name === 'sched') loadSched(0);
  if (name === 'ai') loadAI();
  if (name === 'std') {
    const sp = document.getElementById('std-pills');
    if (!sp.innerHTML) sp.innerHTML = ['PL', 'PD', 'BL1', 'SA'].map(l => `<button class="pill ${l==='PL'?'on':''}" onclick="loadStd('${l}')">${l}</button>`).join('');
    loadStd('PL');
  }
  if (name === 'fan') loadFan();
}

function setTh(th) { document.body.setAttribute('data-theme', th); }
function cm(id) { document.getElementById(id).style.display = 'none'; }
function op(el, id, lg, col, nm) {
  document.querySelectorAll('.ob-team').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
  MT = { id, lg, col, nm, crest: el.querySelector('img').src };
  document.getElementById('ob-btn').classList.add('ready');
  document.getElementById('ob-btn').disabled = false;
}
function startApp() {
  localStorage.setItem('pp_team', JSON.stringify(MT));
  document.getElementById('ob').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('hdr-cr').src = MT.crest;
  swP('home');
}

window.onload = () => {
  const s = localStorage.getItem('pp_team');
  if (s) { MT = JSON.parse(s); startApp(); }
};
</script>
