<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>PitchPro API Test</title>
</head>
<body style="background:#0b0f14; color:white; font-family:sans-serif;">

  <h1 style="color:#00ff9f;">PITCH PRO</h1>
  <p id="status">상태: 대기중</p>
  <button onclick="loadMatches()">경기 불러오기</button>

  <div id="matches" style="margin-top:20px;"></div>

  <script>
    const API_KEY = "b00e3059f51741b7add3fcaab7eaadf0";

    async function loadMatches() {
      const status = document.getElementById("status");
      const container = document.getElementById("matches");

      status.innerText = "요청중...";
      container.innerHTML = "";

      try {
        const res = await fetch(
          "https://cors-anywhere.herokuapp.com/https://v3.football.api-sports.io/fixtures?league=39&season=2024",
          {
            method: "GET",
            headers: {
              "x-apisports-key": API_KEY
            }
          }
        );

        if (!res.ok) {
          throw new Error("응답 실패: " + res.status);
        }

        const data = await res.json();
        console.log(data);

        status.innerText = "✅ 성공!";

        const matches = data.response;

        matches.slice(0, 10).forEach(match => {
          const home = match.teams.home.name;
          const away = match.teams.away.name;
          const date = match.fixture.date;

          const div = document.createElement("div");
          div.style.marginBottom = "10px";
          div.innerHTML = `
            <b>${home}</b> vs <b>${away}</b><br/>
            <span style="color:gray">${date}</span>
          `;

          container.appendChild(div);
        });

      } catch (e) {
        console.error(e);
        status.innerText = "❌ 실패: " + e.message;
      }
    }
  </script>

</body>
</html>
